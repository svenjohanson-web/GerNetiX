targetAudience:
  - Lernende nach Temperatur-Datenlogger und Pflanzenbewaesserung
  - Nutzer, die Steuerung und Regelung an einer traegen realen Strecke verstehen wollen
  - Maker, die kontrollierte Temperaturbedingungen fuer Teig, Pflanzen, Elektroniktests oder Experimente schaffen wollen
applicationScenarios:
  - kontrolliertes Gehenlassen von Teig fuer Baecker oder Hobbybaecker
  - kleine Pflanzen- oder Keimbox mit kontrollierter Temperatur
  - Elektronik- oder Bauteiltests unter kontrollierten Temperaturbedingungen
  - Experimentierbox fuer thermische Regelstrecken
recommendedHardware:
  - Artefakt fuer climate_control_node
  - drei Artefakte fuer temperature_sensor
  - Artefakt fuer peltier_element
  - Artefakte fuer fan_actuator innen und aussen
  - Artefakte fuer actuator_power_stage je Leistungsaktor
  - Artefakt fuer actuator_power_supply_interface
  - Gehaeuse als 3D-Druck-, Bau- oder Bastelartefakt
  - Kuehlkoerper, Luftfuehrung und mechanische Befestigung als thermische Umgebung
technicalRequirements:
  modelingPrinciple: Die Klimabox fordert Rollen und Faehigkeiten fuer verteilte Temperaturmessung, Luftbewegung, aktive Waermeverschiebung, Leistungsansteuerung, Sicherheit und optional Vernetzung; konkrete Hardware wird spaeter ueber Hardware- und Mechanik-Kataloge ausgewaehlt.
  requiredCapabilityBundles:
    - id: bundle.climate_control_node
      role: climate_control_node
      cardinality: exactly_one
      requiredCapabilities:
        - programmable_microcontroller
        - decision_logic
        - multi_sensor_input
        - gpio_output
        - timing
        - safety_limits
      purpose: Liest mehrere Temperaturwerte, entscheidet ueber Luefter und Peltier-Element und ueberwacht Sicherheitsgrenzen.
    - id: bundle.temperature_sensors
      role: temperature_sensor
      cardinality: exactly_three
      requiredCapabilities:
        - temperature_measurement
      purpose: Erfasst Temperatur an mehreren Stellen, zum Beispiel Innenraum, Aussenseite/Kuehlkoerper und Umgebung.
    - id: bundle.inner_fan
      role: inner_air_circulation_fan
      cardinality: exactly_one
      requiredCapabilities:
        - air_movement
        - speed_or_switch_control
      purpose: Verteilt kalte oder warme Luft im Innenraum und reduziert lokale Temperaturunterschiede.
    - id: bundle.outer_fan
      role: outer_heat_sink_fan
      cardinality: exactly_one
      requiredCapabilities:
        - air_movement
        - speed_or_switch_control
      purpose: Fuehrt Waerme am aeusseren Kuehlkoerper ab und schuetzt Peltier-Element und Gehaeuse.
    - id: bundle.peltier_element
      role: thermal_transfer_actuator
      cardinality: exactly_one
      requiredCapabilities:
        - active_heat_transfer
        - heating_or_cooling_by_polarity_or_mounting
      purpose: Verschiebt Waerme aktiv zwischen Innen- und Aussenseite.
    - id: bundle.power_stages
      role: actuator_power_stage
      cardinality: one_per_power_actuator
      requiredCapabilities:
        - load_switching
        - actuator_power_supply_interface
      purpose: Trennt Mikrocontroller-Signale von Luefter- und Peltier-Leistung.
    - id: bundle.thermal_enclosure
      role: climate_enclosure
      cardinality: exactly_one
      requiredCapabilities:
        - enclosed_air_volume
        - thermal_boundary
        - mechanical_mounting
      purpose: Bildet die thermische Strecke, in der Temperatur erzeugt, verteilt und gemessen wird.
  optionalCapabilityBundles:
    - id: bundle.connected_climate_node
      role: connected_climate_node
      cardinality: zero_or_one
      requiredCapabilities:
        - wireless_network
        - local_webserver
        - status_monitoring
        - parameter_adjustment
      purpose: Macht Temperaturen, Sollwert und Aktorzustaende per Handy oder PC sichtbar und einstellbar.
    - id: bundle.temperature_logging
      role: temperature_logging
      cardinality: zero_or_one
      requiredCapabilities:
        - timestamped_data
        - trend_visualization
        - actuator_runtime_logging
      purpose: Zeigt Temperaturverlaeufe, Schaltzyklen und Regelverhalten.
    - id: bundle.bidirectional_peltier_driver
      role: bidirectional_thermal_driver
      cardinality: zero_or_one
      requiredCapabilities:
        - polarity_reversal
        - high_current_switching
      purpose: Ermoeglicht echten Heiz-/Kuehl-Umkehrbetrieb mit demselben Peltier-Element.
  hardwareCatalogMapping: ESP32, ESP8266, Temperatursensoren, Peltier-Element, Luefter, MOSFETs, Relais, H-Bruecken, Netzteile, Kuehlkoerper und 3D-Druck-Gehaeuse werden spaeter als konkrete Artefakte auf diese Rollen gemappt.
implementationBoundary:
  localRealization:
    principle: Mehrere Temperatursensoren, Luefter, Peltier-Taktung, Sicherheitsgrenzen und lokale Regelung koennen ohne WLAN umgesetzt werden, wenn I/O, Sensorinterfaces und Leistungsansteuerung passen.
    possibleHardwareClass:
      - Arduino-kompatible Mikrocontrollerklasse fuer lokale Klimabox-Regelung
      - ESP-Klasse fuer lokale oder vernetzte Klimabox-Regelung
    requiredCapabilities:
      - programmable_microcontroller
      - multi_sensor_input
      - gpio_output
      - timing
      - safety_limits
  connectedRealization:
    trigger: Sobald Weboberflaeche, Remote Parameter, Benachrichtigung oder externe Auswertung Teil der Variante werden.
    requiredCapabilities:
      - wireless_network
      - local_webserver_or_event_notification
    catalogImplication: Dann braucht der Steuerknoten selbst Netzwerkfaehigkeit oder ein Gateway.
learningIntent:
  - Eine thermische Strecke mit Sensoren, Aktoren, Leistung und Mechanik als Gesamtsystem verstehen.
  - Mehrere Temperaturmesspunkte nutzen, um Innenraum, Kuehlkoerper/Aussenseite und Umgebung zu unterscheiden.
  - Ein/Aus-Steuerung mit Schwellwerten ausprobieren und deren Grenzen erleben.
  - Luefterregelung als erste kontinuierlichere Stellgroesse verstehen.
  - Peltier-Element als aktiven Waermetransport einsetzen, wenn reine Luftbewegung nicht ausreicht.
  - Traege Systeme und lange Schaltzyklen als Unterschied zu schneller PWM verstehen.
  - Sicherheitsgrenzen fuer Thermoplastik, Peltier-Element, Netzteil und unbeaufsichtigten Betrieb definieren.
didacticFlow:
  - Anwendung und Systemgrenze der Klimabox festlegen: Innenraum, Umgebung, Kuehlkoerper, Aktoren und Sensoren.
  - Gehaeuse bauen oder 3D-drucken und thermische Risiken durch Material und Montage besprechen.
  - Drei Temperatursensoren positionieren und Messwerte erfassen.
  - Innen- und Aussenluefter als Aktoren einzeln schalten.
  - Peltier-Element mit geeigneter Leistungsstufe in Betrieb nehmen.
  - Einfache Schwellwertsteuerung fuer Luefter ausprobieren.
  - Beobachten, dass Temperatur traege reagiert und Schaltflattern oder Ueberschwingen entstehen kann.
  - Regelbereich fuer Luefter einfuehren: untere Grenze 0 Prozent, obere Grenze 100 Prozent.
  - Pruefen, wann Luefter alleine nicht ausreichen, weil Innen-, Aussen- oder Umgebungstemperatur zu weit auseinander liegen.
  - Peltier-Element als zusaetzliche Stellgroesse zuschalten.
  - Lange Ein/Aus-Zyklen fuer Peltier testen, statt schnelle PWM als Standard anzunehmen.
  - Temperaturverlauf und Aktorlaufzeiten loggen und auswerten.
  - Abschlusskapitel: Steuerung, Regelung, Strecke, Stellgroesse, Messort, Traegheit, Sicherheit und Materialgrenzen einordnen.
coreInsights:
  - Temperaturregelung ist traege und raeumlich verteilt; ein einzelner Messwert beschreibt die Box nur begrenzt.
  - Luefter bewegen Waerme, erzeugen aber keine aktive Temperaturdifferenz wie ein Peltier-Element.
  - Ein Peltier-Element verschiebt Waerme und braucht deshalb zwingend thermische Ableitung auf der Gegenseite.
  - Schwellwertsteuerung ist einfach, kann aber zu Flattern, Ueberschwingen und schlechten Temperaturverlaeufen fuehren.
  - Bei traegen Systemen sind lange Stellzyklen oft sinnvoller als schnelle PWM.
  - Mechanik und Material sind Teil der Regelstrecke; ein 3D-gedrucktes Gehaeuse setzt Temperaturgrenzen.
  - Regelung ist nicht nur Code, sondern eine Entscheidung aus Sensorplatzierung, Aktorleistung, Sicherheit und Zielverhalten.
controlConcepts:
  initialControl:
    title: Schwellwert-Steuerung
    behavior:
      - "Temperatur ueber Sollbereich: Kuehlung oder Luefter an."
      - "Temperatur im Sollbereich: Aktoren aus oder reduziert."
      - "Temperatur unter Sollbereich: Heizen oder Umkehrbetrieb pruefen."
    knownProblems:
      - Schaltflattern um Grenzwerte
      - Ueberschwingen durch thermische Traegheit
      - ungleichmaessige Temperatur im Innenraum
      - Ueberhitzung am Kuehlkoerper oder am Gehaeuse
  proportionalLikeControl:
    title: Stellgrad aus Temperaturabweichung
    behavior:
      - Bei kleiner Abweichung niedrige Luefterleistung oder kurze Laufzeit.
      - Bei grosser Abweichung hoehere Luefterleistung oder 100 Prozent.
      - Peltier erst zuschalten, wenn Luftbewegung alleine nicht ausreicht.
    purpose: Uebergang von hartem Ein/Aus zu einer regelungsnahen Stellgroesse.
  slowCycleControl:
    title: Langsame Taktung fuer traege Aktoren
    behavior:
      - Peltier-Element wird in langen Zeitfenstern ein- und ausgeschaltet.
      - Beispiele: mehrere Minuten an, mehrere Minuten aus, je nach Strecke und Ziel.
    purpose: Traegheit nutzen und unnötig schnelle Schaltzyklen vermeiden.
failureCases:
  sensorFailures:
    - id: failure.sensor_disconnected
      title: Temperatursensor nicht verbunden oder unplausibel
      observation: Messwert fehlt, springt stark oder liegt ausserhalb erwarteter Grenzen.
      mitigation:
        - Peltier und Heizen/Kuehlen sperren.
        - Fehlerzustand anzeigen.
        - Plausibilitaetsbereich je Sensorrolle definieren.
    - id: failure.sensor_wrong_position
      title: Sensor sitzt an falscher Stelle
      observation: Innenraumtemperatur wirkt stabil, aber reale Nutzung oder andere Sensoren zeigen Abweichungen.
      mitigation:
        - Sensorrollen und Einbaupositionen dokumentieren.
        - mehrere Sensorwerte vergleichen.
        - Regelung nicht blind auf einen Messpunkt stuetzen.
  actuatorFailures:
    - id: failure.outer_fan_failed
      title: Aussenluefter oder Kuehlkoerperableitung faellt aus
      observation: Kuehlkoerpertemperatur steigt trotz aktiver Kuehlung stark an.
      mitigation:
        - Peltier sofort abschalten.
        - Alarm- oder Fehlerzustand setzen.
        - maximale Kuehlkoerpertemperatur definieren.
    - id: failure.inner_fan_failed
      title: Innenluefter verteilt Luft nicht
      observation: grosse Temperaturunterschiede zwischen Messpunkten oder langsame Reaktion im Innenraum.
      mitigation:
        - Luefterstatus ueberwachen, falls Rueckmeldung vorhanden.
        - Peltierleistung begrenzen.
        - Diagnose ueber Temperaturgradienten einfuehren.
    - id: failure.peltier_overheating
      title: Peltier-Element oder Gehaeuse wird zu heiss
      observation: Aussen- oder Materialtemperatur ueberschreitet sichere Grenze.
      mitigation:
        - Peltier abschalten.
        - Abkuehlzeit erzwingen.
        - thermische Montage und Kuehlkoerper ueberarbeiten.
safetyLimits:
  - id: limit.max_enclosure_temperature
    title: Maximale Innenraumtemperatur
    rationale: Schuetzt Anwendung, Pflanzen, Teig, Elektronik oder Testobjekte.
  - id: limit.max_heat_sink_temperature
    title: Maximale Kuehlkoerper- oder Aussenseitentemperatur
    rationale: Schuetzt Peltier-Element, Luefter, Gehaeuse und Umgebung.
  - id: limit.max_thermoplastic_temperature
    title: Maximale Materialtemperatur fuer 3D-Druck-Gehaeuse
    rationale: Thermoplastik darf nicht weich werden oder sich verformen.
  - id: limit.max_peltier_on_time
    title: Maximale Peltier-Laufzeit pro Zyklus
    rationale: Begrenzt thermische Belastung und Energieeintrag.
  - id: limit.cooldown_after_peltier
    title: Abkuehl- oder Ausgleichszeit nach Peltier-Betrieb
    rationale: Gibt der thermischen Strecke Zeit zu reagieren und verhindert Ueberschwingen.
  - id: limit.fail_safe_actuators_off
    title: Im Fehlerfall leistungsstarke Aktoren aus
    rationale: Bei unplausiblen Messwerten ist Abschalten sicherer als unkontrolliertes Heizen oder Kuehlen.
monitoringAndData:
  trackedValues:
    - Innenraumtemperatur
    - Kuehlkoerper- oder Aussenseitentemperatur
    - Umgebungstemperatur
    - Solltemperatur
    - Luefterzustand oder Luefterstellgrad innen
    - Luefterzustand oder Luefterstellgrad aussen
    - Peltier-Zustand und Peltier-Laufzeit
    - Fehler- und Sicherheitszustaende
  views:
    - Aktueller Zustand: heizt, kuehlt, stabil, wartet, Fehlerzustand.
    - Temperaturverlauf der drei Sensoren.
    - Aktorverlauf fuer Luefter und Peltier.
    - Vergleich von Sollwert und Istwert.
    - Diagnoseansicht fuer thermische Grenzen und Sensorplausibilitaet.
  didacticPurpose:
    - Verlauf macht Traegheit, Ueberschwingen und Stellwirkung sichtbar.
    - Mehrere Sensoren zeigen, dass Messort und Regelort nicht identisch sein muessen.
    - Aktorzeiten zeigen, wie viel Energie in das System eingebracht oder abgefuehrt wurde.
