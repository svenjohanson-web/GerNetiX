    - Du kannst Sensorwerte als Entscheidungsgrundlage verwenden.
    - Du kannst Aktoren sicherer schalten und Grenzen definieren.
    - Du verstehst, warum Nachlauf, Hysterese und Schutzzeiten in realen Systemen wichtig sind.
  inspirationProjects:
