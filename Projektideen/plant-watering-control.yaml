safetyAndBoundaries:
  - Wasser und Elektronik muessen mechanisch und elektrisch getrennt betrachtet werden.
  - Pumpen duerfen nicht direkt aus einem Mikrocontroller-Pin versorgt werden.
  - Externe Versorgung, Treiberstufe und Schutzbeschaltung sind Teil der Systemgrenze.
  - Trockenlauf und Dauerbetrieb der Pumpe muessen spaeter begrenzt werden.
crossCuttingChapters:
  - id: reusable_chapter.guided_code_walkthrough
    title: Gefuehrter Code-Walkthrough mit Zeilenfokus
    appliesWhen:
      - Projekt fuehrt neuen Code ein oder verbindet Codezeilen mit beobachtbarer Hardwarewirkung.
    requiredCapabilities:
      - capability.guided_code_highlighting
      - capability.code_step_explanation
      - capability.parameter_experiment
      - capability.hardware_effect_observation
    chapterRole: Wiederkehrendes Unterkapitel fuer schrittweises Codeverstaendnis mit fokussierter Hervorhebung und kleinen Experimenten.
    keyTradeoff: Geringe kognitive Last gegen langsamere, aber stabilere Einfuehrung in Code und Hardwarewirkung.  - id: reusable_chapter.embedded_webserver_basics
    title: Embedded Webserver fuer Status und Bedienung
    preconditions:
      chapters:
        - reusable_chapter.connectivity_foundations
      capabilities:
        - capability.wifi
        - capability.network_configuration
        - capability.local_network_service    appliesWhen:
