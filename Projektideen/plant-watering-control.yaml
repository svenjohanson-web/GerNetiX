learningIntent:
  - Sensorik und Aktorik in einem geschlossenen technischen Ablauf verbinden.
  - Einen Sensorwert als Entscheidungsgrundlage fuer einen Aktor verwenden.
  - Harte Kopplung zwischen Messwert und Pumpensteuerung als erste einfache Steuerung verstehen.
  - Grenzen einfacher Ein/Aus-Steuerung erkennen.
  - Nachlauf, Schaltflattern und Grenzwertprobleme als Motivation fuer bessere Steuerungslogik erleben.
  - Fehlerfaelle erkennen und Schutzgrenzen definieren, damit ein technischer Defekt nicht zu Wasserschaden fuehrt.
  - Betriebsdaten sichtbar machen: Feuchteverlauf, Pumpenlaufzeit, Wasserstand und Nachfuellereignisse.
didacticFlow:
  - Bodenfeuchtesensor auslesen und Rohwert interpretieren.
  - Pumpe als Aktor ueber digitale Ansteuerung ein- und ausschalten.
  - Sensorwert und Pumpenzustand direkt koppeln.
  - "Grenzwert definieren: Wenn Feuchte zu niedrig ist, Pumpe einschalten."
  - Pumpe ausschalten, wenn Feuchte hoch genug ist.
  - Beobachten, dass Wasser nachlaeuft und Messwerte verzoegert reagieren.
  - Problem erleben: Pumpe kann bei hartem Grenzwert staendig ein- und ausschalten.
  - Einfache Schutzmassnahmen sammeln: Mindestlaufzeit, Pause, Hysterese, Maximaldauer.
  - Fehlerfaelle betrachten: Sensor defekt, Sensor falsch gesteckt, unrealistische Messwerte, leerer Tank, blockierte Pumpe.
  - Begrenzungen einfuehren: maximale Pumpenlaufzeit, maximales Wasservolumen pro Zyklus und Sperrzeit nach Bewaesserung.
  - "Waesserungsverlauf bereitstellen: Feuchte ueber Zeit, Pumpenlaufzeit, Wasserstand und Nachfuellmenge."
  - Auswerten, ob die Bewaesserung plausibel wirkt oder ob ein Fehlerfall wahrscheinlich ist.
  - Abschlusskapitel: Steuerung, Regelung, Strecke, Sensor, Aktor und Systemgrenzen einordnen.
coreInsights:
  - Sensorwerte koennen Aktoren direkt beeinflussen, aber direkte Kopplung ist oft zu sprunghaft.
  - Eine Pumpe, Erde und Wasser bilden eine traege Strecke mit Nachlauf.
  - Ein einzelner Grenzwert ist leicht verstaendlich, aber technisch nicht immer robust.
  - Erste Steuerungslogik entsteht, sobald ein Messwert eine Aktion ausloest.
  - Bessere Regelungen entstehen aus beobachteten Problemen wie Flattern, Verzoegerung und Ueberwaesserung.
  - Fehlerfaelle muessen nicht perfekt geloest werden, aber sie muessen erkannt oder begrenzt werden.
  - Ein technisches System braucht Schadensgrenzen, besonders wenn Wasser, Strom und unbeaufsichtigter Betrieb zusammenkommen.
  - Laufzeit- und Verlaufsdaten helfen, das Verhalten der Strecke zu verstehen und spaeter bessere Regeln abzuleiten.
controlConcepts:
  initialControl:
    title: Harte Ein/Aus-Steuerung
    behavior:
      - "Feuchtigkeit unter Grenzwert: Pumpe an."
      - "Feuchtigkeit ueber Grenzwert: Pumpe aus."
    purpose: Einfachster Lernerfolg fuer Kopplung von Sensorik und Aktorik.
    knownProblems:
      - Schaltflattern um den Grenzwert
      - Nachlauf durch Wassertransport und Bodentraegheit
      - moegliche Ueberwaesserung
      - Pumpenverschleiss durch haeufiges Schalten
  possibleImprovements:
    - Hysterese mit Einschalt- und Ausschaltgrenze
    - Mindestlaufzeit fuer die Pumpe
    - Sperrzeit nach Pumpenlauf
    - Maximaldauer als Trockenlaufschutz oder Sicherheit
    - Mittelwertbildung oder Filterung des Sensorsignals
    - spaeter echte Regelungsbetrachtung mit Strecke und Zeitverhalten
failureCases:
  sensorFailures:
    - id: failure.sensor_disconnected
      title: Sensor nicht verbunden oder Kontaktproblem
      observation: Messwert bleibt unplausibel konstant, springt stark oder liegt ausserhalb des erwarteten Bereichs.
      mitigation:
        - Plausibilitaetsgrenzen fuer Rohwerte definieren.
        - Bei unplausiblem Wert Pumpe nicht automatisch einschalten.
        - Fehlerzustand sichtbar machen.
    - id: failure.sensor_wrong_position
      title: Sensor steckt nicht richtig in der Erde
      observation: Sensor misst Luft, trockene Oberflaeche oder falsche Pflanzzone statt relevante Bodenfeuchte.
      mitigation:
        - Einbauhinweise und Kalibrierung als Teil des Projekts behandeln.
        - Messwertverlauf beobachten statt Einzelwert blind vertrauen.
        - Warnung bei unrealistisch schneller oder ausbleibender Feuchteaenderung.
    - id: failure.sensor_defective
      title: Sensor defekt oder verschlissen
      observation: Werte aendern sich trotz Bewaesserung nicht plausibel oder liegen dauerhaft am Anschlag.
      mitigation:
        - Sensorwerte gegen erwartete Reaktion nach Pumpenlauf pruefen.
        - Automatik deaktivieren, wenn mehrere Zyklen keine plausible Reaktion zeigen.
        - Diagnosezustand und manuelle Pruefung vorsehen.
  actuatorFailures:
    - id: failure.pump_no_water
      title: Tank leer oder Pumpe laeuft trocken
      observation: Pumpe laeuft, aber Feuchtigkeit steigt nicht.
      mitigation:
        - Maximale Pumpenlaufzeit begrenzen.
        - Wasserstand erfassen oder Tankleerstand als offene Erweiterung markieren.
        - Nach mehreren erfolglosen Laeufen Automatik sperren.
    - id: failure.pump_stuck_on
      title: Pumpe bleibt an oder Schaltelement haengt
      observation: Pumpenzustand passt nicht zur Steuerentscheidung oder Wasser laeuft weiter.
      mitigation:
        - Hardwareseitige Begrenzung und sichere Treiberstufe diskutieren.
        - Softwareseitig maximale Laufzeit und Alarmzustand definieren.
        - Spaeter Rueckmeldung ueber Stromaufnahme oder Durchfluss als Variante betrachten.
safetyLimits:
  - id: limit.max_pump_runtime
    title: Maximale Pumpenlaufzeit pro Zyklus
    rationale: Begrenzt die Wassermenge, falls Sensorwert oder Bodenreaktion nicht plausibel ist.
  - id: limit.max_daily_runtime
    title: Maximale Pumpenlaufzeit pro Tag
    rationale: Begrenzt Gesamtrisiko bei unbeaufsichtigtem Betrieb.
  - id: limit.cooldown_after_watering
    title: Sperrzeit nach Bewaesserung
    rationale: Gibt Wasser und Erde Zeit zu reagieren und verhindert schnelles Nachschalten.
  - id: limit.max_volume_per_cycle
    title: Maximales Wasservolumen pro Zyklus
    rationale: Macht aus Laufzeit eine abschaetzbare Wassermenge, wenn Pumpenfoerdermenge bekannt oder kalibriert ist.
  - id: limit.fail_closed
    title: Im Fehlerfall Pumpe aus
    rationale: Bei unplausiblen Sensorwerten ist Nicht-Bewaessern meist sicherer als unkontrolliertes Pumpen.
monitoringAndData:
  trackedValues:
    - Bodenfeuchte als Rohwert und interpretierter Feuchtewert
    - Pumpenzustand
    - Pumpenlaufzeit pro Zyklus
    - aufsummierte Pumpenlaufzeit pro Tag
    - geschaetztes Wasservolumen pro Zyklus
    - Wasserstand oder Tankstatus, falls Sensor vorhanden
    - Nachfuellereignisse und Nachfuellmenge, falls manuell erfasst
  views:
    - "Aktueller Zustand: trocken, ausreichend feucht, bewaessert gerade, Fehlerzustand."
    - Feuchteverlauf ueber Zeit.
    - Pumpenlaufzeiten und Bewaesserungsereignisse.
    - Wasserverbrauch beziehungsweise geschaetzte Foerdermenge.
    - Diagnoseansicht fuer unplausible Sensor-/Aktorreaktionen.
  didacticPurpose:
    - Aus einem einfachen Schwellwertsystem wird ein beobachtbares technisches System.
    - Der Verlauf zeigt, ob die Steuerlogik zur realen Strecke passt.
    - Monitoring liefert die Grundlage fuer spaetere Regelungsverbesserungen.
