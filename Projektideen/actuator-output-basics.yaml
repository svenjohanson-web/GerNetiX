  learnerReflection:
    - Du kannst jetzt Mikrocontroller-Ausgaenge schalten.
    - Du verstehst Frequenz, Tastverhaeltnis und PWM als Grundlage fuer viele Aktoren.
    - Du hast gesehen, wie ein lokaler Webserver ein Geraet per Handy bedienbar macht.
  inspirationProjects:
