    - id: suggestion.iot_basics
      title: IoT Basics
      rationale: Vertieft lokale Webserver, Netzwerkfaehigkeit und Bedienung ueber Handy oder PC.
  salesBridge:
    freeMessage: Du hast die Grundlagen gesehen. Wenn du echte Sensoren, Aktoren und kleine Systeme bauen willst, ist der naechste Kurs der logische Schritt.
openQuestions:
