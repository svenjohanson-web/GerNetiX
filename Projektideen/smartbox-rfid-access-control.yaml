    title: Gefuehrter Code-Walkthrough mit Zeilenfokus
    appliesWhen:
      - Projekt fuehrt neuen Code ein oder verbindet Codezeilen mit beobachtbarer Hardwarewirkung.
    requiredCapabilities:
      - capability.guided_code_highlighting
      - capability.code_step_explanation
      - capability.parameter_experiment
      - capability.hardware_effect_observation
    chapterRole: Wiederkehrendes Unterkapitel fuer schrittweises Codeverstaendnis mit fokussierter Hervorhebung und kleinen Experimenten.
    keyTradeoff: Geringe kognitive Last gegen langsamere, aber stabilere Einfuehrung in Code und Hardwarewirkung.  - id: reusable_chapter.embedded_webserver_basics
    title: Embedded Webserver fuer Status und Bedienung
    preconditions:
      chapters:
        - reusable_chapter.connectivity_foundations
      capabilities:
        - capability.wifi
        - capability.network_configuration
        - capability.local_network_service    appliesWhen:
      - Projektvariante stellt Status, Messwerte, Parameter oder Bedienung direkt per lokalem Webserver bereit.
    requiredCapabilities:
      - capability.wifi
      - capability.local_network_service
      - capability.embedded_webserver
      - capability.web_ui_status_view
      - capability.web_ui_control
      - capability.http_endpoint
    chapterRole: Wiederkehrendes Unterkapitel fuer lokale Weboberflaechen und einfache HTTP-Endpunkte auf dem Geraet.
    keyTradeoff: Lokale Einfachheit gegen Sicherheit, Remote-Zugriff, parallele Nutzer und Backend-/App-Bedarf.  - id: reusable_chapter.connectivity_foundations
    title: Connectivity-Grundlagen fuer WLAN, Zeit und Updates
    appliesWhen:
      - Projektvariante nutzt WLAN, lokalen Webserver, Uhrzeit aus dem Netzwerk, Backend, Push, Remote Monitoring oder OTA-/Update-Vorbereitung.
    requiredCapabilities:
      - capability.wifi
      - capability.network_configuration
      - capability.network_time_sync
      - capability.local_network_service
      - capability.remote_update_preparation
    chapterRole: Wiederkehrendes Unterkapitel fuer nutzbare Netzwerkstrukturen, nicht fuer eine tiefe WiFi-Stack-Implementierung.
    keyTradeoff: Lokale Funktion gegen Netzwerkabhaengigkeit, Komfort, Updatefaehigkeit und Fehlerbehandlung.  - id: reusable_chapter.power_management_battery_operation
    title: Power-Management bei Akku- oder Batteriebetrieb
    appliesWhen:
      - Projekt wird mit Akku, Batterie oder begrenzter Energieversorgung betrieben.
      - Sensoren, Funkmodule, Anzeigen oder Aktoren muessen nicht dauerhaft aktiv sein.
    requiredCapabilities:
      - capability.energy_storage
      - capability.battery_powered_operation
      - capability.power_management
      - capability.low_power_mode
      - capability.energy_budget_estimation
    chapterRole: Wiederkehrendes Unterkapitel zur Frage, wie lange das Geraet mit Akku sinnvoll betrieben werden kann.
    keyTradeoff: Akkulaufzeit gegen Messintervall, Reaktionszeit, Funkhaeufigkeit und Komfort.
completionInspiration:
  didacticPurpose: Nach der lokalen Smartbox zeigen, dass Identifikation und Autorisierung auch Grundlage fuer vernetzte Benachrichtigung, Audit und Verwaltung sind.
  learnerReflection:
    - Du kannst Identifikation, Authentifizierung und Autorisierung unterscheiden.
    - Du kannst lokale Berechtigungen speichern und pruefen.
    - Du verstehst, warum lokale Zugriffskontrolle und Remote-Benachrichtigung unterschiedliche Faehigkeiten brauchen.
  inspirationProjects:
    - id: inspiration.toolbox_access_log
      title: Werkzeugkiste mit Zugriffshistorie
      summary: Lokale Oeffnungen werden protokolliert und spaeter ausgewertet.
      reusedCapabilities:
        - rfid_tag_reading
        - local_authorization_logic
        - timestamped_event_log_optional
    - id: inspiration.smartbox_push_notification
      title: Benachrichtigung bei Oeffnung
      summary: Beim Aktivieren oder Oeffnen wird eine Push- oder SMS-artige Nachricht versendet.
      reusedCapabilities:
        - access_event_generation
        - wireless_network
        - remote_message_delivery
  nextCourseSuggestions:
    - id: suggestion.iot_everyday_infrastructure
      title: IoT im Alltag mit bestehender Infrastruktur
      rationale: Nutzt etablierte Systeme wie Home Assistant, lokalen Server, Alexa-/Smart-Home-Anbindungen oder vorhandene Marktprodukte, um schnell alltagstaugliche Bedienung und Automatisierung zu erreichen.
    - id: suggestion.smartphone_app_development
      title: App-Entwicklung fuer Smartphones
      rationale: Zeigt den anspruchsvolleren Weg zur eigenen Android- oder iOS-App inklusive Plattformhuerden, Build-/Deploy-Prozessen, Accounts, Freigabewegen und App-spezifischer Bedienlogik.
    - id: suggestion.iot_everyday
      title: IoT im Alltag
      rationale: Zeigt sichere Remote-Benachrichtigung, Heimnetz-Zugriff und App-/Cloud-Anbindung, ohne sofort eigene Mobile-App-Entwicklung vorauszusetzen.
    - id: suggestion.embedded_security_basics
      title: Embedded Security Basics
      rationale: Vertieft Grenzen einfacher RFID-Systeme, Rechteverwaltung und sichere Zugriffsmuster.
  progressionPaths:
    - id: path.existing_infrastructure
      title: Bestehende Infrastruktur nutzen
      summary: Home Assistant, lokaler Server, Alexa-/Smart-Home-Anbindungen oder etablierte Marktprodukte nehmen viel Integrationsarbeit ab und machen schnelle Alltagsloesungen moeglich.
      fit:
        - Nutzer will schnell ein brauchbares Ergebnis.
        - Nutzer moechte nicht sofort App Stores, Mobile-Builds oder Plattformfreigaben lernen.
        - Bestehende Infrastruktur ist akzeptabel oder sogar gewuenscht.
