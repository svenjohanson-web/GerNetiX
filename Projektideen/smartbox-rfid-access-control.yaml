targetAudience:
  - Lernende nach GPIO, Aktorik und Persistenz-Grundlagen
  - Nutzer, die Identifikation, Authentifizierung und Autorisierung an einem greifbaren Embedded-System verstehen wollen
  - Maker, die eine kleine RFID-Schlossbox bauen und erweitern wollen
applicationScenarios:
  - kleine Smartbox oder Schlossbox fuer Lernzwecke
  - Zugangskontrolle fuer ein Modell, Fach oder Gehaeuse
  - Demonstrator fuer Rechteverwaltung ohne Netzwerk
  - spaetere Benachrichtigung bei Aktivierung oder Zugriff
recommendedHardware:
  - Artefakt fuer local_access_control_node, zum Beispiel Arduino-Nano-geeignete Mikrocontrollerklasse
  - Artefakt fuer rfid_reader
  - ein oder mehrere RFID-Tags
  - Artefakt fuer lock_actuator, zum Beispiel Servo
  - Artefakte fuer user_input zum Anlernen und zur Rechtevergabe
  - optional Artefakt fuer status_output, zum Beispiel LED oder Buzzer
  - optional Artefakt fuer persistent_storage, falls nicht intern vorhanden
  - mechanische Box mit Servo-Verriegelung
technicalRequirements:
  modelingPrinciple: Die Smartbox wird zuerst als lokales, nicht vernetztes Embedded-System modelliert; konkrete Boards, Reader, Tags und Servos werden spaeter ueber den Hardware-Katalog auf Rollen und Faehigkeiten gemappt.
  requiredCapabilityBundles:
    - id: bundle.local_access_control_node
      role: local_access_control_node
      cardinality: exactly_one
      requiredCapabilities:
        - programmable_microcontroller
        - gpio_input
        - gpio_output
        - chip_to_chip_communication
        - decision_logic
      purpose: Liest RFID-Ereignisse, verwaltet lokale Zustaende und steuert die Verriegelung.
    - id: bundle.rfid_reader
      role: rfid_reader
      cardinality: exactly_one
      requiredCapabilities:
        - rfid_tag_reading
        - chip_to_chip_interface
      purpose: Liest Tag-Informationen und stellt sie dem Mikrocontroller ueber ein Chip-Interface bereit.
    - id: bundle.rfid_tag
      role: identity_token
      cardinality: one_or_more
      requiredCapabilities:
        - physical_identifier
      purpose: Repraesentiert eine physische Identitaet, die erkannt werden kann.
    - id: bundle.lock_actuator
      role: lock_actuator
      cardinality: exactly_one
      requiredCapabilities:
        - mechanical_locking_motion
        - position_command
      purpose: Oeffnet oder verschliesst die Box mechanisch.
    - id: bundle.enrollment_input
      role: enrollment_input
      cardinality: one_or_more
      requiredCapabilities:
        - local_user_input
      purpose: Aktiviert Anlernen oder Rechtevergabe ohne Netzwerk.
  optionalCapabilityBundles:
    - id: bundle.authorization_storage
      role: authorization_storage
      cardinality: zero_or_one
      requiredCapabilities:
        - persistent_storage
      purpose: Speichert bekannte Tags und Berechtigungen ueber Reset oder Stromausfall hinweg.
    - id: bundle.status_feedback
      role: status_feedback
      cardinality: zero_or_one
      requiredCapabilities:
        - visible_or_acoustic_feedback
      purpose: Zeigt erkannt, unbekannt, berechtigt, nicht berechtigt oder Lernmodus an.
    - id: bundle.connected_notification_node
      role: connected_notification_node
      cardinality: zero_or_one
      requiredCapabilities:
        - wireless_network
        - event_notification
        - remote_message_delivery
      purpose: Spaetere ESP32- oder Connected-Variante fuer Push-Benachrichtigungen bei Aktivierung der Smartbox.
  hardwareCatalogMapping: Arduino Nano, Arduino-kompatible Mikrocontroller, RFID-Reader, RFID-Tags, Servo, Taster, LEDs, Buzzer, EEPROM/Flash und spaeter ESP32 werden als konkrete Hardware-Artefakte auf diese Rollen gemappt.
implementationBoundary:
  localRealization:
    principle: RFID lesen, Tag identifizieren, Berechtigungen pruefen, Servo bewegen, Anlernen und Persistenz koennen lokal ohne WLAN umgesetzt werden.
    possibleHardwareClass:
      - Arduino-Nano-geeignete Mikrocontrollerklasse fuer die erste lokale Variante
      - ESP-Klasse, wenn sie lokal ohne Netzwerk genutzt wird
    requiredCapabilities:
      - programmable_microcontroller
      - chip_to_chip_communication
      - gpio_input
      - gpio_output
      - decision_logic
      - persistent_storage_optional
  connectedRealization:
    trigger: Sobald Push-, SMS-artige oder Remote-Benachrichtigungen, Fernverwaltung oder Zugriffshistorie ausserhalb der Box Teil der Variante werden.
    requiredCapabilities:
      - wireless_network
      - event_notification
      - remote_message_delivery
    catalogImplication: Ein Arduino Nano erfuellt diese Netzwerk-/Benachrichtigungsfaehigkeiten nicht allein; dafuer braucht es ein netzwerkfaehiges Artefakt wie ESP32-Klasse, Kommunikationsmodul oder Gateway.
learningIntent:
  - Chip-zu-Chip-Kommunikation zwischen Mikrocontroller und RFID-Reader verstehen.
  - Erkennen, dass ein RFID-Reader nicht automatisch Rechte entscheidet, sondern nur Identifikationsdaten liefert.
  - Identifikation, Authentifizierung und Autorisierung sauber voneinander unterscheiden.
  - Lokalen Anlernmodus fuer Tags modellieren und implementieren.
  - Rechte getrennt von Identitaeten speichern und pruefen.
  - Servo-Verriegelung als mechanischen Aktor in eine Zustandslogik einbinden.
  - Persistenz als notwendige Eigenschaft fuer gelernte Tags und Berechtigungen erleben.
  - Grenzen einfacher RFID-UID-Erkennung und Sicherheitsannahmen kritisch einordnen.
didacticFlow:
  - Smartbox und mechanische Systemgrenze erklaeren: Box, Verriegelung, Servo, Reader, Tag und Bedienknopf.
  - RFID-Reader elektrisch anschliessen und Chip-zu-Chip-Kommunikation einfuehren.
  - Erstes Tag lesen und UID oder Identifier anzeigen.
  - Identifikation klaeren: Das System erkennt eine Identitaet oder ein Token.
  - Authentifizierung klaeren: Das System akzeptiert ein Tag als bekannt oder glaubwuerdig.
  - Autorisierung klaeren: Ein bekanntes Tag darf nicht automatisch jede Aktion ausfuehren.
  - Servo als Verriegelungsaktor ansteuern: offen, geschlossen, optional blockiert.
  - Anlernmodus per Taste einfuehren: naechstes Tag wird als bekannte Identitaet gespeichert.
  - Rechtevergabe einfuehren: Tag darf oeffnen oder Tag darf oeffnen und schliessen.
  - Reset-Problem erleben: Ohne Persistenz gehen gelernte Tags und Rechte verloren.
  - Persistente Speicherung der Tag-Rechte einfuehren.
  - Fehler- und Missbrauchsfaelle betrachten: unbekanntes Tag, verlorenes Tag, versehentlicher Lernmodus, Servo blockiert.
  - Abschlusskapitel: Identifikation, Authentifizierung, Autorisierung, lokale Sicherheit, Persistenz und spaetere Connected-Erweiterung einordnen.
coreInsights:
  - Ein RFID-Tag identifiziert sich, aber Identifikation ist noch keine Berechtigung.
  - Autorisierung ist eine getrennte Entscheidung: Welche Identitaet darf welche Aktion ausfuehren?
  - Lokale Zugriffskontrolle kann ohne Netzwerk verstanden und gebaut werden.
  - Persistenz ist notwendig, sobald das System gelernte Identitaeten behalten soll.
  - Mechanische Verriegelung, Elektronik und Softwarezustand muessen zusammenpassen.
  - Einfache RFID-UID-Systeme sind didaktisch gut, aber keine starke Sicherheitsloesung.
identityConcepts:
  identification:
    question: Wer oder was meldet sich?
    example: RFID-Tag liefert eine UID oder einen Identifier.
  authentication:
    question: Akzeptiert das System dieses Tag als bekannt oder vertrauenswuerdig?
    example: UID steht in der lokalen Liste bekannter Tags.
  authorization:
    question: Welche Aktion darf diese Identitaet ausfuehren?
    example: Tag A darf oeffnen, Tag B darf oeffnen und schliessen, Tag C ist bekannt aber nicht berechtigt.
accessModel:
  permissions:
    - id: permission.open_box
      title: Box oeffnen
    - id: permission.close_box
      title: Box schliessen
    - id: permission.enroll_tag
      title: Tag anlernen
      notes: Sollte nicht beliebig fuer jedes Tag freigegeben werden.
  localRoles:
    - id: role.unknown_tag
      title: Unbekanntes Tag
      permissions: []
    - id: role.known_guest
      title: Bekannt, aber ohne Oeffnungsrecht
      permissions: []
    - id: role.opener
      title: Darf oeffnen
      permissions:
        - permission.open_box
    - id: role.operator
      title: Darf oeffnen und schliessen
      permissions:
        - permission.open_box
        - permission.close_box
controlConcepts:
  stateMachine:
    states:
      - locked
      - unlocked
      - enrolling
      - authorization_edit
      - denied
      - error
    events:
      - tag_detected
      - enroll_button_pressed
      - permission_button_pressed
      - servo_move_completed
      - timeout
      - reset
    purpose: Macht sichtbar, dass Zugriffskontrolle nicht nur eine If-Abfrage ist, sondern ein Zustandssystem.
  enrollmentFlow:
    steps:
      - Lernmodus lokal per Taste aktivieren.
      - Naechstes gelesenes Tag als Identitaet speichern.
      - Standardrecht vergeben oder zweiten Modus fuer Rechteauswahl nutzen.
      - Lernmodus verlassen und Feedback geben.
  authorizationFlow:
    steps:
      - Tag lesen.
      - Identitaet nachschlagen.
      - Berechtigungen pruefen.
      - Aktor nur bei passender Berechtigung bewegen.
failureCases:
  identityFailures:
    - id: failure.unknown_tag
      title: Unbekanntes Tag
      observation: Tag wird gelesen, ist aber nicht gespeichert.
      mitigation:
        - Zugriff verweigern.
        - Feedback anzeigen.
        - Optional Ereignis fuer spaetere Connected-Variante vormerken.
    - id: failure.lost_tag
      title: Verlorenes oder weitergegebenes Tag
      observation: Physisches Tag kann von anderer Person genutzt werden.
      mitigation:
        - Loesch- oder Sperrfunktion als spaetere Erweiterung vorsehen.
        - Sicherheitsgrenzen einfacher RFID-UID-Systeme erklaeren.
    - id: failure.cloned_or_weak_tag
      title: UID ist keine starke Authentifizierung
      observation: Einfache Tags koennen je nach Technologie kopierbar oder schwach sein.
      mitigation:
        - Didaktische Abgrenzung zwischen Demo-Zugriff und echter Sicherheit.
        - Staerkere Authentifizierungsverfahren als spaetere Theorie- oder Advanced-Variante markieren.
  operationFailures:
    - id: failure.enrollment_left_active
      title: Lernmodus bleibt versehentlich aktiv
      observation: Ungewolltes Tag wird angelernt.
      mitigation:
        - Timeout fuer Lernmodus.
        - Sichtbares oder hoerbares Feedback im Lernmodus.
        - Anlernen nur nach bewusstem Tastendruck.
    - id: failure.servo_blocked
      title: Servo oder Verriegelung blockiert
      observation: Boxzustand und Sollzustand passen mechanisch nicht zusammen.
      mitigation:
        - Laufzeitbegrenzung fuer Servo.
        - Fehlerzustand anzeigen.
        - Mechanische Endlagen und Kraftbegrenzung diskutieren.
    - id: failure.power_loss
      title: Stromausfall oder Reset
      observation: RAM-Zustand geht verloren, Verriegelung kann mechanisch in altem Zustand bleiben.
      mitigation:
        - Berechtigungen persistent speichern.
        - Beim Start mechanischen Zustand plausibilisieren oder definierte Startposition anfahren.
safetyAndBoundaries:
  - Servo und Mechanik duerfen keine gefaehrlichen Klemmstellen erzeugen.
  - Die Box ist ein Lernsystem und keine zertifizierte Sicherheitsloesung.
  - Einfache RFID-UID-Erkennung darf nicht als starke Sicherheit verkauft werden.
  - Lernmodus und Rechtevergabe brauchen klare lokale Bedienlogik und Feedback.
  - Mechanischer Zustand, Softwarezustand und Berechtigungszustand muessen konsistent betrachtet werden.
variants:
  - id: variant.local_arduino_rfid_box
    title: Lokale RFID-Smartbox ohne Netzwerk
    notes: Erste Hauptvariante, geeignet fuer Arduino-Nano- oder vergleichbare Mikrocontrollerklasse.
    capabilityRequirements:
      roles:
        - role: local_access_control_node
          cardinality: exactly_one
          requiredCapabilities:
            - programmable_microcontroller
            - chip_to_chip_communication
            - gpio_input
            - gpio_output
            - decision_logic
        - role: rfid_reader
          cardinality: exactly_one
          requiredCapabilities:
            - rfid_tag_reading
            - chip_to_chip_interface
        - role: identity_token
          cardinality: one_or_more
          requiredCapabilities:
            - physical_identifier
        - role: lock_actuator
          cardinality: exactly_one
          requiredCapabilities:
            - mechanical_locking_motion
            - position_command
        - role: enrollment_input
          cardinality: one_or_more
          requiredCapabilities:
            - local_user_input
  - id: variant.persistent_local_permissions
    title: Lokale Berechtigungen persistent speichern
    notes: Erweiterung, sobald Reset oder Stromausfall die gelernten Tags loescht.
    capabilityRequirements:
      roles:
        - role: authorization_storage
          cardinality: exactly_one
          requiredCapabilities:
            - persistent_storage
        - role: local_access_control_node
          cardinality: exactly_one
          requiredCapabilities:
            - local_authorization_logic
            - storage_read_write
  - id: variant.connected_activation_notification
    title: Connected-Variante mit Aktivierungsbenachrichtigung
    notes: Spaetere ESP32- oder Netzwerkvariante; Push-Nachricht, wenn die Smartbox aktiviert oder geoeffnet wurde.
    capabilityRequirements:
      roles:
        - role: connected_notification_node
          cardinality: exactly_one
          requiredCapabilities:
            - wireless_network
            - event_notification
            - remote_message_delivery
        - role: local_access_control_node
          cardinality: exactly_one
          requiredCapabilities:
            - access_event_generation
            - decision_logic
    exampleNotification: Deine Smartbox wurde aktiviert.
  - id: variant.remote_access_audit
    title: Zugriffshistorie und Remote-Audit
    notes: Fortgeschrittene Variante fuer Ereignisprotokoll, unbekannte Tags und spaetere Verwaltung.
    capabilityRequirements:
      roles:
        - role: access_event_log
          cardinality: exactly_one
          requiredCapabilities:
            - timestamped_event_log
            - identity_event_recording
        - role: remote_monitoring_backend
          cardinality: zero_or_one
          requiredCapabilities:
            - remote_event_ingestion
            - notification_policy
crossCuttingChapters:
