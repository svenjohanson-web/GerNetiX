summary: Lernprojekt fuer eine kleine verschliessbare Box mit RFID-Reader, Mikrocontroller, Servo-Verriegelung, Anlernmodus und getrennten Konzepten fuer Identifikation, Authentifizierung und Autorisierung.
salesRole: Advanced-Projekt fuer Embedded Security, Chip-zu-Chip-Kommunikation, Zustandslogik und persistente Berechtigungen.
