    grantSources:
      - plan.premium
      - account_system_capability_override
    rationale: Backend-, MQTT-, Multi-Client- und Plattformfunktionen duerfen zusaetzlich berechtigt werden.
  previewAccess:
    requiredGrants:
      - system_capability.learning_project_preview
