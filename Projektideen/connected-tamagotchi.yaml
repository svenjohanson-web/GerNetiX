slug: connected-tamagotchi
title: Connected Tamagotchi
projectStatus: idea
domain: embedded_iot_connected_systems
summary: Lernprojekt fuer State Machines, Persistenz, Zeit, Backend-Logik, mehrere Clients und Architekturentscheidungen zwischen Offline- und Online-Betrieb.
salesRole: Premium-/Advanced-Projekt fuer Connected Embedded Systems.
