      - requirement.verified_answer_status_visible
      - requirement.reverify_changed_verified_answer

  - id: api_artifact.identity
    type: api_artifact
    title: Identity API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: API-Artefakt fuer klassische Registrierung, E-Mail-Verifizierung, lokalen Login, Social Login ueber gekapselte Provider, Logout, Passwort-Reset und lokale Plattform-Adapter wie den Architektur-Discovery-Assistenten. Public Responses duerfen keine Provider-IDs und keine interne E-Mail als oeffentliche Identitaet exponieren.
    derivedFromRequirements:
      - requirement.identity_registration_login
      - requirement.architecture_discovery_guided_by_llm
    endpoints:
      - POST /api/platform/development-projects
      - POST /api/platform/development-projects/{project_id}/architecture
      - POST /api/platform/development-assistant/chat
      - GET /api/platform/projects/{project_id}/sources
      - GET /api/platform/projects/{project_id}/sources/{relative_path}
      - PUT /api/platform/projects/{project_id}/sources/{relative_path}
    responseSections:
      - message
      - usage
      - config
      - architectureDiagram
    rules:
      - Der Architektur-Discovery-Chat akzeptiert nur accountgebundene Entwicklungsprojekte.
      - Entwicklungsprojekte werden ueber den Project Server mit `user_id` persistiert.
      - Gespeicherte Architekturdiagramme werden als `docs/architecture.puml` und ProjectViewManifest-PlantUML-View abgelegt.
      - Beim Speichern der Architektur werden zusaetzlich Project-Server-Quellen fuer `Architektur/statische-architektur`, `Architektur/informationsfluss` und Komponentenordner mit `Schnittstellen/provided.md`, `Schnittstellen/required.md`, `Behavior/Modell`, `Behavior/Code` sowie `Behavior/Config` erzeugt.
      - Nach Nutzerbestaetigung kann die Entwicklungsplattform die Architektur speichern und direkt in die IDE wechseln; die IDE liest die Projektquellenliste aus dem Project Server und zeigt daraus den Projektbrowser.
      - `architectureDiagram` enthaelt eine KI-abgeleitete PlantUML-Skizze und ist keine bestaetigte Architekturentscheidung.

  - id: api_artifact.account_self_transparency
    type: api_artifact
    title: Account Self Transparency API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: API-Artefakt fuer die Kunden-IDE-Sicht `Was weiss GerNetiX ueber mich?`. Liefert einen aktuellen AccountTransparencySnapshot fuer den angemeldeten Nutzer, kann eine explizite Aktualisierung ausloesen und markiert, ob der Snapshot wegen Aenderungen an Payment, Abos, Angeboten, Grants, Devices, Lernfortschritt, KI-Nutzung oder Consents veraltet war.
    derivedFromRequirements:
      - requirement.account_self_transparency_view
    usesApiArtifacts:
      - api_artifact.identity
      - api_artifact.account_competency_profile
      - api_artifact.account_device_inventory
      - api_artifact.ai_credit_balance
      - api_artifact.customer_data_access_consent
    relatedDataModels:
      - data_model.account_transparency_snapshot
    endpoints:
      - GET /account/me/transparency
      - POST /account/me/transparency/refresh
      - GET /api/account/me/transparency
      - POST /api/account/me/transparency/refresh
    responseSections:
      - identity
      - contact_data
      - login_providers
      - plans_subscriptions_and_purchases
      - product_offerings
      - grants_overrides_and_capabilities
      - devices_and_support
      - learning_profile
      - feedback
      - ai_credits_and_usage
      - consents_and_customer_data_access
      - sources_and_last_updated
    rules:
      - Der Endpunkt liefert ausschliesslich Daten des angemeldeten Accounts.
      - Bei einem veralteten Snapshot darf GET automatisch neu berechnen, solange die Antwortzeit fuer die IDE akzeptabel bleibt.
      - POST /refresh erzwingt eine Neuberechnung aus den fuehrenden Domaenenquellen.
      - Provider-IDs, Passwort-Hashes, Token-Hashes, Device-Secrets, interne Abuse-Signale und interne Anbieter-Kosten duerfen nicht in der Antwort erscheinen.
      - Jede Berechtigung muss mit Quelle und Grund erklaert werden, zum Beispiel Plan, Kurskauf, Einzelgrant, Override, Ablauf oder Widerruf.

