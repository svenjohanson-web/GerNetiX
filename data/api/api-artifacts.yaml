  - id: api_artifact.firmware_build_deploy
    type: api_artifact
    title: Firmware Build & Deploy API
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: API-Artefakt fuer BuildJob-Erzeugung, HTTP-Uebertragung vollstaendiger BuildPackages, BuildResult-Rueckgabe, temporaere Artefaktuebertragung, HTTPS-Firmwarebereitstellung und MQTT-basierte Deploy-Auftraege, Statusmeldungen, Heartbeats und Telemetrie.
    derivedFromRequirements:
