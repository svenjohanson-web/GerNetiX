  - id: api_artifact.ai_admin_cost_controls
    type: api_artifact
    title: AI Admin Cost Controls API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: API-Artefakt fuer administrative Steuerung von Credits, Sperren, Limits, Modellfreigaben, Warnschwellen und globalem KI-Kill-Switch.
    derivedFromRequirements:
      - requirement.ai_usage_limits
      - requirement.ai_model_access_control
      - requirement.ai_global_kill_switch
      - requirement.ai_admin_cost_control_actions

  - id: api_artifact.community_ai_assistant_query
    type: api_artifact
    title: Community AI Assistant Query API
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: API-Artefakt fuer natuerlichsprachliche Premium-Anfragen, RAG-Antworten, Quellenreferenzen, aehnliche Inhalte, Empfehlungen, Zusammenfassungen und Uebersetzungen.
    derivedFromRequirements:
      - requirement.community_ai_assistant_query
      - requirement.community_ai_assistant_sources
      - requirement.community_ai_assistant_premium_access
      - requirement.community_ai_assistant_moderation

  - id: api_artifact.community_ai_assistant_admin
    type: api_artifact
    title: Community AI Assistant Admin API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: API-Artefakt fuer Admin-Konfiguration, erlaubte Quellen, RAG-Konfiguration, Modellparameter, Limits, Monitoring-Kennzahlen und Indexverwaltung des Community-Assistenten.
    derivedFromRequirements:
      - requirement.community_ai_assistant_indexing
      - requirement.community_ai_assistant_admin_configuration
      - requirement.community_ai_assistant_monitoring

  - id: api_artifact.account_competency_profile
    type: api_artifact
    title: Account Competency Profile API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: API-Artefakt fuer Kompetenzprofil, Kompetenzfortschritt, Kompetenznachweise und sichtbares Nutzerfeedback zu erworbenem Koennen.
    derivedFromRequirements:
      - requirement.account_competency_profile
