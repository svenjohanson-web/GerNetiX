schemaVersion: 1
kind: api_artifact_catalog
sourceStatus: legacy_import_source
items:
  - id: api_artifact.community_questions
    type: api_artifact
    title: Community Questions API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer Fragen, Triage und Statusabfrage.
    derivedFromRequirements:
      - requirement.community_question_triage_time

  - id: api_artifact.community_answer_verification
    type: api_artifact
    title: Community Answer Verification API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer Verifizierung, Sichtbarkeit und erneute Pruefung von Antworten.
    derivedFromRequirements:
      - requirement.community_answer_verification
      - requirement.verified_answer_status_visible
      - requirement.reverify_changed_verified_answer

  - id: api_artifact.ai_credit_balance
    type: api_artifact
    title: AI Credit Balance API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer Credit-Guthaben, Verbrauch, verbleibende Credits und Verbrauchshistorie.
    derivedFromRequirements:
      - requirement.ai_credit_balance

  - id: api_artifact.ai_usage_preflight
    type: api_artifact
    title: AI Usage Preflight API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Serverseitige Vorpruefung fuer kostenpflichtige KI-Aufrufe gegen Credits, Budgets, Modellfreigabe, Rate Limits und Kill-Switch.
    derivedFromRequirements:
      - requirement.ai_prepaid_credit_check

  - id: api_artifact.ai_usage_events
    type: api_artifact
    title: AI Usage Events API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer serverseitige Erfassung und Auswertung von KI Usage Events.
    derivedFromRequirements:
      - requirement.ai_usage_event_audit_trail

  - id: api_artifact.ai_admin_usage_dashboard
    type: api_artifact
    title: AI Admin Usage Dashboard API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: API-Artefakt fuer Admin-Dashboard-Kennzahlen zu KI-Nutzung, Credits, Tokens, Kosten, Modellen, Fehlern, Ablehnungen, Budgetnaehe und Margen.
    derivedFromRequirements:
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_cost_margin_reporting
      - requirement.ai_suspicious_usage_detection

  - id: api_artifact.ai_admin_cost_controls
    type: api_artifact
    title: AI Admin Cost Controls API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: API-Artefakt fuer administrative Steuerung von Credits, Sperren, Limits, Modellfreigaben, Warnschwellen und globalem KI-Kill-Switch.
    derivedFromRequirements:
      - requirement.ai_usage_limits
      - requirement.ai_model_access_control
      - requirement.ai_global_kill_switch
      - requirement.ai_admin_cost_control_actions

  - id: api_artifact.community_ai_assistant_query
    type: api_artifact
    title: Community AI Assistant Query API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: API-Artefakt fuer natuerlichsprachliche Premium-Anfragen, RAG-Antworten, Quellenreferenzen, aehnliche Inhalte, Empfehlungen, Zusammenfassungen und Uebersetzungen.
    derivedFromRequirements:
      - requirement.community_ai_assistant_query
      - requirement.community_ai_assistant_sources
      - requirement.community_ai_assistant_premium_access
      - requirement.community_ai_assistant_moderation

  - id: api_artifact.community_ai_assistant_admin
    type: api_artifact
    title: Community AI Assistant Admin API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: API-Artefakt fuer Admin-Konfiguration, erlaubte Quellen, RAG-Konfiguration, Modellparameter, Limits, Monitoring-Kennzahlen und Indexverwaltung des Community-Assistenten.
    derivedFromRequirements:
      - requirement.community_ai_assistant_indexing
      - requirement.community_ai_assistant_admin_configuration
      - requirement.community_ai_assistant_monitoring

  - id: api_artifact.account_competency_profile
    type: api_artifact
    title: Account Competency Profile API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: API-Artefakt fuer Kompetenzprofil, Kompetenzfortschritt, Kompetenznachweise und sichtbares Nutzerfeedback zu erworbenem Koennen.
    derivedFromRequirements:
      - requirement.account_competency_profile
      - requirement.competency_evidence_feedback

  - id: api_artifact.learning_feedback
    type: api_artifact
    title: Learning Feedback API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: API-Artefakt fuer Feedback nach abgeschlossenen Steps, Projekten oder Kompetenznachweisen, inklusive Erklaerung, welche Kompetenz wodurch erworben oder vertieft wurde.
    derivedFromRequirements:
      - requirement.competency_evidence_feedback

  - id: api_artifact.learning_recommendations
    type: api_artifact
    title: Learning Recommendations API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: API-Artefakt fuer kompetenzbasierte Empfehlungen zu naechsten Lernschritten, Vertiefungen, Alternativpfaden, Zwischenschritten und Anschlussangeboten.
    derivedFromRequirements:
      - requirement.competency_based_learning_recommendations
      - requirement.non_linear_learning_progression

  - id: api_artifact.learning_step_completion
    type: api_artifact
    title: Learning Step Completion API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: API-Artefakt fuer Auswertung von Completion Conditions, Build-/Flash-Ergebnissen, Board-Adapter-Rueckmeldungen, Nutzerfeedback und daraus entstehender Kompetenznachweise.
    derivedFromRequirements:
      - requirement.learning_step_completion_conditions
      - requirement.board_execution_adapter_for_learning_steps
