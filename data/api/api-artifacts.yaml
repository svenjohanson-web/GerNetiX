  - id: api_artifact.learning_feedback
    type: api_artifact
    title: Learning Feedback API
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Learning
    summary: API-Artefakt fuer Nutzerfeedback zu einzelnen ProjectSteps, Projektabschluss und Kompetenznachweisen. Beim Absenden kann der Nutzer anonym bleiben oder zweckgebunden Kontakt fuer Rueckfragen zu genau diesem Feedback erlauben.
    derivedFromRequirements:
      - requirement.competency_evidence_feedback
      - requirement.learning_project_step_feedback

  - id: api_artifact.admin_learning_feedback
    type: api_artifact
    title: Admin Learning Feedback API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Learning
    summary: API-Artefakt fuer Admin-Sichten auf Step- und Projektfeedback. Feedback kann nach Absender, Projekt, Step, Status und Kontaktmodus sortiert und gefiltert werden; identifizierbare Daten und Kontaktdaten duerfen nur zweckgebunden, berechtigt und auditiert sichtbar werden.
    derivedFromRequirements:
      - requirement.learning_project_step_feedback
      - requirement.customer_data_consent_for_admin_access

  - id: api_artifact.learning_recommendations
    type: api_artifact
    title: Learning Recommendations API
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: API-Artefakt fuer kompetenzbasierte Empfehlungen zu naechsten Lernschritten, Vertiefungen, Alternativpfaden, Zwischenschritten und Anschlussangeboten.
    derivedFromRequirements:
      - requirement.competency_based_learning_recommendations
