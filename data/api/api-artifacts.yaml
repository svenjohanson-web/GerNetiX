  - id: api_artifact.account_device_inventory
    type: api_artifact
    title: Account Device Inventory API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: API-Artefakt fuer das Device-Inventar eines Accounts inklusive Community-Hardware, GerNetiX-Verified-Status, Capabilities, OTA-Status, Projektkompatibilitaet und Discovery-Ergebnissen mit Kontozuordnungsstatus. Die Inventarisierung fragt zuerst einen konkreten Processor-Board-Eintrag aus dem Hardware Catalog API ab, zum Beispiel ESP-WROOM-32 oder ESP-WROOM-32 mit Display. ESP32-Methoden werden daraus abgeleitet und danach ueber WLAN-Suche im Kunden-Netz oder USB/Web-Serial vorbereitet; Setup-AP bleibt Provisioning-/Recovery-Kontext, weil er die Backend-Verbindung der Webapp trennt. Arduino Nano AVR wird experimentell ohne lokale Installation per Browser-Web-Serial-Bootloader-Handshake vorbereitet und danach manuell inventarisiert.
    derivedFromRequirements:
      - requirement.device_customer_registration_and_pairing
      - requirement.community_hardware_supported_without_entitlement
      - requirement.ide_ota_device_selection_from_profile
    endpoints:
      - GET /api/device-management/accounts/{account_id}/devices
      - POST /api/device-management/accounts/{account_id}/devices
      - DELETE /api/device-management/accounts/{account_id}/devices/{account_device_id}
      - GET /api/platform/devices/discover
      - POST /api/platform/devices/from-discovery
      - POST /api/platform/devices
      - DELETE /api/platform/devices/{account_device_id}
      - GET /api/platform/hardware/processor-boards

