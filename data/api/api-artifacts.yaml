  - id: api_artifact.account_device_inventory
    type: api_artifact
    title: Account Device Inventory API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: API-Artefakt fuer das Device-Inventar eines Accounts inklusive Community-Hardware, GerNetiX-Verified-Status, Capabilities, OTA-Status, Projektkompatibilitaet und Discovery-Ergebnissen mit Kontozuordnungsstatus. Die IDE fragt zuerst einen konkreten ProcessorBoard-Eintrag aus dem Hardware Catalog API ab; die Nutzerfuehrung ergibt sich aus Capabilities wie WLAN-Suche, USB-Identifikation, USB-Flash, OTA, Device-HTTP-Status und Basissoftware-Unterstuetzung. Der Nutzer vergibt einen kurzen Board-Namen, aus dem Node-/SSID-/Hostname `gernetix-*` entsteht. Die Seriennummer wird automatisch von GerNetiX erzeugt und dauerhaft im Board beziehungsweise Device-Inventar gespeichert; der Nutzer muss sie normalerweise nicht verwenden. Spezialhardware und Verdrahtung wie Display-I2C, Online-LED-Pin oder Soundtreiber werden als Instanz-Konfiguration am Account-Device gespeichert. Setup-AP bleibt Provisioning-/Recovery-Kontext, weil er die Backend-Verbindung der Webapp trennt.
    derivedFromRequirements:
      - requirement.device_customer_registration_and_pairing
      - requirement.community_hardware_supported_without_entitlement
      - requirement.ide_ota_device_selection_from_profile
    endpoints:
      - GET /api/device-management/accounts/{account_id}/devices
      - POST /api/device-management/accounts/{account_id}/devices
      - DELETE /api/device-management/accounts/{account_id}/devices/{account_device_id}
      - GET /api/platform/devices/discover
      - POST /api/platform/devices/from-discovery
      - POST /api/platform/devices
      - DELETE /api/platform/devices/{account_device_id}
      - GET /api/platform/hardware/processor-boards

