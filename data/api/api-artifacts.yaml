schemaVersion: 1
kind: api_artifact_catalog
sourceStatus: legacy_import_source
items:
  - id: api_artifact.context_manager
    type: api_artifact
    title: Codex Context Manager API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: API-Artefakt fuer aktuelle Projektkontexte, Requirement Slices, Artefakt- und Runtime-Referenzen, Entscheidungen, Events, redigierte Context Packs und Redaction.
    derivedFromRequirements:
      - requirement.codex_context_uses_graph_as_source_of_truth
    relatedDataModels:
      - data_model.context_scope
      - data_model.context_requirement_slice
      - data_model.context_pack
    endpoints:
      - GET /api/context/current
      - PUT /api/context/current
      - POST /api/context/requirement-slices
      - POST /api/context/artifact-references
      - POST /api/context/runtime-references
      - POST /api/context/decisions
      - POST /api/context/events
      - POST /api/context/packs
      - GET /api/context/packs/{pack_id}
      - POST /api/context/redact
    rules:
      - Context Packs duerfen sensible Werte nur redigiert ausgeben.
      - Requirement Slices duerfen mehrere Anforderungen, Artefakte und Implementierungsstellen gemeinsam abbilden.

  - id: api_artifact.hardware_shop
    type: api_artifact
    title: Hardware Shop API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: API-Artefakt fuer kaufbare Angebote, Matching, Warenkoerbe, Bestellungen und Kaufkontexte. Der Hardware Shop ist fachlich Client des Hardware Catalog API und fuehrt keine eigene Board-/Capability-Wahrheit.
    usesApiArtifacts:
      - api_artifact.hardware_catalog
    endpoints:
      - GET /api/hardware-shop/offers
      - POST /api/hardware-shop/match
      - POST /api/hardware-shop/carts
      - POST /api/hardware-shop/orders
      - GET /api/hardware-shop/orders/{order_id}/purchase-context
      - POST /api/hardware-shop/admin/offers

  - id: api_artifact.hardware_catalog
    type: api_artifact
    title: Hardware Catalog API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Hardware
    summary: API-Artefakt fuer bekannte HardwareItems, ProcessorBoards und TechnicalCapabilities. Der Katalog ist die fachliche Quelle fuer technische ProcessorBoard-Typen nach ProcessorFamily, MCU-Variante, Modul/Realisierung und offiziellen oder neutral-generischen Boardeintraegen, zum Beispiel Arduino Nano R3 / ATmega328P, Wemos D1 mini / ESP-12F, ESP-WROOM-32, ESP32-S3-WROOM-1, ESP32-C6-WROOM-1, Arduino Nano ESP32 und Espressif DevKitC-Varianten. Spezialhardware wie Display, Sound, Online-LED oder Sensorverdrahtung ist Instanz-Konfiguration am Account-Device, nicht eigene Board-Wahrheit im Katalog.
    endpoints:
      - GET /api/hardware-catalog/capabilities
      - GET /api/hardware-catalog/capabilities/{capability_id}
      - GET /api/hardware-catalog/hardware-items
      - GET /api/hardware-catalog/hardware-items/{hardware_item_id}
      - GET /api/hardware-catalog/processor-boards
      - POST /api/hardware-catalog/admin/capabilities
      - POST /api/hardware-catalog/admin/hardware-items

  - id: api_artifact.admin_tool
    type: api_artifact
    title: Admin Tool API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: API-Artefakt fuer Admin-Uebersicht, Statistikseite, Device-Status, Customer-Data-Access-Consents, Audit Events, Learning Feedback, KI-Usage-Metriken, KI-Kostensteuerung, LLM-Routing-Konfiguration und LLM-Datenfreigaben.
    usesApiArtifacts:
      - api_artifact.hardware_catalog
    derivedFromRequirements:
      - requirement.device_admin_status_inspection
      - requirement.customer_data_consent_for_admin_access
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_admin_cost_control_actions
      - requirement.ai_context_access_control
    endpoints:
      - GET /api/admin/overview
      - GET /api/admin/devices
      - GET /api/admin/devices/{device_id}
      - POST /api/admin/customer-data-access/consents
      - POST /api/admin/customer-data-access/consents/{consent_id}/revoke
      - GET /api/admin/customer-data-access/audit-events
      - GET /api/admin/learning-feedback
      - GET /api/admin/ai-usage/summary
      - GET /api/admin/accounts
      - GET /api/admin/ai-context/summary
      - POST /api/admin/ai-cost-controls/actions
      - GET /api/admin/llm-config
      - PUT /api/admin/llm-config
      - GET /api/admin/llm-models
      - POST /api/admin/llm-config/test
    responseSections:
      - statistics_overview
      - ai_usage_local_llm
      - ai_usage_public_llm_costs
      - ai_source_rating_by_account
      - ai_context_access_summary
      - llm_routing_config
    rules:
      - Oeffentliche LLM-Nutzung muss geschaetzte Providerkosten ausweisen.
      - Lokale LLM-Nutzung fuehrt keine externen Providerkosten.
      - LLM-Routing-Konfiguration muss von Identity Server und Admin Tool aus derselben Runtime-Konfiguration gelesen werden.
      - API-basiertes LLM-Routing unterscheidet `apiProvider` fuer OpenAI Responses API, OpenAI-kompatible Chat-Completions und Claude/Anthropic Messages API.
      - LLM-Routing-Konfiguration enthaelt Task-Routen fuer `general_chat`, `architecture_discovery`, `artifact_generation` und `code_generation`.
      - Artefakt- und Codegenerierung sollen standardmaessig lokal geroutet werden, auch wenn die Standardroute fuer Chat auf eine externe API zeigt.
      - Die LLM-Datenuebersicht liest Grants, Policy und Audit-Events aus dem AI Context Access API und zeigt bei nicht erreichbarem Service einen sicheren Offline-Status.
      - Die LLM-Datenuebersicht zeigt AI-Context-SQLite-Tabellen nur als sichere Metadaten- und Vorschauansicht ohne `raw_json`-Dump.
      - Fachliche KI-Kontextinhalte wie ESP32-Boards und Capabilities werden aus dem Hardware Catalog gelesen und als Inhaltsvorschau angezeigt.
      - Prompt-Grundlagen fuer KI-Chat und Architektur-Discovery werden aus dem AI Context Access API gelesen und nicht aus Identity-Code importiert.

