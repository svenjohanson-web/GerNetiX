  - id: api_artifact.ai_context_access
    type: api_artifact
    title: AI Context Access API
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Authorization
    summary: API-Artefakt fuer KI-Kontext-Grants, globale Kontext-Access-Policy, Preflight-Entscheidungen und Audit-Events. Die API ist deny-by-default und nutzt eine eigene AI-Context-SQLite.
    derivedFromRequirements:
      - requirement.ai_context_access_control
    relatedDataModels:
      - data_model.ai_context_grant
      - data_model.ai_context_policy
      - data_model.ai_context_source
      - data_model.ai_prompt_foundation
      - data_model.ai_context_access_audit_event
    endpoints:
      - GET /api/ai-context/policy
      - PUT /api/ai-context/policy
      - GET /api/ai-context/grants
      - POST /api/ai-context/grants
      - GET /api/ai-context/sources
      - POST /api/ai-context/sources
      - GET /api/ai-context/prompt-foundations
      - POST /api/ai-context/grants/{grant_id}/revoke
      - POST /api/ai-context/preflight
      - GET /api/ai-context/audit-events
      - GET /api/ai-context/sqlite/summary
    rules:
      - Ohne aktiven passenden Grant wird Kontextzugriff abgelehnt.
      - Jeder erlaubte oder abgelehnte Preflight erzeugt ein Audit-Event.
      - Externe Provider duerfen kundenrelevante Daten standardmaessig nicht erhalten.
      - Grants muessen Scope, Zweck, Provider-Scope, Redaktionsstufe und Gueltigkeit enthalten.
      - Die Source Registry beschreibt Kontextquellen wie Hardware Catalog, Prompt-Grundlagen, AI-Context-SQLite oder Graphdatenbank; erst Grants erlauben die Nutzung geschuetzter Kontextdaten.
      - Systemprompt-Grundlagen liegen fuehrend in der AI-Context-SQLite und werden ueber `/api/ai-context/prompt-foundations` gelesen.
      - Die SQLite-Summary darf Tabellen, Zeilenanzahlen, Spalten und redigierte Vorschauzeilen liefern, aber keine unkontrollierten Rohdaten-Dumps.

