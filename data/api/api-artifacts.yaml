  - id: api_artifact.device_pairing
    type: api_artifact
    title: Device Pairing API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: API-Artefakt fuer Pairing-Sessions, Pairing-Code-Pruefung, Account-Zuordnung, Unpairing und Pairing-Status.
    derivedFromRequirements:
      - requirement.device_customer_registration_and_pairing

  - id: api_artifact.device_authenticity_challenge
