schemaVersion: 1
kind: api_artifact_catalog
sourceStatus: legacy_import_source
items:
  - id: api_artifact.context_manager
    type: api_artifact
    title: Codex Context Manager API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: API-Artefakt fuer aktuelle Projektkontexte, Requirement Slices, Artefakt- und Runtime-Referenzen, Entscheidungen, Events, redigierte Context Packs und Redaction.
    derivedFromRequirements:
      - requirement.codex_context_uses_graph_as_source_of_truth
    relatedDataModels:
      - data_model.context_scope
      - data_model.context_requirement_slice
      - data_model.context_pack
    endpoints:
      - GET /api/context/current
      - PUT /api/context/current
      - POST /api/context/requirement-slices
      - POST /api/context/artifact-references
      - POST /api/context/runtime-references
      - POST /api/context/decisions
      - POST /api/context/events
      - POST /api/context/packs
      - GET /api/context/packs/{pack_id}
      - POST /api/context/redact
    rules:
      - Context Packs duerfen sensible Werte nur redigiert ausgeben.
      - Requirement Slices duerfen mehrere Anforderungen, Artefakte und Implementierungsstellen gemeinsam abbilden.

  - id: api_artifact.hardware_shop
    type: api_artifact
    title: Hardware Shop API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: API-Artefakt fuer kaufbare Angebote, Matching, Warenkoerbe, Bestellungen und Kaufkontexte. Der Hardware Shop ist fachlich Client des Hardware Catalog API und fuehrt keine eigene Board-/Capability-Wahrheit.
    usesApiArtifacts:
      - api_artifact.hardware_catalog
    endpoints:
      - GET /api/hardware-shop/offers
      - POST /api/hardware-shop/match
      - POST /api/hardware-shop/carts
      - POST /api/hardware-shop/orders
      - GET /api/hardware-shop/orders/{order_id}/purchase-context
      - POST /api/hardware-shop/admin/offers

  - id: api_artifact.hardware_catalog
    type: api_artifact
    title: Hardware Catalog API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Hardware
    summary: API-Artefakt fuer bekannte HardwareItems, ProcessorBoards und TechnicalCapabilities. Der Katalog ist die fachliche Quelle fuer Board-Typen wie ESP-WROOM-32, ESP-WROOM-32 mit Display und Arduino Nano ATmega328P und persistiert in SQLite.
    endpoints:
      - GET /api/hardware-catalog/capabilities
      - GET /api/hardware-catalog/capabilities/{capability_id}
      - GET /api/hardware-catalog/hardware-items
      - GET /api/hardware-catalog/hardware-items/{hardware_item_id}
      - GET /api/hardware-catalog/processor-boards
      - POST /api/hardware-catalog/admin/capabilities
      - POST /api/hardware-catalog/admin/hardware-items

  - id: api_artifact.admin_tool
    type: api_artifact
    title: Admin Tool API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: API-Artefakt fuer Admin-Uebersicht, Device-Status, Customer-Data-Access-Consents, Audit Events, Learning Feedback und KI-Kostensteuerung.
    derivedFromRequirements:
      - requirement.device_admin_status_inspection
      - requirement.customer_data_consent_for_admin_access
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_admin_cost_control_actions
    endpoints:
      - GET /api/admin/overview
      - GET /api/admin/devices
      - GET /api/admin/devices/{device_id}
      - POST /api/admin/customer-data-access/consents
      - POST /api/admin/customer-data-access/consents/{consent_id}/revoke
      - GET /api/admin/customer-data-access/audit-events
      - GET /api/admin/learning-feedback
      - GET /api/admin/ai-usage/summary
      - POST /api/admin/ai-cost-controls/actions

  - id: api_artifact.provisioning_tool
    type: api_artifact
    title: Provisioning Tool API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: API-Artefakt fuer Provisioning-Sessions, initiale Board-Registrierung, Manifest-Erzeugung, Firmware-Artefakt-Download fuer Browser-Web-Serial-Flash und Vorbereitung von Device-Management-Endpunkten.
    derivedFromRequirements:
      - requirement.device_manufacturer_registration
      - requirement.device_authenticity_challenge_response
    endpoints:
      - POST /api/provisioning-sessions
      - GET /api/provisioning-sessions/{session_id}
      - POST /api/provisioning-sessions/{session_id}/complete
      - GET /api/provisioning-sessions/{session_id}/manifest
      - POST /api/provisioning-sessions/{session_id}/browser-usb-flash-result
      - GET /api/provisioning-firmware-artifact
      - GET /api/provisioning-firmware-artifacts
      - GET /api/provisioning-firmware-artifacts/{artifact_id}/content
      - GET /api/provisioning-processor-boards
      - POST /api/provisioning-credentials/reset

  - id: api_artifact.recovery_tool
    type: api_artifact
    title: Recovery Tool API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: API-Artefakt fuer Recovery-Sessions, Community-Board-Discovery, Capability-Erfassung, Community-Device-Registrierung, Credential-Erneuerung und Connectivity-Reset.
    derivedFromRequirements:
      - requirement.community_board_discovery_via_recovery_tool
      - requirement.device_support_entitlement_traceability
    endpoints:
      - GET /api/recovery/sessions
      - POST /api/recovery/sessions
      - GET /api/recovery/sessions/{session_id}
      - POST /api/recovery/sessions/{session_id}/capabilities
      - POST /api/recovery/sessions/{session_id}/register-community-device
      - POST /api/recovery/sessions/{session_id}/renew-credentials
      - POST /api/recovery/sessions/{session_id}/connectivity-reset

  - id: api_artifact.persistence_server
    type: api_artifact
    title: Persistence Server API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: API-Artefakt fuer gemeinsame SQLite-State-Persistenz, State-Abruf, State-Aktualisierung, JSON-Export und Backup-Erzeugung. Der Persistence Server ist technische Infrastruktur und nicht fachliche Quelle der Wahrheit.
    endpoints:
      - GET /api/persistence/state/{service_key}
      - PUT /api/persistence/state/{service_key}
      - GET /api/persistence/export
      - POST /api/persistence/backup

  - id: api_artifact.community_questions
    type: api_artifact
    title: Community Questions API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer Fragen, Triage und Statusabfrage.
    derivedFromRequirements:
      - requirement.community_question_triage_time

  - id: api_artifact.community_answer_verification
    type: api_artifact
    title: Community Answer Verification API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer Verifizierung, Sichtbarkeit und erneute Pruefung von Antworten.
    derivedFromRequirements:
      - requirement.community_answer_verification
      - requirement.verified_answer_status_visible
      - requirement.reverify_changed_verified_answer

  - id: api_artifact.identity
    type: api_artifact
    title: Identity API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: API-Artefakt fuer klassische Registrierung, E-Mail-Verifizierung, lokalen Login, Social Login ueber gekapselte Provider, Logout und Passwort-Reset. Public Responses duerfen keine Provider-IDs und keine interne E-Mail als oeffentliche Identitaet exponieren.
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: api_artifact.account_self_transparency
    type: api_artifact
    title: Account Self Transparency API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: API-Artefakt fuer die Kunden-IDE-Sicht `Was weiss GerNetiX ueber mich?`. Liefert einen aktuellen AccountTransparencySnapshot fuer den angemeldeten Nutzer, kann eine explizite Aktualisierung ausloesen und markiert, ob der Snapshot wegen Aenderungen an Payment, Abos, Angeboten, Grants, Devices, Lernfortschritt, KI-Nutzung oder Consents veraltet war.
    derivedFromRequirements:
      - requirement.account_self_transparency_view
    usesApiArtifacts:
      - api_artifact.identity
      - api_artifact.account_competency_profile
      - api_artifact.account_device_inventory
      - api_artifact.ai_credit_balance
      - api_artifact.customer_data_access_consent
    relatedDataModels:
      - data_model.account_transparency_snapshot
    endpoints:
      - GET /account/me/transparency
      - POST /account/me/transparency/refresh
      - GET /api/account/me/transparency
      - POST /api/account/me/transparency/refresh
    responseSections:
      - identity
      - contact_data
      - login_providers
      - plans_subscriptions_and_purchases
      - product_offerings
      - grants_overrides_and_capabilities
      - devices_and_support
      - learning_profile
      - feedback
      - ai_credits_and_usage
      - consents_and_customer_data_access
      - sources_and_last_updated
    rules:
      - Der Endpunkt liefert ausschliesslich Daten des angemeldeten Accounts.
      - Bei einem veralteten Snapshot darf GET automatisch neu berechnen, solange die Antwortzeit fuer die IDE akzeptabel bleibt.
      - POST /refresh erzwingt eine Neuberechnung aus den fuehrenden Domaenenquellen.
      - Provider-IDs, Passwort-Hashes, Token-Hashes, Device-Secrets, interne Abuse-Signale und interne Anbieter-Kosten duerfen nicht in der Antwort erscheinen.
      - Jede Berechtigung muss mit Quelle und Grund erklaert werden, zum Beispiel Plan, Kurskauf, Einzelgrant, Override, Ablauf oder Widerruf.

  - id: api_artifact.ai_credit_balance
    type: api_artifact
    title: AI Credit Balance API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer Credit-Guthaben, Verbrauch, verbleibende Credits und Verbrauchshistorie.
    derivedFromRequirements:
      - requirement.ai_credit_balance

  - id: api_artifact.ai_usage_preflight
    type: api_artifact
    title: AI Usage Preflight API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Serverseitige Vorpruefung fuer kostenpflichtige KI-Aufrufe gegen Credits, Budgets, Modellfreigabe, Rate Limits und Kill-Switch.
    derivedFromRequirements:
      - requirement.ai_prepaid_credit_check

  - id: api_artifact.ai_usage_events
    type: api_artifact
    title: AI Usage Events API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Fachliches API-Artefakt fuer serverseitige Erfassung und Auswertung von KI Usage Events.
    derivedFromRequirements:
      - requirement.ai_usage_event_audit_trail

  - id: api_artifact.ai_admin_usage_dashboard
    type: api_artifact
    title: AI Admin Usage Dashboard API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: API-Artefakt fuer Admin-Dashboard-Kennzahlen zu KI-Nutzung, Credits, Tokens, Kosten, Modellen, Fehlern, Ablehnungen, Budgetnaehe und Margen.
    derivedFromRequirements:
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_cost_margin_reporting
