    title: Device Authenticity Challenge API
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: API-Artefakt fuer Challenge-Erzeugung, HMAC- oder Signaturpruefung und Bewertung, ob ein Device als GerNetiX-provisioniert gilt.
