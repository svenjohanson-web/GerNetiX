    summary: Anfrage eines Premium-Nutzers an den KI-Community-Assistenten inklusive Kontext, Community, erlaubten Quellen, Tarif, Modell und Moderationsstatus.
    fields:
      - accountId
      - communityId
      - question
      - requestedAt
      - planId
      - modelId
      - allowedSourceTypes
      - conversationId
      - moderationState
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.community_ai_assistant_query

  - id: data_model.community_ai_assistant_answer
    type: data_model
    title: CommunityAiAssistantAnswer
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: Antwort des KI-Community-Assistenten inklusive Zusammenfassung, Quellenreferenzen, Modell, Tokens, Cache-/RAG-Treffern und Qualitaetsindikatoren.
    fields:
      - queryId
      - answerText
      - sourceReferenceIds
      - modelId
      - inputTokens
      - outputTokens
      - cacheHit
      - ragHitScore
      - generatedAt
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.community_ai_assistant_query
      - requirement.community_ai_assistant_sources

  - id: data_model.community_ai_source_reference
    type: data_model
    title: CommunityAiSourceReference
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: Quellenverweis auf Community-Beitrag, Kommentar, Projekt, Dokumentation, Tutorial, FAQ, Lernpfad oder Course, der in einer KI-Antwort verwendet wurde.
    fields:
      - sourceType
      - sourceId
      - title
      - excerpt
      - url
      - relevanceScore
      - retrievedAt
    derivedFromRequirements:
      - requirement.community_ai_assistant_sources
      - requirement.community_ai_assistant_moderation

  - id: data_model.community_ai_index_document
    type: data_model
    title: CommunityAiIndexDocument
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: Indexierbare Wissenseinheit fuer RAG aus Community-Beitraegen, Kommentaren, Projekten, Dokumentationen, Tutorials, FAQ, Lernpfaden oder Kursen.
    fields:
      - sourceType
      - sourceId
      - title
      - contentHash
      - language
      - visibility
      - indexedAt
      - embeddingIds
    derivedFromRequirements:
      - requirement.community_ai_assistant_indexing

  - id: data_model.community_ai_embedding
    type: data_model
    title: CommunityAiEmbedding
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: Embedding-Referenz fuer ein indexiertes Community-Wissensfragment; die konkrete Vektordatenbank bleibt austauschbares technisches Detail.
    fields:
      - indexDocumentId
      - chunkId
      - embeddingModel
      - vectorReference
      - createdAt
    derivedFromRequirements:
      - requirement.community_ai_assistant_indexing

  - id: data_model.community_ai_assistant_configuration
    type: data_model
    title: CommunityAiAssistantConfiguration
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
