schemaVersion: 1
kind: data_model_catalog
sourceStatus: legacy_import_source
items:
  - id: data_model.context_scope
    type: data_model
    title: ContextScope
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Account-/Projekt-Scope fuer einen aktuellen Codex-Kontext.
    fields:
      - scopeId
      - accountId
      - projectId
      - title
      - description
      - status
      - createdAt
      - updatedAt

  - id: data_model.context_requirement_slice
    type: data_model
    title: ContextRequirementSlice
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Fachlicher Umsetzungsschnitt zwischen Anforderungen, Architektur, Implementierungsartefakten, offenen Punkten und Evidenz.
    fields:
      - sliceId
      - scopeId
      - requirementId
      - sliceKey
      - title
      - status
      - implementedBy
      - relatedArtifacts
      - openPoints
      - evidence

  - id: data_model.context_pack
    type: data_model
    title: ContextPack
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Redigiertes Kontextpaket fuer Codex, User IDE, KI-Assistent oder Admin-/Debug-Sichten.
    fields:
      - packId
      - scopeId
      - purpose
      - sections
      - payload
      - createdAt
    privacyClassification: internal
    accessMustBeAudited: true
    redactionRules:
      - Secrets, Token, Passwoerter, Private Keys, Pairing-Codes und Credentials werden maskiert.

  - id: data_model.community_question
    type: data_model
    title: CommunityQuestion
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Datenmodell fuer eingehende Community-Fragen, Triage-Status und Bearbeitungszeitpunkt.
    derivedFromRequirements:
      - requirement.community_question_triage_time

  - id: data_model.community_answer
    type: data_model
    title: CommunityAnswer
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Datenmodell fuer Antworten, Verifizierungsstatus, Pruefhistorie und erneute Pruefung nach Aenderungen.
    derivedFromRequirements:
      - requirement.community_answer_verification
      - requirement.verified_answer_status_visible
      - requirement.reverify_changed_verified_answer

  - id: data_model.user_account
    type: data_model
    title: UserAccount
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Interner Nutzeraccount mit stabiler `user_id`, Benutzername, interner E-Mail und Status. Dies ist die fuehrende Identitaet fuer alle Folgemodule.
    fields:
      - id
      - username
      - email
      - status
      - created_at
      - updated_at
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: data_model.local_credential
    type: data_model
    title: LocalCredential
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Lokale Passwort-Credential fuer klassische Registrierung und Login. Speichert ausschliesslich Passwort-Hashes, niemals Klartextpasswoerter.
    fields:
      - id
      - user_id
      - password_hash
      - created_at
      - updated_at
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: false
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: data_model.external_identity
    type: data_model
    title: ExternalIdentity
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Gekapselte Zuordnung eines externen OAuth2-/OpenID-Connect-Providers zu einem internen UserAccount. Provider-IDs duerfen nicht ausserhalb des Identity-Moduls verwendet werden.
    fields:
      - id
      - user_id
      - provider
      - provider_user_id
      - provider_email
      - linked_at
      - last_login_at
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: data_model.verification_token
    type: data_model
    title: VerificationToken
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Token fuer E-Mail-Verifizierung eines UserAccount. Tokens werden nur gehasht gespeichert und koennen ablaufen oder verwendet werden.
    fields:
      - id
      - user_id
      - token_hash
      - expires_at
      - used_at
      - created_at
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: false
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: data_model.password_reset_token
    type: data_model
    title: PasswordResetToken
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Token fuer Passwort-Reset eines LocalCredential-Accounts. Antworten auf Reset-Anfragen bleiben neutral, damit keine E-Mail-Existenz verraten wird.
    fields:
      - id
      - user_id
      - token_hash
      - expires_at
      - used_at
      - created_at
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: false
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: data_model.auth_session
    type: data_model
    title: Session/AuthToken
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Session oder AuthToken fuer erfolgreiche Logins. Speichert Token-Hash oder JWT-ID, Ablaufzeit und Widerruf.
    fields:
      - id
      - user_id
      - token_hash
      - jwt_id
      - expires_at
      - revoked_at
      - created_at
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.identity_registration_login

  - id: data_model.account_transparency_snapshot
    type: data_model
    title: AccountTransparencySnapshot
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Account
    summary: Zusammengesetztes Lesemodell fuer die Kunden-IDE-Sicht `Was weiss GerNetiX ueber mich?`. Der Snapshot fasst eigene Identity-, Kontakt-, Plan-, Abo-, Kauf-, Payment-, Angebots-, Grant-, Device-, Lern-, Feedback-, KI-, Consent- und Audit-Hinweise zusammen, ist aber nicht Quelle der Wahrheit fuer diese Domaenen.
    fields:
      - accountId
      - userId
      - username
      - accountStatus
      - identitySummary
      - contactDataSummary
      - linkedLoginProviders
      - activePlans
      - activeSubscriptions
      - purchases
      - paymentSummary
      - relevantProductOfferings
      - effectiveGrants
      - revokedGrants
      - accountOverrides
      - effectiveSystemCapabilities
      - deviceSummary
      - learningSummary
      - competencySummary
      - recommendationSummary
      - feedbackSummary
      - aiCreditSummary
      - aiUsageSummary
      - consentSummary
      - customerDataAccessSummary
      - sourceSections
      - staleBecauseOfEventIds
      - generatedAt
      - validUntil
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    snapshotRules:
      - Das Lesemodell darf keine fuehrende Datenquelle fuer Identity, Payment, Abos, Angebote, Grants, Devices, Learning, KI-Nutzung oder Consents werden.
      - Jeder Abschnitt nennt Quelle, Zweck, letzte Aktualisierung und fachlichen Verantwortungsbereich.
      - Provider-IDs, Passwort-Hashes, Token-Hashes, Device-Secrets, interne Abuse-Signale und interne Anbieter-Kosten werden nicht angezeigt.
      - Grant- und Capability-Entscheidungen muessen fuer den Nutzer nachvollziehbar begruendet werden.
      - Wenn relevante Domaenenereignisse eintreffen, wird der Snapshot als veraltet markiert.
      - Beim naechsten Abruf wird der Snapshot automatisch neu berechnet oder aus frischen Quellen aufgebaut.
    derivedFromRequirements:
      - requirement.account_self_transparency_view

  - id: data_model.ai_credit_account
    type: data_model
    title: AiCreditAccount
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Datenmodell fuer aktuelles KI-Credit-Guthaben, gesperrte Credits, verfuegbare Credits und Account-/Tarifbezug.
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.ai_credit_balance
      - requirement.ai_prepaid_credit_check
      - requirement.ai_admin_cost_control_actions

  - id: data_model.ai_credit_ledger_entry
    type: data_model
    title: AiCreditLedgerEntry
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Datenmodell fuer nachvollziehbare Credit-Buchungen wie Verbrauch, Gutschrift, Sperre, Korrektur, Promotion oder Supportgutschrift.
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.ai_credit_balance
      - requirement.ai_admin_cost_control_actions

  - id: data_model.ai_usage_event
    type: data_model
    title: AiUsageEvent
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Zentrales Usage-Event fuer jeden kostenpflichtigen, fehlgeschlagenen oder abgelehnten KI-Aufruf.
    fields:
      - accountId
      - occurredAt
      - model
      - inputTokens
      - outputTokens
      - calculatedCredits
      - estimatedProviderCost
      - planId
      - projectContextId
      - status
      - errorCode
      - rejectionReason
      - protectionMeasure
      - requestCountKey
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.ai_usage_event_audit_trail
      - requirement.ai_prepaid_credit_check
      - requirement.ai_credit_consumption_calculation
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_suspicious_usage_detection

  - id: data_model.ai_usage_aggregate
    type: data_model
    title: AiUsageAggregate
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Aggregierte KI-Nutzung nach Benutzer, Zeitraum, Modell, Tarif, Nutzergruppe, Kosten, Credits, Tokens, Fehlern und Ablehnungen.
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_cost_margin_reporting
      - requirement.ai_suspicious_usage_detection

  - id: data_model.ai_budget_policy
    type: data_model
    title: AiBudgetPolicy
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Datenmodell fuer Tageslimits, Monatslimits, Budgetobergrenzen, Warnschwellen, Rate Limits, Prompt-/Antwortgroessen, Laufzeitlimits und globalen Kill-Switch.
    derivedFromRequirements:
      - requirement.ai_usage_limits
      - requirement.ai_global_kill_switch
      - requirement.ai_admin_cost_control_actions

  - id: data_model.ai_model_pricing_policy
    type: data_model
    title: AiModelPricingPolicy
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Datenmodell fuer Modellkosten, Credit-Umrechnung, Tariffreigaben, Premium-Modellzugriff und Anbieter-Kostenschaetzung.
    derivedFromRequirements:
      - requirement.ai_credit_consumption_calculation
      - requirement.ai_model_access_control
      - requirement.ai_cost_margin_reporting

  - id: data_model.ai_admin_action_audit_event
    type: data_model
    title: AiAdminActionAuditEvent
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Audit-Datenmodell fuer administrative Eingriffe an Credits, Limits, Sperren, Modellfreigaben, Warnschwellen und globalem Kill-Switch.
    privacyClassification: customer_relevant
    customerData: true
    adminAccessRequiresConsent: true
    supportAccessRequiresConsent: true
    accessMustBeAudited: true
    derivedFromRequirements:
      - requirement.ai_admin_cost_control_actions

  - id: data_model.community_ai_assistant_query
    type: data_model
    title: CommunityAiAssistantQuery
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    belongsToBusinessDomain:
