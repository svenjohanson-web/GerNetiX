schemaVersion: 1
kind: ui_model_catalog
sourceStatus: legacy_import_source
items:
  - id: ui_model.user_ide_architecture_discovery
    type: ui_model
    title: User IDE Architektur-Discovery
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Learning
    summary: Kunden-IDE-Sicht fuer den LLM-gefuehrten Projektstart. Die Sicht fuehrt einen Architektur-Dialog, zeigt LLM-Routing und erlaubte Kontextquellen und rendert aus der letzten KI-Antwort eine PlantUML-Architekturskizze mit sichtbarer Quelle.
    derivedFromRequirements:
      - requirement.architecture_discovery_guided_by_llm
    usesApiArtifacts:
      - api_artifact.identity
      - api_artifact.ai_context_access
    usesDataModels:
      - data_model.project_architecture_dialog
      - data_model.project_target_architecture
    requiredStates:
      - no_development_project_selected
      - development_project_loaded
      - assistant_ready
      - llm_call_running
      - answer_received
      - plantuml_diagram_available
      - architecture_saved
      - llm_fallback_without_diagram
    sections:
      - Entwicklungsprojekt anlegen oder laden
      - Architektur-Dialog
      - LLM-Routing und Datenquellen
      - Schnellfragen
      - PlantUML-Architekturskizze

  - id: ui_model.user_ide_account_transparency
    type: ui_model
    title: User IDE Mein Profil und Datentransparenz
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: IDE
    summary: Kunden-IDE-Sicht fuer angemeldete Nutzer, die zeigt, wer sie sind und welche Informationen GerNetiX ueber sie fuehrt. Die Sicht zeigt Identitaet, Kontaktstatus, Login-Wege, Plaene, Abos, Kaeufe, Payment-Zusammenfassung, Angebote, Grants, Devices, Lernprofil, Feedback, KI-Nutzung, Consents und Quellen der Daten.
    derivedFromRequirements:
      - requirement.account_self_transparency_view
    usesApiArtifacts:
      - api_artifact.account_self_transparency
    usesDataModels:
      - data_model.account_transparency_snapshot
    requiredStates:
      - loading_current_snapshot
      - current_snapshot
      - stale_snapshot_refreshing
      - refresh_failed_keep_last_snapshot
      - no_payment_data
      - no_active_subscription
      - anonymous_feedback_present
      - consent_active
      - consent_expired_or_revoked
    sections:
      - Wer bin ich?
      - Login und Sicherheit
      - Plaene, Abos und Kaeufe
      - Angebote und Empfehlungen
      - Grants, Overrides und freigeschaltete Funktionen
      - Devices und Supportstatus
      - Lernen, Kompetenzen und Empfehlungen
      - Feedback und Kontaktfreigaben
      - KI-Credits und Nutzung
      - Consents und Datenzugriffe
      - Quellen und letzte Aktualisierung
    refreshRules:
      - Die Sicht zeigt `zuletzt aktualisiert` und ob Daten wegen relevanter Aenderungen veraltet waren.
      - Beim Oeffnen fragt die Sicht den aktuellen Snapshot ab.
      - Wenn der Snapshot veraltet ist, wird automatisch eine Aktualisierung angestossen und danach die neue Sicht angezeigt.
      - Nutzer koennen manuell aktualisieren.
      - Falls Aktualisierung fehlschlaegt, bleibt die letzte bekannte Sicht sichtbar und wird als moeglicherweise veraltet markiert.

  - id: ui_model.community_ai_assistant
    type: ui_model
    title: KI-Community-Assistent UI
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Product
    belongsToBusinessDomain: business_domain.community
    summary: Community-Oberflaeche fuer Premium-Nutzer, um natuerlichsprachliche Fragen zu stellen, Antworten mit Quellen zu lesen, aehnliche Inhalte zu oeffnen und Zusammenfassungen zu erzeugen.
    derivedFromRequirements:
      - requirement.community_ai_assistant_query
      - requirement.community_ai_assistant_sources
      - requirement.community_ai_assistant_indexing
      - requirement.community_ai_assistant_moderation
    requiredStates:
      - premium_access_granted
      - premium_required
      - credit_limit_reached
      - no_sources_found
      - answer_with_sources
      - answer_blocked_by_moderation

  - id: ui_model.admin_community_ai_assistant_settings
    type: ui_model
    title: Admin Community AI Assistant Settings
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Product
    belongsToBusinessDomain: business_domain.community
    summary: Admin-Oberflaeche fuer Aktivierung, Modellwahl, Limits, Budgetwarnungen, Modell-Fallback, Temperatur, Kontextgroesse, erlaubte Datenquellen, Moderationsregeln, Quellenpflicht und RAG-Konfiguration.
    derivedFromRequirements:
      - requirement.community_ai_assistant_admin_configuration

  - id: ui_model.admin_community_ai_assistant_monitoring
    type: ui_model
    title: Admin Community AI Assistant Monitoring
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Product
    belongsToBusinessDomain: business_domain.community
    summary: Erweiterung des bestehenden KI-Admin-Dashboards um Community-Assistent-Kennzahlen wie aktive Premium-Nutzer, Antwortzeit, Token-Verbrauch, Kosten, Cache-Trefferquote, RAG-Trefferquote, haeufigste Fragen, Fehlerquote und Budgetwarnungen.
    derivedFromRequirements:
      - requirement.community_ai_assistant_monitoring
      - requirement.ai_admin_usage_dashboard

  - id: ui_model.admin_statistics_dashboard
    type: ui_model
    title: Admin Statistik Dashboard
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Admin-Startseite fuer operative Kennzahlen zu Devices, Learning Feedback, Customer-Data-Access-Audit-Events und KI-Verbrauch. Die Sicht dient als kompakter Einstieg in Admin- und Support-Monitoring.
    derivedFromRequirements:
      - requirement.device_admin_status_inspection
      - requirement.customer_data_consent_for_admin_access
      - requirement.ai_admin_usage_dashboard
    usesApiArtifacts:
      - api_artifact.admin_tool
    requiredStates:
      - loading_statistics
      - statistics_available
      - backend_unavailable

  - id: ui_model.admin_ai_usage_dashboard
    type: ui_model
    title: Admin KI Usage Dashboard
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Admin-Unterseite fuer KI-Nutzungsmetriken nach lokaler LLM-Quelle und oeffentlicher OpenAI-kompatibler API. Oeffentliche LLM-Nutzung zeigt geschaetzte Providerkosten; lokale LLM-Nutzung zeigt lokale Laufzeitmetriken wie Latenz, Dauer und Tokens pro Sekunde, soweit vorhanden.
    derivedFromRequirements:
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_cost_margin_reporting
      - requirement.ai_suspicious_usage_detection
    usesApiArtifacts:
      - api_artifact.admin_tool
      - api_artifact.ai_admin_usage_dashboard
    usesDataModels:
      - data_model.ai_usage_event
      - data_model.ai_usage_aggregate
    requiredStates:
      - loading_ai_usage
      - ai_usage_available
      - no_ai_usage_events
      - ai_usage_backend_unavailable

  - id: ui_model.admin_ai_context_access_dashboard
    type: ui_model
    title: Admin LLM-Datenfreigaben
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Authorization
    summary: Admin-Unterseite, die zeigt, welche Datenquellen dem LLM als Kontext bereitstehen, welche Grants aktiv, abgelaufen oder widerrufen sind, welche Provider-Scope- und Redaktionsstufe gilt, welche Prompt-Grundlagen zentral in der AI-Context-SQLite liegen und welche Kontext-Preflight-Entscheidungen auditiert wurden.
    derivedFromRequirements:
      - requirement.ai_context_access_control
    usesApiArtifacts:
      - api_artifact.admin_tool
      - api_artifact.ai_context_access
      - api_artifact.hardware_catalog
    usesDataModels:
      - data_model.ai_context_grant
      - data_model.ai_context_policy
      - data_model.ai_context_source
      - data_model.ai_prompt_foundation
      - data_model.ai_context_access_audit_event
    requiredStates:
      - loading_ai_context_access
      - ai_context_access_available
      - no_ai_context_grants
      - ai_context_service_unavailable
    sections:
      - Policy-Zusammenfassung
      - Datenquellen nach Typ
      - Grant-Liste
      - Source-Registry fuer KI-Kontextquellen
      - Prompt-Grundlagen aus AI Context SQLite
      - Letzte Kontext-Preflight-Entscheidungen
      - AI-Context-SQLite-Tabellenuebersicht
      - Hardware-Catalog-Inhaltsvorschau fuer Boards und Capabilities
