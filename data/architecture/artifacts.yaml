schemaVersion: 1
kind: architecture_artifact_catalog
sourceStatus: legacy_import_source
items:
  - id: architecture_artifact.context_manager
    type: architecture_artifact
    title: Codex Context Manager
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Architekturartefakt fuer den Codex-Kontext ueber Requirements, Requirement Slices, Architekturartefakte, Implementierungsreferenzen, Runtime-Zustand, Entscheidungen, Events und redigierte Context Packs.
    derivedFromRequirements:
      - requirement.codex_context_uses_graph_as_source_of_truth
    usedBy:
      - app.user_ide
      - app.admin_tool
      - architecture_artifact.project_server
      - architecture_artifact.community_ai_assistant
    affectsDataModels:
      - data_model.context_scope
      - data_model.context_requirement_slice
      - data_model.context_pack
    affectsApiArtifacts:
      - api_artifact.context_manager
    containsArchitectureComponents:
      - component.context_scope_registry
      - component.requirement_slice_mapper
      - component.context_pack_builder
      - component.context_redaction

  - id: component.context_scope_registry
    type: architecture_component
    title: Context Scope Registry Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Fuehrt Account-/Projekt-Kontexte als Scope und bildet den Einstiegspunkt fuer aktuelle Codex-Arbeitskontexte.

  - id: component.requirement_slice_mapper
    type: architecture_component
    title: Requirement Slice Mapper Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Erfasst fachliche Umsetzungsschnitte, die mehrere Requirements, Artefakte und Implementierungsstellen verbinden.

  - id: component.context_pack_builder
    type: architecture_component
    title: Context Pack Builder Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Erzeugt transportierbare Context Packs aus Scope, Requirement Slices, Runtime-Referenzen, Entscheidungen und Events.

  - id: component.context_redaction
    type: architecture_component
    title: Context Redaction Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Authorization
    summary: Maskiert Secrets, Tokens, Passwoerter, Pairing-Codes und vergleichbare sensible Werte vor der Weitergabe an KI- oder Tool-Kontexte.

  - id: architecture_artifact.business_traceability_model
    type: architecture_artifact
    title: Business-Traceability-Modell
    businessStatus: Approved
    implementationStatus: In Design
    ownerDomain: CrossDomain
    summary: Modellkette von Vision ueber Business Goals, Strategies, Measures und Business Capabilities bis Requirements, Architektur, Datenmodell, APIs, Implementierung, Tests und Validation.
    sources:
      - data/business/business-traceability-metamodel.yaml

  - id: architecture_artifact.community_knowledge_platform
    type: architecture_artifact
    title: Community / Wissensplattform Architektur
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Architekturartefakt fuer Community-Fragen, verifizierte Antworten und dauerhafte Wissensbasis.
    derivedFromRequirements:
      - requirement.community_question_triage_time
      - requirement.community_answer_verification
      - requirement.verified_answer_status_visible

  - id: architecture_artifact.ai_cost_protection
    type: architecture_artifact
    title: KI Cost Protection
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Architekturartefakt fuer serverseitige Credit-Pruefung, Budgetlimits, Modellfreigaben, Verbrauchsberechnung und Schutz vor unkontrollierten KI-Kosten.
    derivedFromRequirements:
      - requirement.ai_credit_balance
      - requirement.ai_prepaid_credit_check
      - requirement.ai_credit_consumption_calculation
      - requirement.ai_usage_limits
      - requirement.ai_model_access_control
      - requirement.ai_global_kill_switch

  - id: architecture_artifact.ai_usage_observability
    type: architecture_artifact
    title: KI Usage Observability und Admin Dashboard
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Architekturartefakt fuer Usage Events, Audit Trail, Admin-Dashboard, Kosten-/Margenberichte, auffaellige Nutzungsmuster und administrative Steuerungsfunktionen.
    derivedFromRequirements:
      - requirement.ai_usage_event_audit_trail
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_cost_margin_reporting
      - requirement.ai_admin_cost_control_actions
      - requirement.ai_suspicious_usage_detection

  - id: architecture_artifact.community_ai_assistant
    type: architecture_artifact
    title: KI-Community-Assistent Architektur
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Business
    belongsToBusinessDomain:
      - business_domain.community
    summary: Architekturartefakt fuer RAG, Vektordatenbank, Embeddings, LLM, Prompt Templates, Quellenreferenzen, Conversation Memory, Moderation, Premium-Zugriff und Community-Wissensindex.
    usesArchitectureArtifacts:
      - architecture_artifact.community_knowledge_platform
      - architecture_artifact.ai_cost_protection
      - architecture_artifact.ai_usage_observability
    derivedFromRequirements:
      - requirement.community_ai_assistant_query
      - requirement.community_ai_assistant_sources
      - requirement.community_ai_assistant_indexing
      - requirement.community_ai_assistant_premium_access
      - requirement.community_ai_assistant_admin_configuration
      - requirement.community_ai_assistant_monitoring
      - requirement.community_ai_assistant_moderation
    containsArchitectureComponents:
      - component.community_rag_pipeline
      - component.community_vector_database
      - component.community_embedding_service
      - component.community_llm_adapter
      - component.community_prompt_template_registry
      - component.community_source_reference_resolver
      - component.community_conversation_memory

  - id: component.ota
    type: architecture_component
    title: OTA Update Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Architekturkomponente fuer Over-the-Air-Firmwareupdates, die von WiFi, registrierten Boards, aktiven Credentials, erhaltener GerNetiX-Basissoftware und robusten Flash-Regeln abhaengt.
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
    dependsOn:
      - architecture.registered_processor_board
    constrainedBy:
      - nfr.firmware_flash_must_not_brick_board

  - id: architecture_artifact.device_management_server
    type: architecture_artifact
    title: Device Management Server
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Architekturartefakt fuer den extern ansprechbaren Device-Management-Bereich im gemeinsamen Backend. Verwaltet Device Registry, Kunden-Pairing, Hersteller-Register, Echtheitsnachweis, Account-Device-Inventar, OTA-Zielauswahl, Connectivity-Status und Supportberechtigung.
    deploymentDecision: Im MVP als Modul im gemeinsamen Backend betreiben; API und Modulgrenzen so schneiden, dass spaetere Auslagerung als eigener Service moeglich bleibt.
    apiPrefix:
      - /api/device-management
    usedBy:
      - app.user_ide
      - app.recovery_tool
      - app.provisioning_tool
      - app.admin_tool
    derivedFromRequirements:
      - requirement.device_manufacturer_registration
      - requirement.device_customer_registration_and_pairing
      - requirement.device_authenticity_challenge_response
      - requirement.community_hardware_supported_without_entitlement
      - requirement.ide_ota_device_selection_from_profile
      - requirement.device_support_entitlement_traceability
    containsArchitectureComponents:
      - component.device_registry
      - component.device_pairing
      - component.device_authenticity
      - component.account_device_inventory
      - component.ota_target_discovery
      - component.device_connectivity_setup
      - component.firmware_feedback
      - component.device_support_entitlement
      - component.admin_device_management

  - id: architecture_artifact.identity_server
    type: architecture_artifact
    title: Identity Server
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Architekturartefakt fuer Registrierung, Login, E-Mail-Verifizierung, Passwort-Reset, Session/AuthToken-Verwaltung und gekapselte externe Identitaeten. Stellt allen Folgemodulen ausschliesslich die interne `user_id` bereit.
    usedBy:
      - app.user_ide
      - app.admin_tool
      - architecture_artifact.project_server
      - architecture_artifact.device_management_server
    derivedFromRequirements:
      - requirement.identity_registration_login
    containsArchitectureComponents:
      - component.user_account_registry
      - component.local_credential_authentication
      - component.external_identity_provider_adapter
      - component.email_verification
      - component.password_reset
      - component.auth_session_management

  - id: component.user_account_registry
    type: architecture_component
    title: User Account Registry Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Komponente fuer interne UserAccounts mit stabiler `user_id`, eindeutigem Benutzernamen, interner E-Mail und Accountstatus.

  - id: component.local_credential_authentication
    type: architecture_component
    title: Local Credential Authentication Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Komponente fuer lokale Passwort-Credentials, Passwort-Hashing und Login per Benutzername oder E-Mail.

  - id: component.external_identity_provider_adapter
    type: architecture_component
    title: External Identity Provider Adapter Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Kapselt OAuth2-/OpenID-Connect-Provider wie Google, Apple, Microsoft und GitHub, sodass Provider-IDs nicht ausserhalb des Identity-Moduls verwendet werden.

  - id: component.email_verification
    type: architecture_component
    title: Email Verification Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Komponente fuer VerificationTokens und E-Mail-Verifizierungslinks, in der ersten Implementierung ueber MockEmailService.

  - id: component.password_reset
    type: architecture_component
    title: Password Reset Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Komponente fuer neutrale Passwort-Reset-Anfragen, ResetTokens und sicheres Setzen neuer Passwoerter fuer LocalCredential-Accounts.

  - id: component.auth_session_management
    type: architecture_component
    title: Auth Session Management Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Komponente fuer Session/AuthToken-Erzeugung, Ablaufzeit und Widerruf bei Logout.

  - id: architecture_artifact.project_server
    type: architecture_artifact
    title: Projektserver
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Quelle der Wahrheit fuer Benutzer, Nutzerprojekte, Geraete, Quellcode, Projektkonfiguration, Build-Historie und Build-/Flash-Status. Der Projektserver erstellt BuildJobs und vollstaendige BuildPackages und nimmt Build- und Deploy-Ergebnisse vom Build-&-Deploy-Server zurueck.
    usedBy:
      - app.user_ide
      - architecture_artifact.build_deploy_server
      - architecture_artifact.device_management_server
    derivedFromRequirements:
      - requirement.firmware_build_deploy_server
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.ide_ota_device_selection_from_profile
      - requirement.learning_project_step_feedback
    containsArchitectureComponents:
      - component.project_source_repository
      - component.project_build_history
      - component.build_package_creator
      - component.firmware_artifact_repository
      - component.learning_feedback_repository

  - id: architecture_artifact.build_deploy_server
    type: architecture_artifact
    title: Build-&-Deploy-Server
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Ausfuehrender Server fuer Build- und Deploy-Jobs. Er kompiliert vollstaendige BuildPackages des Projektservers, fuehrt OTA-Deployments aus, kommuniziert mit Geraeten per MQTT und HTTPS, gibt Firmware, Logs und Status zurueck und loescht danach temporaere Projektdaten. Dauerhafte technische Caches sind erlaubt, aber niemals Quelle der Wahrheit.
    usedBy:
      - app.user_ide
      - architecture_artifact.project_server
      - architecture_artifact.device_management_server
    derivedFromRequirements:
      - requirement.firmware_build_deploy_server
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.ide_ota_device_selection_from_profile
    dependsOn:
      - architecture_artifact.project_server
      - architecture_artifact.device_management_server
      - component.ota
    constrainedBy:
      - nfr.firmware_flash_must_not_brick_board
    containsArchitectureComponents:
      - component.firmware_build_job_runner
      - component.build_cache
      - component.prebuild_scheduler
      - component.deploy_job_orchestrator
      - component.device_job_lock

  - id: component.project_source_repository
    type: architecture_component
    title: Project Source Repository Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Komponente fuer dauerhafte Nutzerprojektquellen, User-Code, Projektkonfiguration und Build-relevante Metadaten.

  - id: component.project_build_history
    type: architecture_component
    title: Project Build History Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Komponente fuer Build-Historie, Build-Status, Flash-Status, Logs, Firmware-Artefaktreferenzen und Fehlernachvollziehbarkeit.

  - id: component.build_package_creator
    type: architecture_component
    title: Build Package Creator Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Erstellt ein vollstaendiges, reproduzierbares BuildPackage als Snapshot aus BuildJob-Metadaten, PlatformIO-Konfiguration, Projektquellen, GerNetiX-Basissoftware, User-Code, Headern, Libraries, Assets, optional vorberechneten Dateien und Zielgeraeteprofil.

  - id: component.firmware_artifact_repository
    type: architecture_component
    title: Firmware Artifact Repository Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Speichert erzeugte Firmware-Artefakte, BuildResult, Logs, Status, SHA-256, Dateigroessen und Metadaten beim Projektserver; der Build-&-Deploy-Server behaelt diese Daten nicht dauerhaft.

  - id: component.learning_feedback_repository
    type: architecture_component
    title: Learning Feedback Repository Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Learning
    summary: Fachlicher Speicherort fuer Step- und Projektfeedback im Projekt-/Learning-Kontext. Das Admin Tool nutzt diese Daten nur ueber berechtigte Sichten; identifizierbares Feedback und Kontaktdaten bleiben consent- und auditpflichtig.
    derivedFromRequirements:
      - requirement.learning_project_step_feedback
      - requirement.customer_data_consent_for_admin_access

  - id: component.firmware_build_job_runner
    type: architecture_component
    title: Firmware Build Job Runner Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: Fuehrt Build-Jobs aus vollstaendigen BuildPackages aus, kompiliert die Firmware und liefert BuildResult inklusive `firmware.bin`, `firmware.elf`, `firmware.map`, `build.log`, Status, SHA-256 und Dateigroesse an den Projektserver zurueck.

  - id: component.build_cache
    type: architecture_component
    title: Build Cache Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Technischer Cache fuer Toolchains, PlatformIO, Libraries, Objektdateien und vergleichbare Build-Artefakte. Der Cache beschleunigt Builds, ist aber nicht fachliche Quelle der Wahrheit und darf ohne Datenverlust neu aufgebaut werden.

  - id: component.prebuild_scheduler
    type: architecture_component
    title: Prebuild Scheduler Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Kann beim Anlegen eines Lernprojekts automatisch einen Prebuild der Projekthuelle starten, um technische Caches aufzuwarmen und spaetere Builds zu beschleunigen.

  - id: component.deploy_job_orchestrator
    type: architecture_component
    title: Deploy Job Orchestrator Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Startet OTA-Deployments nur aus einem vom Nutzer ausgeloesten Build-&-Flash-Auftrag, veroeffentlicht Deploy-Auftraege per MQTT, stellt Firmware per HTTPS bereit, empfaengt Statusmeldungen per MQTT und meldet den Abschluss an den Projektserver.

  - id: component.device_job_lock
    type: architecture_component
    title: Device Job Lock Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Stellt sicher, dass pro Device maximal ein aktiver Build-/Deploy-Job laeuft. Optional darf genau ein weiterer wartender Job existieren; neue wartende Jobs ersetzen aeltere wartende Jobs.

  - id: component.device_registry
    type: architecture_component
    title: Device Registry Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Komponente fuer konkrete Devices, Lifecycle, Hersteller-Register und Heartbeats.

  - id: component.device_pairing
    type: architecture_component
    title: Device Pairing Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Komponente fuer Pairing-Sessions, Pairing-Kanaele und Account-Zuordnung.

  - id: component.device_authenticity
    type: architecture_component
    title: Device Authenticity Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Komponente fuer Challenge-Response-Pruefung, HMAC-Nachweis und Bewertung als GerNetiX-verified oder Community-Hardware.

  - id: component.account_device_inventory
    type: architecture_component
    title: Account Device Inventory Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Account
    summary: Komponente fuer Device-Eintraege im Account-Profil inklusive Capabilities, Anzeigename, Online-Status und OTA-Status.

  - id: component.ota_target_discovery
    type: architecture_component
    title: OTA Target Discovery Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Komponente fuer die Auswahl kompatibler OTA-Zielgeraete aus dem Account-Device-Inventar.

  - id: component.device_connectivity_setup
    type: architecture_component
    title: Device Connectivity Setup Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Komponente fuer Connectivity-Status, AP-/Node-Modus, OTA-Hostname und WLAN-Setup-Kontext. WLAN-Passwoerter bleiben lokal auf dem Device.

  - id: component.firmware_feedback
    type: architecture_component
    title: Firmware Feedback / Weblog Component
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: Basissoftware-Komponente fuer lokale Lern- und Diagnose-Rueckmeldungen ueber UART, Ringpuffer und Device-Webinterface. Server-Telemetrie bleibt getrennt und wird erst bei Pairing, Zweckbindung und Berechtigung oder Consent relevant.
    derivedFromRequirements:
      - requirement.firmware_local_feedback_weblog
    dependsOn:
      - component.device_connectivity_setup

  - id: component.device_support_entitlement
    type: architecture_component
    title: Device Support Entitlement Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Komponente fuer Support-, Garantie- und Reklamationspruefung auf Basis von Provisionierung, Echtheitsnachweis, Kaufkontext und Account-Zuordnung.

  - id: component.admin_device_management
    type: architecture_component
    title: Admin Device Management Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Admin- und Support-Sicht auf Device Management fuer Statuspruefung, GerNetiX-Verified-vs-Community-Unterscheidung, Pairing, Connectivity, OTA, Credential-Historie und Support-Entitlement.
