      - component.local_credential_authentication
      - component.external_identity_provider_adapter
      - component.email_verification
      - component.password_reset
      - component.auth_session_management

  - id: architecture_artifact.hardware_catalog
    type: architecture_artifact
    title: Hardware Catalog Service
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Hardware
    summary: Architekturartefakt fuer die SQLite-persistente Quelle bekannter HardwareItems, ProcessorBoards und TechnicalCapabilities. Der Katalog ordnet technische ProcessorFamilies, MCU-Varianten, Module/Realisierungen und offizielle oder neutral-generische Boardeintraege; Spezialhardware und Verdrahtung gehoeren als Instanz-Konfiguration an das Account-Device. Hardware Shop und Identity Server nutzen diesen Service als Katalog-Client, statt eigene Board-/Capability-Wahrheiten zu fuehren.
    affectsApiArtifacts:
