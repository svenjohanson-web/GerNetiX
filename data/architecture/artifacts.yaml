    summary: Fuehrt den Nutzer mit adaptiven Fragen von Projektziel, Funktion, Funktionsklasse, Akteuren und Randbedingungen zu Wirkketten, Zielsystemen, Datenfluesse, Bedienoberflaechen, Offline-/Online-Anforderungen und offenen Architekturfragen. Die fruehe Frage unterscheidet lokale Regel-/Steuerstrecke, Datenlogger, Remote-Steuerung, Observer/Benachrichtigung, synchronisiertes Zustandsmodell oder Kombinationen und danach lokalen oder weltweiten Zugriff.

  - id: component.target_architecture_mapper
    type: architecture_component
    title: Target Architecture Mapper Component
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
