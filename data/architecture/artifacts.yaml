      - requirement.community_question_triage_time
      - requirement.community_answer_verification
      - requirement.verified_answer_status_visible

  - id: architecture_artifact.ai_cost_protection
    type: architecture_artifact
    title: KI Cost Protection
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Architekturartefakt fuer serverseitige Credit-Pruefung, Budgetlimits, Modellfreigaben, Verbrauchsberechnung und Schutz vor unkontrollierten KI-Kosten.
    derivedFromRequirements:
      - requirement.ai_credit_balance
      - requirement.ai_prepaid_credit_check
      - requirement.ai_credit_consumption_calculation
      - requirement.ai_usage_limits
      - requirement.ai_model_access_control
      - requirement.ai_global_kill_switch

  - id: architecture_artifact.ai_usage_observability
    type: architecture_artifact
    title: KI Usage Observability und Admin Dashboard
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Business
    summary: Architekturartefakt fuer Usage Events, Audit Trail, Admin-Dashboard, Kosten-/Margenberichte, auffaellige Nutzungsmuster und administrative Steuerungsfunktionen.
    derivedFromRequirements:
      - requirement.ai_usage_event_audit_trail
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_cost_margin_reporting
      - requirement.ai_admin_cost_control_actions
      - requirement.ai_suspicious_usage_detection

  - id: architecture_artifact.ai_context_access_control
    type: architecture_artifact
    title: KI Context Access Control
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Authorization
    summary: Eigenstaendige Zugriffsschicht fuer KI-Kontextdaten. Sie fuehrt Grants, globale Policy und Audit-Events in einer eigenen AI-Context-SQLite und entscheidet vor jedem Kontextabruf deny-by-default, ob eine Quelle fuer Zweck, Scope, Provider und Redaktionsstufe genutzt werden darf.
    derivedFromRequirements:
      - requirement.ai_context_access_control
    affectsDataModels:
      - data_model.ai_context_grant
      - data_model.ai_context_policy
      - data_model.ai_context_source
      - data_model.ai_context_access_audit_event
    affectsApiArtifacts:
      - api_artifact.ai_context_access
    usesArchitectureArtifacts:
      - architecture_artifact.ai_usage_observability
    containsArchitectureComponents:
      - component.ai_context_grant_registry
      - component.ai_context_access_policy
      - component.ai_context_audit_log
    implementationNotes:
      - Erster Service liegt unter `services/ai-context-server`.
      - Default-Port ist `5500`.
      - Default-SQLite ist `.runtime/gernetix-ai-context.sqlite`, bewusst getrennt vom allgemeinen Runtime-State.
      - Ohne passenden aktiven Grant wird Kontextzugriff abgelehnt und auditiert.
      - Externe Provider sind fuer Kundendaten global blockiert, solange die Policy dies nicht explizit erlaubt.

  - id: component.ai_context_grant_registry
    type: architecture_component
    title: AI Context Grant Registry Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Authorization
    summary: Speichert account-, projekt-, quelle-, scope-, zweck- und providergebundene Kontext-Grants mit Gueltigkeit, Widerruf und Redaktionsstufe. Fuehrt zusaetzlich eine Source Registry fuer fachliche KI-Kontextquellen wie Hardware Catalog, Prompt-Grundlagen und AI-Context-SQLite.

  - id: component.ai_context_access_policy
    type: architecture_component
    title: AI Context Access Policy Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Authorization
    summary: Bewertet KI-Kontext-Preflights gegen Grant, Provider, Datenquelle, Scope, Zweck, globale Policy und Redaktionsanforderungen.

  - id: component.ai_context_audit_log
    type: architecture_component
    title: AI Context Audit Log Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Authorization
    summary: Protokolliert jede erlaubte und abgelehnte Kontextzugriffsentscheidung mit Account, Projekt, Quelle, Zweck, Provider, Modell, Grant und Ablehnungsgrund.

  - id: architecture_artifact.local_ai_chat
    type: architecture_artifact
    title: Lokaler KI-Chat in der Kunden-IDE
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: Architekturartefakt fuer einen allgemeinen KI-Chat in der Kunden-IDE. Der Chat ist vom Architektur-Discovery-Dialog der Entwicklungsplattform getrennt und nutzt im PoC das ueber das Admin Tool konfigurierte LLM-Routing mit bewusst begrenzten Datenquellen.
    usedBy:
      - app.user_ide
    usesArchitectureArtifacts:
      - architecture_artifact.ai_cost_protection
      - architecture_artifact.ai_usage_observability
      - architecture_artifact.ai_context_access_control
    containsArchitectureComponents:
      - component.local_ai_chat_adapter
    implementationNotes:
      - Kunden-IDE-Route ist `/app/ki-chat/`.
      - Frontend-Logik liegt getrennt in `services/identity-server/public/app/ai-chat.js`.
      - Backend-Proxy liegt getrennt in `services/identity-server/src/dev/ai-chat-assistant.js` und wird ueber `/api/platform/ai-chat/chat` angesprochen.
      - Provider, Endpoint und Modell werden im PoC ueber das eigenstaendige Admin Tool `http://127.0.0.1:4600/admin/` und die Endpunkte `/api/admin/llm-config` konfiguriert.
      - Die gemeinsame LLM-Routing-Konfiguration ist fachlicher Runtime-State und muss gemaess SQL-only-Persistenz in SQLite liegen; alte `.runtime/identity-llm-config.json`-Dev-Konfigurationen sind nur Migrationsaltlasten.
      - Die Systemprompt-Grundlage wird aus der AI-Context-SQLite ueber den AI Context Server geladen; der Identity Server ist nicht fuehrend fuer KI-Grundlagen.
      - Datenquellen sind im PoC auf den aktuellen Chat begrenzt; Projektdateien, Graphdaten, Kundendaten und externe Quellen sind blockiert.

  - id: component.local_ai_chat_adapter
    type: architecture_component
    title: Local AI Chat Adapter Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: Kapselt den allgemeinen KI-Chat der Kunden-IDE gegenueber dem konfigurierten LLM-Provider und haelt ihn fachlich von der Architektur-Discovery der Entwicklungsplattform getrennt.

  - id: architecture_artifact.community_ai_assistant
    type: architecture_artifact
    title: KI-Community-Assistent Architektur
    businessStatus: In Analysis
