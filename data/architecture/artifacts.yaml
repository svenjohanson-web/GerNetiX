    ownerDomain: IDE
    summary: Speichert erzeugte Firmware-Artefakte, BuildResult, Logs, Status, SHA-256, Dateigroessen und Metadaten beim Projektserver; der Build-&-Deploy-Server behaelt diese Daten nicht dauerhaft.

