    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Ausfuehrender Server fuer Build- und Deploy-Jobs. Er kompiliert vollstaendige BuildPackages des Projektservers, kann lokale USB-Flash-Jobs per PlatformIO ausfuehren, fuehrt OTA-Deployments aus, kommuniziert fuer OTA mit Geraeten per MQTT und HTTPS, gibt Firmware, Logs und Status zurueck und loescht danach temporaere Projektdaten. Dauerhafte technische Caches sind erlaubt, aber niemals Quelle der Wahrheit.
    usedBy:
