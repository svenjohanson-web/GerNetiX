  - id: component.prebuild_scheduler
    type: architecture_component
    title: Prebuild Scheduler Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Kann beim Anlegen eines Lernprojekts automatisch einen Prebuild der Projekthuelle starten, um technische Caches aufzuwarmen und spaetere Builds zu beschleunigen.

  - id: component.deploy_job_orchestrator
    type: architecture_component
    title: Deploy Job Orchestrator Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Startet OTA-Deployments nur aus einem vom Nutzer ausgeloesten Build-&-Flash-Auftrag, veroeffentlicht Deploy-Auftraege per MQTT, stellt Firmware per HTTPS bereit, empfaengt Statusmeldungen per MQTT und meldet den Abschluss an den Projektserver.

  - id: component.device_job_lock
    type: architecture_component
    title: Device Job Lock Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: DeviceManagement
    summary: Stellt sicher, dass pro Device maximal ein aktiver Build-/Deploy-Job laeuft. Optional darf genau ein weiterer wartender Job existieren; neue wartende Jobs ersetzen aeltere wartende Jobs.

  - id: architecture_artifact.mqtt_broker
    type: architecture_artifact
    title: MQTT Broker
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: Technische Infrastrukturkomponente fuer Device-Commands, Deployment-Status, Heartbeats und Telemetrie. Der Broker ist keine fachliche Quelle der Wahrheit; Build-&-Deploy, Device Management und Devices nutzen ihn als Transportkanal. Firmware-Binaries werden nicht ueber MQTT verteilt, sondern per HTTP/HTTPS aus Artefakt-URLs geladen.
    derivedFromRequirements:
      - requirement.firmware_build_deploy_server
      - requirement.learning_firmware_base_scaffold_preserves_ota
    usedBy:
      - architecture_artifact.build_deploy_server
      - architecture_artifact.device_management_server
      - component.device_connectivity_setup
    implementationNotes:
      - Lokale Dev-Infrastruktur liegt unter `infra/dev/docker-compose.yml`.
      - Der Dev-Broker verwendet Eclipse Mosquitto und bindet MQTT auf `127.0.0.1:1883`.
      - MQTT over WebSocket ist lokal auf `127.0.0.1:9001` vorgesehen.
      - Lokale Dev-Konfiguration erlaubt anonyme Clients und deaktiviert TLS; VPS-Betrieb muss TLS, Credentials oder Client-Zertifikate und Topic-ACLs aktivieren.
      - Topic-Konvention: `gernetix/devices/{deviceId}/commands/deploy`, `gernetix/devices/{deviceId}/status/deployment`, `gernetix/devices/{deviceId}/status/heartbeat`.

