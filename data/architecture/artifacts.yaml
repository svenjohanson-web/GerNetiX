    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: Fuehrt Build-Jobs aus vollstaendigen BuildPackages aus, kompiliert die Firmware, kann im lokalen MVP per USB flashen und liefert BuildResult inklusive primaerem Firmware-Artefakt (`firmware.bin` oder `firmware.hex`), `firmware.elf`, optionalem `firmware.map`, `build.log`, Flash-Status, SHA-256 und Dateigroesse an den Projektserver zurueck.

  - id: component.build_cache
    type: architecture_component
