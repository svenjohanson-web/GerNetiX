  - id: component.ota_target_discovery
    type: architecture_component
    title: OTA Target Discovery Component
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: IDE
    summary: Komponente fuer die Auswahl kompatibler OTA-Zielgeraete aus dem Account-Device-Inventar.

  - id: component.device_connectivity_setup
    type: architecture_component
    title: Device Connectivity Setup Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: DeviceManagement
    summary: Komponente fuer Connectivity-Status, AP-/Node-Modus, OTA-Hostname und WLAN-Setup-Kontext. WLAN-Passwoerter bleiben lokal auf dem Device.
    implementationNotes:
      - `basissoftware/esp32` startet aktuell einen offenen Setup-AP `GerNetiX-Setup`.
      - Das lokale Device-Webinterface ist im AP-Modus unter `http://192.168.4.1/` erreichbar.
      - Die Basissoftware startet im Setup-AP einen Captive-DNS-Dienst und beantwortet unbekannte HTTP-GET-Pfade mit der lokalen Setup-Seite, damit mobile Betriebssysteme den Captive-Portal-Dialog automatisch oeffnen koennen.
      - `/status` liefert Runtime-, WLAN-, Uptime- und Provisioning-Status als JSON.
      - Das Hersteller-Provisioning laeuft ueber USB-Flash-Pakete mit generiertem `generated_provisioning_payload.h`.
      - Das Provisioning Tool waehlt dafuer ein ProcessorBoard aus dem Hardware-Katalog und referenziert ueber dessen Katalogeintrag ein versioniertes Basissoftware-Firmware-Artefakt aus SQLite/Artifact Store.
      - Das Provisioning Tool darf im Serverbetrieb nicht direkt auf `basissoftware/esp32` als Projektordner zugreifen.
      - Die USB-Flash-Toolchain ist ein deploytes Runtime-Artefakt mit Manifest `.runtime/toolchains/provisioning/toolchain.json`; der Server darf keine benutzerspezifischen lokalen Toolchain-Pfade erraten.
      - Echter USB-Flash wird nur angeboten, wenn Freigabe, serverseitiges Firmware-Artefakt und Toolchain-Readiness gemeinsam erfuellt sind.
      - Die Factory-HMI darf kein lokales Firmware-File vom Bedienrechner hochladen; Artefakte werden durch Server-/Build-/Admin-Prozesse bereitgestellt.
      - Der Factory-Provisioning-Header wird nur in temporaeres Staging geschrieben, nicht in die kanonischen Projektquellen.
      - Die Basissoftware importiert den Factory-Provisioning-Payload beim ersten Boot aus dem per USB geflashten Image in NVS.
      - `POST /provisioning` bleibt ein lokaler Recovery-/Entwicklungsendpunkt und ist nicht der normale Provisioning-Tool-Kanal.
      - `POST /auth/challenge` erzeugt lokal einen HMAC-SHA256-Echtheitsnachweis aus Challenge und provisioniertem Device-Secret.
      - Der leichte Contract-Check `tools/firmware-contract-check/check-provisioning-contract.js` prueft Provisioning Tool und ESP32-Basissoftware ohne ESP-IDF-/PlatformIO-Vollbuild gegeneinander.
      - WLAN-Scan, Speichern von Ziel-WLAN-Zugangsdaten, Wechsel in den Node-Modus und OTA-Hostname sind noch offen.
    openDecisions:
      - decision.esp32_ota_bootstrap_firmware.wifi_setup
      - decision.esp32_ota_bootstrap_firmware.node_mode_policy

  - id: component.firmware_feedback
    type: architecture_component
    title: Firmware Feedback / Weblog Component
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Learning
    summary: Basissoftware-Komponente fuer lokale Lern- und Diagnose-Rueckmeldungen ueber UART, Ringpuffer und Device-Webinterface. Server-Telemetrie bleibt getrennt und wird erst bei Pairing, Zweckbindung und Berechtigung oder Consent relevant.
    derivedFromRequirements:
      - requirement.firmware_local_feedback_weblog
    dependsOn:
      - component.device_connectivity_setup
    implementationNotes:
      - `basissoftware/esp32` enthaelt eine lokale Feedback-API fuer Info-, Warn- und Fehlerereignisse.
      - Feedback wird weiter ueber Serial/UART ausgegeben.
      - Ein RAM-Ringpuffer ist im lokalen Device-Webinterface unter `/logs` abrufbar.
      - Automatische Server-Telemetrie ist bewusst nicht implementiert.

