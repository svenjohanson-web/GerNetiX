schemaVersion: 1
kind: architecture_decision_catalog
sourceStatus: legacy_import_source
items:
  - id: architecture.yaml_first_repository
    type: architecture_decision
    title: SQLite-Graph-first Repository-Struktur abgeloest
    status: superseded
    ownerDomain: CrossDomain
    summary: Diese fruehere Entscheidung wurde abgeloest. YAML war die initiale strukturierte Quelle, wird aber nach validierter SQLite-Aequivalenz nicht mehr als fuehrende Pflegequelle verwendet.
    replacedBy: architecture.sqlite_graph_canonical_model

  - id: architecture.sqlite_graph_canonical_model
    type: architecture_decision
    title: Graphmodell als Point of Truth
    status: approved
    ownerDomain: CrossDomain
    summary: Die validierten Graphen sind der fachliche Point of Truth fuer Artefakte und Beziehungen. Der SQLite-Graph ist die aktuelle kanonische Pflege-, Pruef- und Abfragestruktur; YAML bleibt Legacy-Import, Bootstrap oder Export, solange die Aequivalenz nachweisbar ist.
    references:
      - principle.sqlite_graph_is_canonical_model
    rules:
      - Der Graph gewinnt bei Widerspruechen gegenueber YAML, Markdown, generierten Lesesichten oder manuell gepflegten Dokumenten.
      - YAML-Dateien duerfen nicht parallel fachlich weitergepflegt werden, wenn der SQLite-Graph dieselbe Struktur fehlerfrei abbildet.
      - Aenderungen am fachlichen Modell erfolgen kuenftig im Graphmodell oder ueber Werkzeuge, die direkt auf dem Graphmodell schreiben.
      - YAML-Exporte muessen aus dem Graphmodell erzeugt werden, nicht umgekehrt.
      - Eine Migration gilt nur als abgeschlossen, wenn der Graphimport 0 harte Validierungsfehler meldet.

  - id: architecture.top_down_development
    type: architecture_decision
    title: Top-down-Entwicklung
    status: approved
    ownerDomain: CrossDomain
    summary: Vision, Business Goals, Customer Journeys und Requirements bestimmen Metamodell, Datenmodell und Implementierung.

  - id: architecture.domain_ownership
    type: architecture_decision
    title: Fachliche Heimatdomaene je Artefakt
    status: approved
    ownerDomain: CrossDomain
    summary: Jede Klasse besitzt genau einen fachlichen Eigentuemer; andere Domaenen referenzieren nur.

  - id: architecture.no_central_knowledge_domain
    type: architecture_decision
    title: Keine zentrale Knowledge-Domaene
    status: approved
    ownerDomain: CrossDomain
    summary: Die gemeinsame Wissensbasis entsteht verteilt ueber Domaenen und Beziehungen.

  - id: architecture.project_flow_item
    type: architecture_decision
    title: ProjectFlowItem statt ProjectContentItem
    status: approved
    ownerDomain: Learning
    summary: Reihenfolge im Projektablauf wird ueber ProjectFlowItem modelliert, nicht an Lesson oder ProjectStep.

  - id: architecture.condition_entity
    type: architecture_decision
    title: Condition als eigenstaendiges Artefakt
    status: approved
    ownerDomain: Learning
    summary: Pre- und PostConditions werden als wiederverwendbare Conditions modelliert, nicht als Freitext.

  - id: architecture.capability_split
    type: architecture_decision
    title: TechnicalCapability und SystemCapability trennen
    status: approved
    ownerDomain: CrossDomain
    summary: Hardware-Faehigkeiten und Produktberechtigungen duerfen nicht vermischt werden.

  - id: architecture.firmware_user_hw_config_separation
    type: architecture_decision
    title: User-Code und Hardware-Konfiguration in getrennten Dateien
    status: approved
    ownerDomain: DeviceManagement
    summary: Firmware-Runtime, User-Code und Hardware-Konfigurationen werden physisch getrennt. User-veraenderliche Dateien liegen in einem eigenen User-Ordner; jede Hardware-Funktion wie WiFi oder PWM besitzt eine separate Konfigurationsdatei.
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
    rules:
      - Runtime-Dateien enthalten Plattformfunktionen wie OTA, Connectivity, Versionierung und spaetere Statusmeldungen.
      - User-Code liegt in eigenen Dateien, zum Beispiel `src/user/user_app.cpp`.
      - Jede Hardware-Konfiguration liegt in einer separaten Datei, zum Beispiel `wifi_config.h` oder `hw_pwm_config.h`.
      - Lokale Konfigurationsdateien ohne `.example` duerfen nicht versehentlich versioniert werden.

  - id: architecture.runtime_basis_user_artifact_separation
    type: architecture_decision
    title: Runtime-Basissoftware und User-Artefakte werden runtime-unabhaengig getrennt
    status: approved
    ownerDomain: Learning
    summary: Jedes Lern- oder Kundenprojekt erhaelt eine initiale Projektsoftware aus GerNetiX Runtime/Basissoftware, Projekt-Template und User-Artefakten. Nutzeranpassungen duerfen nur in definierten User-Dateien und projektspezifischen Konfigurationsdateien stattfinden; Basissoftware und Runtime-Dateien bleiben geschuetzt und updatefaehig. Diese Regel gilt nicht nur fuer ESP32-Firmware, sondern auch fuer Desktop-, Web-, Mobile- und spaetere weitere Runtimes.
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.firmware_local_feedback_weblog
      - nfr.service_deployment_portability
    rules:
      - Basissoftware enthaelt Runtime, Build-/Update-Anbindung, Logging, Feedback, Plattformadapter und stabile Schnittstellen zum User-Code.
      - Projekt-Templates liefern projektspezifische Startstrukturen fuer konkrete Lern- oder Kundenprojekte.
      - User-Artefakte sind der einzige direkt vom Nutzer veraenderliche Bereich.
      - Basissoftware-Updates duerfen User-Artefakte nicht ueberschreiben.
      - Jede Runtime muss deklarieren, welche Dateien geschuetzt und welche Dateien user-editierbar sind.
      - IDE und Build-Pipeline muessen warnen oder blockieren, wenn ein Projekt die geschuetzte Basissoftware entfernt oder direkt veraendert.
    appliesTo:
      - ESP32 Firmware
      - Arduino-Framework Firmware
      - Arduino-Board Atmel/AVR Firmware ohne Arduino-Framework
      - Desktop Runtime
      - Web Runtime
      - Mobile Runtime
      - weitere spaetere Runtimes

  - id: architecture.arduino_board_two_basissoftware_variants
    type: architecture_decision
    title: Arduino-Boards erhalten zwei Basissoftware-Varianten
    status: approved
    ownerDomain: Learning
    summary: Arduino-kompatible AVR-Boards werden fachlich als Hardware-Plattform betrachtet. Darauf duerfen zwei getrennte GerNetiX-Basissoftware-Varianten existieren: eine mit Arduino-Framework fuer den einfachen Lern- und Bibliothekseinstieg und eine ohne Arduino-Framework fuer direkte Atmel-/AVR-nahe Programmierung.
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
    references:
      - architecture.runtime_basis_user_artifact_separation
    affectsArchitectureArtifacts:
      - component.build_package_creator
      - component.firmware_build_job_runner
    rules:
      - Arduino-Framework-Projekte verwenden `basissoftware/arduino-framework`.
      - Atmel-/AVR-nahe Projekte ohne Arduino-Framework verwenden `basissoftware/arduino-atmel`.
      - Beide Varianten trennen geschuetzte Basisdateien und User-Artefakte.
      - Die Auswahl der Variante ist Teil des Projektmodells beziehungsweise BuildPackages und darf nicht implizit aus dem Boardnamen abgeleitet werden.
      - Der Build-&-Deploy-Server baut beide Varianten ueber PlatformIO, sofern das BuildPackage eine passende `platformio.ini` und Quellen enthaelt.

  - id: architecture.project_server_build_deploy_server_split
    type: architecture_decision
    title: Projektserver und Build-&-Deploy-Server trennen
    status: approved
    ownerDomain: IDE
    summary: Der Projektserver bleibt Quelle der Wahrheit fuer Benutzer, Projekte, Geraete, Quellcode und Build-Historie. Der Build-&-Deploy-Server fuehrt nur temporaere Build- und Deploy-Jobs aus, darf technische Caches behalten, kommuniziert mit Geraeten per MQTT und HTTPS und loescht temporaere Projektdaten nach Abschluss.
    derivedFromRequirements:
      - requirement.firmware_build_deploy_server
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.ide_ota_device_selection_from_profile
    affectsArchitectureArtifacts:
      - architecture_artifact.project_server
      - architecture_artifact.build_deploy_server
      - architecture_artifact.device_management_server
    rules:
      - Der Projektserver erstellt fuer jeden Build ein vollstaendiges BuildPackage als Snapshot des Projekts.
      - Das BuildPackage enthaelt BuildJob-Metadaten, PlatformIO-Konfiguration, `src`, `include`, `lib`, `assets` und optional vorberechnete Dateien.
      - Das BuildPackage wird per HTTP an den Build-&-Deploy-Server uebertragen.
      - Der Build-&-Deploy-Server darf niemals direkt auf dauerhafte Projektdaten zugreifen.
      - Der Build-&-Deploy-Server kompiliert ausschliesslich aus diesem BuildPackage.
      - Firmware, BuildResult, Build-Log, Deploy-Log und Status werden an den Projektserver zurueckgegeben.
      - Das BuildResult enthaelt mindestens ein primaeres Firmware-Artefakt (`firmware.bin` oder `firmware.hex`), `firmware.elf`, `build.log`, Build-Status, SHA-256 und Dateigroesse.
      - `firmware.map` wird uebernommen, wenn die Zielplattform es erzeugt.
      - Temporaere Projektdaten werden nach Abschluss des Jobs vom Build-&-Deploy-Server geloescht.
      - Technische Caches wie PlatformIO, Toolchains, Libraries und Objektdateien duerfen erhalten bleiben.
      - Der technische Cache ist niemals Quelle der Wahrheit; bei Cacheverlust muss der Build weiterhin moeglich sein, nur langsamer.
      - Prebuilds duerfen beim Erstellen oder Oeffnen eines Lernprojekts gestartet werden, um Caches aufzuwarmen.
      - Ein Prebuild loest niemals ein OTA-Deployment aus.
      - Fuer den lokalen MVP darf ein vom Nutzer ausgeloester `build_and_usb_flash`-Job nach erfolgreichem Build `platformio run -t upload` mit optionalem Upload-Port ausfuehren.
      - OTA wird ausschliesslich durch einen vom Nutzer ausgeloesten Build-&-Flash-Auftrag gestartet.
      - Nach erfolgreichem Build uebernimmt der Build-&-Deploy-Server den Deploy.
      - MQTT dient ausschliesslich fuer Deploy-Auftraege, Statusmeldungen, Heartbeats und Telemetrie.
      - HTTPS dient fuer Firmware-Download und Artefaktuebertragung.
      - Der Build-&-Deploy-Server stellt Firmware per HTTPS bereit und sendet Deploy-Auftraege per MQTT.
      - Devices melden Deploy-Status per MQTT zurueck.
      - Pro Device ist maximal ein aktiver Build-/Deploy-Job erlaubt.
      - Optional darf genau ein wartender Job pro Device existieren; neue wartende Jobs ersetzen aeltere wartende Jobs.
      - Der Projektserver ist fachlicher Zustand; der Build-&-Deploy-Server ist Build- und Deploy-Ausfuehrung.
      - Der Buildserver ist fachlich zustandslos und besitzt keine dauerhaften Projektdaten.

  - id: architecture.project_bound_ide_view_manifest
    type: architecture_decision
    title: IDE- und Lernansichten sind projektgebundene Manifeste
    status: approved
    ownerDomain: IDE
    summary: Gefuehrte IDE-Ansichten werden nicht im Viewer hart kodiert. Der Project Server speichert pro Projekt ein ProjectViewManifest mit Analyse-, Erklaerungs-, Diagramm- und Umsetzungssichten sowie Steuerwissen zu benoetigten View-Faehigkeiten und Control-Actions; die User IDE rendert diese Views generisch.
    derivedFromRequirements:
      - requirement.project_bound_guided_ide_views
    affectsArchitectureArtifacts:
      - app.user_ide
      - architecture_artifact.project_server
    rules:
      - Projektspezifische Didaktik, Diagrammquellen und View-Reihenfolgen gehoeren in das Projektmanifest.
      - Projektschritte duerfen benoetigte Funktionen ueber `required_functions` und `controls.actions` beschreiben; die IDE stellt dafuer wiederverwendbare View-Faehigkeiten bereit.
      - Der Viewer darf View-Typen generisch kennen, aber keine Tamagotchi-, RFID- oder andere Projektdomaene fest einbauen.
      - Das ProjectViewManifest ist Teil des Project-Server-Projekts und wird mit BuildPackages als Snapshot ausgeliefert.
      - Lernmodus und IDE nutzen dasselbe Projektmodell und duerfen keine getrennte Projektverwaltung erzeugen.

  - id: architecture.fast_embedded_firmware_feedback_loop
    type: architecture_decision
    title: Schneller Embedded-Firmware-Feedbackweg vor Vollbuild
    status: approved
    ownerDomain: DeviceManagement
    summary: Embedded-Firmware-Entwicklung nutzt standardmaessig einen schnellen Feedbackweg aus Contract-, Syntax- und Modulchecks. Vollstaendige PlatformIO-/ESP-IDF-Builds und USB-/OTA-Flashs sind bewusste Integrationsschritte und duerfen nicht als normale Kurzpruefung jeden Laptop belasten.
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.firmware_build_deploy_server
      - nfr.firmware_flash_must_not_brick_board
    references:
      - architecture.project_server_build_deploy_server_split
      - architecture.runtime_basis_user_artifact_separation
    affectsArchitectureArtifacts:
      - architecture_artifact.build_deploy_server
      - component.firmware_build_job_runner
      - component.build_cache
      - component.prebuild_scheduler
    rules:
      - Der Standardnachweis fuer kleine Firmware-Aenderungen ist kein vollstaendiger ESP-IDF-/PlatformIO-Build.
      - Kleine Aenderungen werden zuerst per Syntax-/Contract-Check, Header-Pruefung, API-/Manifest-Kompatibilitaet und gezielten Host-Tests validiert.
      - Basissoftware und User-Code muessen so geschnitten sein, dass Basissoftware nicht fuer jede User-Code-Aenderung neu kompiliert werden muss.
      - Vollbuilds laufen nur auf ausdrueckliche Nutzeraktion, im Build-&-Deploy-Server oder auf einem vorbereiteten Build-Host mit Cache.
      - Vollbuilds muessen ein hartes Timeout haben und duerfen nach Abbruch keine PlatformIO-, Python-, Compiler- oder Flash-Prozesse zuruecklassen.
      - USB-Flash und OTA-Flash sind Integrationsschritte nach erfolgreichem Build und werden nicht fuer reine Code- oder Contract-Pruefungen gestartet.
      - Der Build-&-Deploy-Server muss langfristig vorgewaermte Toolchain-, Framework-, CMake-/Ninja- und Objekt-Caches verwenden.
      - Fuer lokale Laptop-Arbeit gilt: kurze Checks bevorzugen, Vollbuild nur wenn ein echtes Firmware-Artefakt oder ein echter Flash benoetigt wird.

  - id: architecture.provisioning_runtime_contract_no_dev_prod_split
    type: architecture_decision
    title: Provisioning nutzt einen einheitlichen Runtime-Vertrag ohne Dev-/Prod-Split
    status: approved
    ownerDomain: DeviceManagement
    summary: Provisioning, echter USB-Flash und Firmware-Artefaktauswahl muessen auf Entwicklungsrechner und Zieldeployment ueber denselben Runtime-Vertrag funktionieren. Der Server darf keine benutzerspezifischen lokalen Toolchain-Pfade erraten und keinen fachlichen Dev-/Prod-Schalter einfuehren.
    derivedFromRequirements:
      - requirement.device_manufacturer_registration
      - nfr.service_deployment_portability
      - nfr.firmware_flash_must_not_brick_board
    affectsArchitectureArtifacts:
      - app.provisioning_tool
      - component.device_connectivity_setup
      - architecture_artifact.device_management_server
    rules:
      - Es gibt keinen fachlichen Schalter zwischen Entwicklung und Deployment fuer Provisioning.
      - Firmware-Artefakte werden serverseitig ueber den Hardware-Katalog und den SQLite-/Artifact-Store referenziert.
      - Die USB-Flash-Toolchain ist ein Runtime-Artefakt mit Manifest `.runtime/toolchains/provisioning/toolchain.json`.
      - Echter USB-Flash wird nur angeboten, wenn Freigabe, Firmware-Artefakt und Toolchain-Readiness gemeinsam erfuellt sind.
      - Fehlende Runtime-Voraussetzungen sind als konkrete Readiness-Fehler sichtbar zu machen und duerfen nicht erst als `spawn ENOENT` beim Flashen auftreten.
      - Lokale Benutzerpfade duerfen nicht im Servercode hart kodiert oder automatisch erraten werden.

  - id: decision.esp32_ota_bootstrap_firmware.wifi_setup
    type: open_decision
    title: WLAN-Setup-Flow fuer ESP32-Basissoftware festlegen
    status: open
    ownerDomain: DeviceManagement
    summary: Die ESP32-Basissoftware startet aktuell einen offenen Setup-AP mit lokalem Device-Webinterface. Offen ist, wie der Nutzer Ziel-WLANs auswaehlt, Zugangsdaten sicher lokal speichert und wie der Setup-Zugang abgesichert wird.
    context:
      - Implementiert ist der sichtbare AP `GerNetiX-Setup`.
      - Implementiert sind lokale Endpunkte `/`, `/status` und `/logs` unter `http://192.168.4.1/`.
      - Noch nicht implementiert sind WLAN-Scan, Formular fuer SSID/Passwort, NVS-Persistenz der Ziel-WLAN-Daten und Fallback-Verhalten bei Verbindungsfehlern.
    options:
      - Offener AP fuer lokalen Lernmodus beibehalten.
      - Setup-AP mit Geraete-PIN oder zeitlich begrenztem Passwort absichern.
      - Erst Webformular und NVS lokal bauen, Pairing/Auth spaeter ergaenzen.
    affectsArchitectureArtifacts:
      - component.device_connectivity_setup
      - component.firmware_feedback
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.firmware_local_feedback_weblog

  - id: decision.esp32_ota_bootstrap_firmware.flash_layout
    type: open_decision
    title: Flash-Layout und Boardprofil fuer OTA festlegen
    status: open
    ownerDomain: DeviceManagement
    summary: Das aktuelle lokale Board meldet 2 MB Flash, waehrend das PlatformIO-Boardprofil `esp32dev` 4 MB erwartet. Fuer robuste OTA-Faehigkeit muss entschieden werden, ob 2-MB-Boards unterstuetzt werden und welches Partition-Layout verwendet wird.
    context:
      - Der aktuelle Build passt in die Single-App-Partition.
      - PlatformIO warnt vor Flash-Groessen-Mismatch.
      - OTA benoetigt ein geeignetes Partition-Layout und darf das Board laut NFR nicht unbrauchbar machen.
    options:
      - 2-MB-Boardprofil mit passender Partitionierung unterstuetzen.
      - Fuer OTA-faehige Lernpfade 4-MB-ESP32-Boards voraussetzen.
      - 2-MB-Boards nur fuer USB-/Recovery-/Minimalmodus ohne OTA zulassen.
    affectsArchitectureArtifacts:
      - component.ota
      - component.device_connectivity_setup
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - nfr.firmware_flash_must_not_brick_board

  - id: decision.esp32_ota_bootstrap_firmware.ota_authentication
    type: open_decision
    title: OTA-Authentifizierung fuer ESP32-Basissoftware festlegen
    status: open
    ownerDomain: DeviceManagement
    summary: Es ist offen, ob der erste OTA-Prototyp lokal/offen, mit Token/HMAC oder direkt mit signierten Firmware-Artefakten und Device-Credentials startet.
    options:
      - Lokaler Lern-Prototyp ohne Cloud-Auth, aber mit Hash- und Groessenpruefung.
      - HMAC-/Token-basierter Deploy-Auftrag ueber Device Management und Build-&-Deploy.
      - Signierte Firmware und Device-Credential-Pruefung schon im ersten OTA-Flow.
    affectsArchitectureArtifacts:
      - component.ota
      - architecture_artifact.device_management_server
      - architecture_artifact.build_deploy_server
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.firmware_build_deploy_server
      - nfr.firmware_flash_must_not_brick_board

  - id: decision.esp32_ota_bootstrap_firmware.service_endpoints
    type: open_decision
    title: Service-Endpunkt-Konfiguration fuer Device Management und Build-&-Deploy festlegen
    status: open
    ownerDomain: DeviceManagement
    summary: Die Basissoftware darf keine feste lokale IP, Homeserver-Adresse oder Cloud-Adresse enthalten. Offen ist, wie Device-Management-, Build-&-Deploy-, MQTT- und HTTPS-Endpunkte initial gesetzt und spaeter kontrolliert aktualisiert werden.
    options:
      - Endpunkte initial nur lokal im Device-Webinterface setzen.
      - Endpunkte ueber Provisioning/Recovery Tool schreiben.
      - Endpunkte per DNS-basiertem Default plus kontrolliertem Konfigurationsupdate verwalten.
    affectsArchitectureArtifacts:
      - component.device_connectivity_setup
      - component.ota
      - architecture_artifact.device_management_server
      - architecture_artifact.build_deploy_server
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.firmware_build_deploy_server

  - id: architecture.identity_internal_user_id
    type: architecture_decision
    title: Interne user_id ist fuehrende Identitaet
    status: approved
    priority: high
    ownerDomain: Account
    summary: Account Identity ist fuehrend. Klassische Registrierung und externe Provider erzeugen immer einen internen UserAccount mit eindeutiger `identity.user_id`. Andere Dienste speichern nur Referenzen auf `identity.user_id`; sie duerfen Account-Metadaten hoechstens als Snapshot/Cache anzeigen, aber nicht als Wahrheit fuehren.
    references:
      - architecture.sql_only_persistence
    derivedFromRequirements:
      - requirement.identity_registration_login
    affectsArchitectureArtifacts:
      - architecture_artifact.identity_server
      - architecture_artifact.project_server
      - architecture_artifact.ai_context_server
      - architecture_artifact.ai_usage_observability
      - architecture_artifact.admin_tool
    rules:
      - Jede Registrierung erzeugt genau einen internen UserAccount.
      - LocalCredential und ExternalIdentity verweisen auf einen internen UserAccount.
      - Folgemodule und andere Dienste verwenden ausschliesslich die interne `identity.user_id` als Account-Referenz.
      - Projekt-, AI-Context-, AI-Usage-, Admin- und weitere Fachdienste duerfen keinen zweiten fachlichen Account-Stammdatensatz fuehren.
      - Account-Metadaten ausserhalb des Identity Service sind nur Snapshot, Cache oder Anzeigehilfe und muessen bei Widerspruch gegen Identity verlieren.
      - Account-Fallbacks auf Username, E-Mail, `demo`, `unknown`, Anzeigenamen oder andere Ersatzwerte sind verboten; fehlt `identity.user_id`, muss der Vorgang sichtbar fehlschlagen.
      - Demo- und Testdaten muessen ebenfalls stabile Identity-IDs verwenden, zum Beispiel `acct-demo`, und duerfen keine Sonderlogik erzeugen, die im Betrieb Fehler verdeckt.
      - Provider-IDs bleiben technische Fremdschluessel innerhalb des Identity-Moduls.
      - E-Mail ist intern und wird nicht als oeffentliche Identitaet verwendet.
      - Oeffentliche Identitaet ist spaeter der Benutzername.

  - id: architecture.service_process_portability
    type: architecture_decision
    title: Services als portable Prozesse schneiden
    status: approved
    ownerDomain: CrossDomain
    summary: GerNetiX-Services werden so geschnitten, dass sie zuerst gemeinsam auf einem Linux-Homeserver oder kleinen Server laufen koennen und spaeter einzeln in Cloud-Umgebungen wie AWS migrierbar bleiben. Unterordner im Repo sind nur Codeorganisation, nicht fachliche In-Process-Kopplung.
    references:
      - nfr.service_deployment_portability
    affectsArchitectureArtifacts:
      - architecture_artifact.identity_server
      - architecture_artifact.project_server
      - architecture_artifact.build_deploy_server
      - architecture_artifact.device_management_server
    rules:
      - Jeder fachliche Service muss als eigenstaendiger Prozess betreibbar sein.
      - Repo-Unterordner duerfen keine implizite Laufzeitkopplung bedeuten.
      - Service-zu-Service-Kommunikation erfolgt ueber explizite APIs, Events oder Adapter.
      - Fachlicher Zustand gehoert in explizite Repositories oder Datenbanken.
      - Prozessspeicher, lokale Temp-Dateien und Build-Caches duerfen nie fachliche Quelle der Wahrheit sein.
      - Ports, Hostnames, Datenbankverbindungen, Broker-URLs und externe Basis-URLs muessen konfigurierbar sein.
      - Ein Linux-Homeserver-Deployment ist der erste pragmatische Zielbetrieb.
      - Cloud-Deployment muss spaeter ohne Aenderung fachlicher API-Vertraege moeglich sein.
      - Containerisierung darf vorbereitet werden, ist aber kein fachliches Muss fuer den ersten Stand.

  - id: architecture.permission_precedence
    type: architecture_decision
    title: Berechtigungsprioritaet Override vor Plan vor Default
    status: approved
    ownerDomain: Authorization
    summary: Effektive Berechtigungen werden aus AccountSystemCapabilityOverride, PlanSystemCapability und System Default berechnet; DENY gewinnt.

  - id: architecture.sql_only_persistence
    type: architecture_decision
    title: Persistenz nur in SQL
    status: approved
    priority: high
    ownerDomain: CrossDomain
    summary: Dauerhaftes Persistieren fachlicher oder administrativer Plattformdaten ist nur in SQL/SQLite erlaubt. Alles andere ist Logic, Control oder View und darf nicht als Quelle der Wahrheit behandelt werden.
    references:
      - architecture.sqlite_graph_canonical_model
      - architecture.project_server_build_deploy_server_split
      - architecture.service_process_portability
    affectsArchitectureArtifacts:
      - architecture_artifact.project_server
      - architecture_artifact.ai_context_server
      - architecture_artifact.identity_server
      - architecture_artifact.admin_tool
      - architecture_artifact.persistence_server
    rules:
      - Fachlicher Zustand, Konfiguration mit Produktwirkung, Account-/Projektbezug, KI-Kontext, Grants, Policy, Audit, Usage, Build-Historie und Admin-Konfiguration muessen in einer expliziten SQL-/SQLite-Datenbank liegen.
      - JSON-Dateien, YAML-Dateien, Prozessspeicher, localStorage, sessionStorage, Browser-State, Temp-Dateien, Build-Caches und generierte Lesesichten sind keine Persistenzquelle.
      - Solche Nicht-SQL-Artefakte duerfen nur als Logic/Control/View, Import-/Exportformat, Test-Fixture, Cache, Snapshot oder temporaerer Runtime-Helfer verwendet werden.
      - Wenn ein Nicht-SQL-Artefakt aus technischen Gruenden existiert, muss es aus SQL rekonstruierbar sein oder als explizit nicht-fachlicher Runtime-/Test-State markiert werden.
      - Services duerfen keine zweite fachliche Wahrheit neben ihrer SQL-Datenbank fuehren.
      - Browserseitige Speicherung darf hoechstens UI-Komfort, aktuelle Auswahl oder transienten Kontrollzustand halten; erneutes Laden muss die fachliche Wahrheit aus Server-APIs und SQL beziehen.
      - Migrationen, neue Features und Admin-Tools muessen diese Regel pruefen, bevor neue Dateien, Stores oder Config-Formate eingefuehrt werden.

  - id: architecture.registered_processor_board
    type: architecture_decision
    title: RegisteredProcessorBoard trennt konkretes Board vom Produkttyp
    status: approved
    ownerDomain: DeviceManagement
    summary: ProcessorBoard ist Produkttyp, RegisteredProcessorBoard ist konkretes Board mit Pairing, Credential, Firmware und OTA-State.

  - id: requirement_model.decomposition_ends_at_work_package
    type: requirement_rule
    title: Dekomposition endet bei Work Packages
    status: approved
    ownerDomain: CrossDomain
    summary: Fachliche Requirements duerfen rekursiv zerlegt werden; technische Details wie APIs, Views, Services oder Tests sind keine eigenen Requirements.

  - id: requirement_model.recursive_requirement_decomposition
    type: requirement_rule
    title: Rekursive Requirement-Dekomposition ohne eigenen SubRequirement-Typ
    status: approved
    ownerDomain: CrossDomain
    summary: Teilanforderungen werden als normale Requirements modelliert und koennen upstream auf ihr uebergeordnetes Requirement verweisen.
    rules:
      - Es wird kein Artefakttyp SubRequirement oder Teilanforderung eingefuehrt.
      - Jede fachliche Teilanforderung bleibt ein Requirement.
      - Wenn ein Parent existiert, wird die Beziehung von unten nach oben gespeichert: Child Requirement derived_from Parent Requirement.
      - Requirement-Ketten duerfen beliebig tief sein, solange sie fachlich sinnvoll bleiben.
      - Requirement-Ketten muessen azyklisch sein.
      - Top-Level-Requirements ohne Upstream-Pfad zur Vision sind zulaessig.
      - Die Zerlegung endet vor technischen Umsetzungstasks wie API, View, Service, Migration oder Test.
