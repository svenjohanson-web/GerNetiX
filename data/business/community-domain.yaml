      - business_domain.community
    realizesCapabilities:
      - BC-040
    pathPrinciples:
      - Community-Inhalte bleiben die fachliche Wissensbasis.
      - KI-Zusammenfassungen muessen Quellen und Originalbeitraege referenzieren.
      - Premium-KI erweitert die Community, ersetzt aber nicht die kostenlose Community.
