schemaVersion: 1
kind: customer_journey_catalog
sourceStatus: legacy_import_source
items:
  - id: CJ-001
    type: customer_journey
    title: Neuer Benutzer entdeckt die Plattform
    status: draft
    ownerDomain: Business
    summary: Lerngebiet auswaehlen, Kurs kaufen, Hardware kennenlernen, Projekt starten.
    supports:
      - BG-002
    steps:
      - Lerngebiet auswaehlen
      - Kurs kaufen
      - Hardware kennenlernen
      - Projekt starten

  - id: CJ-002
    type: customer_journey
    title: Benutzer inventarisiert vorhandene Hardware
    status: draft
    ownerDomain: Business
    summary: Hardware inventarisieren, Matching, Projektvorschlaege und Lernpfad ableiten.
    supports:
      - BG-004
    steps:
      - Vorhandene Hardware inventarisieren
      - Hardware Matching durchfuehren
      - Projektvorschlaege erhalten
      - Lernpfad ableiten

  - id: CJ-003
    type: customer_journey
    title: Benutzer beginnt ein Projekt
    status: draft
    ownerDomain: Business
    summary: Projekt beginnen, durchfuehren, Kompetenzen aufbauen und Projekt abschliessen.
    supports:
      - BG-002
    steps:
      - Projekt beginnen
      - Projekt durchfuehren
      - Kompetenzen aufbauen
      - Projekt abschliessen

  - id: CJ-004
    type: customer_journey
    title: Benutzer kehrt spaeter zurueck
    status: draft
    ownerDomain: Business
    summary: Projektzustand und Conditions pruefen, Projekt fortsetzen.
    supports:
      - BG-005
    steps:
      - Projektzustand pruefen
      - Conditions pruefen
      - Projekt fortsetzen

  - id: CJ-005
    type: customer_journey
    title: Benutzer besitzt Hardware, aber noch nicht alle Lernziele
    status: draft
    ownerDomain: Business
    summary: Passende neue Lernangebote empfehlen, Kurs kaufen, neue Projekte freischalten.
    supports:
      - BG-001
    steps:
      - Passende neue Lernangebote empfehlen
      - Kurs kaufen
      - Neue Projekte freischalten

  - id: CJ-006
    type: customer_journey
    title: Benutzer besitzt ein neues ProcessorBoard
    status: draft
    ownerDomain: Business
    summary: Board registrieren, Pairing, Provisioning, OTA einrichten und IDE verwenden.
    supports:
      - BG-003
      - BG-006
      - BG-007
    steps:
      - Board registrieren
      - Pairing durchfuehren
      - Provisioning durchfuehren
      - OTA einrichten
      - IDE verwenden

  - id: CJ-007
    type: customer_journey
    title: Administrator erweitert die Plattform
    status: draft
    ownerDomain: Business
    summary: Produktideen, Projektideen, Courses, Learning Goals, Projekte, Hardware und Capabilities sichten, bearbeiten und erweitern.
    supports:
      - BG-005
    steps:
      - Produktideen sichten und bewerten
      - Projektideen sichten und bewerten
      - Kaufbare Learning-Angebote vom Typ Course bearbeiten
      - Hardware anlegen
      - Learning Goals erweitern
      - Projekte ergaenzen
      - Capabilities pflegen

  - id: CJ-008
    type: customer_journey
    title: Administrator pflegt Grants und Hardwarekatalog
    status: draft
    ownerDomain: Business
    summary: Administrator verwaltet Freischaltungen, Plaene, SystemCapabilities und neue Hardwaretypen wie ProcessorBoards im Hardware-Katalog.
    supports:
      - BG-005
      - BG-006
    steps:
      - Neuen Hardwaretyp anlegen
      - ProcessorBoard-Typ beschreiben
      - TechnicalCapabilities zuordnen
      - SystemCapabilities oder Grants pflegen
      - Plan- oder Account-Overrides pruefen
      - Aenderung nachvollziehbar dokumentieren

  - id: CJ-009
    type: customer_journey
    title: Benutzer identifiziert sich in der IDE
    status: draft
    ownerDomain: Business
    summary: Benutzer meldet sich in der IDE an, damit die Plattform berechtigte Services, Projekte, Flash-Funktionen und Supportkontexte bereitstellen kann.
    supports:
      - BG-001
      - BG-003
      - BG-006
    steps:
      - Benutzer meldet sich in der IDE an
      - Account wird identifiziert
      - Plan und Account Overrides werden geprueft
      - Berechtigte Services werden freigeschaltet
      - Nicht berechtigte Services bleiben gesperrt oder werden als Angebot sichtbar

  - id: CJ-010
    type: customer_journey
    title: Support prueft registriertes Board
    status: draft
    ownerDomain: Business
    summary: Support prueft anhand von RegisteredProcessorBoard, Pairing und Credential-Historie, ob ein Board support- oder reklamationsberechtigt ist.
    supports:
      - BG-006
      - BG-007
    steps:
      - Board wird vom Benutzer oder Support identifiziert
      - RegisteredProcessorBoard wird gesucht
      - OwnerAccount und Kauf-/Pairing-Kontext werden geprueft
      - Credential- und Firmware-Zustand werden bewertet
      - Support- oder Reklamationsanspruch wird nachvollziehbar entschieden

  - id: CJ-011
    type: customer_journey
    title: Benutzer kauft passende Hardware in der IDE
    status: draft
    ownerDomain: Business
    summary: Benutzer bekommt in der IDE passende Hardware angeboten, kann ein geeignetes ProcessorBoard kaufen und mit vorbespielter Firmware komfortabel starten.
    supports:
      - BG-002
      - BG-004
      - BG-006
    steps:
      - Benutzer waehlt Lernziel oder Projekt in der IDE
      - Plattform prueft benoetigte TechnicalCapabilities
      - IDE zeigt passende Hardware-Angebote aus dem Hardware Shop
      - Benutzer kauft ein geeignetes ProcessorBoard oder Kit
      - ProcessorBoard wird mit initialer Firmware ausgeliefert
      - Benutzer registriert und pairt das Board
      - Falls WiFi und OTA verfuegbar sind, kann spaeter ueber Cloud/OTA geflasht werden
