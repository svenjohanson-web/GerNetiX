schemaVersion: 1
kind: business_rule_catalog
sourceStatus: legacy_import_source
items:
  - id: BR-001
    type: business_rule
    title: Externe Verweise ohne Spam
    businessStatus: Approved
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Verweise in externen Communities erfolgen nur thematisch passend, hilfreich und ohne Spam.
    appliesToMeasures:
      - measure.external_community_presence
    constrainsBusinessCapabilities:
      - BC-008

  - id: BR-002
    type: business_rule
    title: Kein vollstaendiger Projektexport
    businessStatus: Idea
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Vollstaendiger Projektexport ist nicht vorgesehen, solange das Geschaeftsmodell auf plattformzentriertem Arbeiten basiert.
    appliesToMeasures:
      - measure.platform_centric_work
    constrainsBusinessCapabilities:
      - BC-020
      - BC-021

  - id: BR-003
    type: business_rule
    title: Karenzzeit nach Abonnementablauf
    businessStatus: Idea
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Nach Ablauf eines Abonnements beginnt eine Karenzzeit, in der Projekte noch erhalten bleiben.
    appliesToMeasures:
      - measure.subscription_lifecycle
    constrainsBusinessCapabilities:
      - BC-023
      - BC-024

  - id: BR-004
    type: business_rule
    title: Personenbezogene Projektdaten nach 30 Tagen loeschen
    businessStatus: Idea
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Nach 30 Tagen werden personenbezogene Projektdaten geloescht, sofern keine rechtliche oder fachliche Ausnahme gilt.
    appliesToMeasures:
      - measure.subscription_lifecycle
    constrainsBusinessCapabilities:
      - BC-024

  - id: BR-005
    type: business_rule
    title: Oeffentliche Wissensbeitraege anonymisiert erhalten
    businessStatus: Idea
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Oeffentliche Wissensbeitraege koennen anonymisiert erhalten bleiben, um die Wissensbasis nicht zu verlieren.
    appliesToMeasures:
      - measure.subscription_lifecycle
      - measure.community_knowledge_platform
    constrainsBusinessCapabilities:
      - BC-018
      - BC-024

  - id: BR-006
    type: business_rule
    title: Schutz vor unkontrollierten KI-Kosten
    businessStatus: Approved
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Kostenpflichtige KI-Nutzung muss technisch und wirtschaftlich begrenzt, nachvollziehbar und serverseitig kontrolliert werden, damit keine unkontrollierten oder unkalkulierbaren Betriebskosten entstehen.
    appliesToMeasures:
      - measure.extended_ai_features
      - measure.extended_cloud_resources
      - measure.premium_memberships
      - measure.ai_credit_management
      - measure.ai_prepaid_credit_check
      - measure.ai_budget_limits
      - measure.ai_usage_audit_trail
      - measure.ai_usage_monitoring
      - measure.ai_admin_cost_controls
      - measure.ai_suspicious_usage_detection
    constrainsBusinessCapabilities:
      - BC-027
      - BC-041
    constrainsSystemCapabilities:
      - system_capability.ai_credit_management
      - system_capability.ai_prepaid_credit_check
      - system_capability.ai_budget_limits
      - system_capability.ai_usage_audit_trail
      - system_capability.admin_ai_usage_monitoring
      - system_capability.admin_ai_cost_controls
      - system_capability.ai_suspicious_usage_detection
    rationale:
      - Schutz des Geschaeftsmodells.
      - Vermeidung finanzieller Verluste.
      - Planbare Betriebskosten.
      - Schutz vor Missbrauch, Endlosschleifen und automatisierten Angriffen.
      - Nachhaltige Skalierbarkeit kostenpflichtiger KI-Dienste.
    policies:
      - Negative Credit-Guthaben duerfen nicht entstehen.
      - Fuer den aktuellen Stand gilt `1 Credit = 1 Token`; Credit-Limits und Token-Limits duerfen nicht auseinanderlaufen.
      - Jeder kostenpflichtige KI-Aufruf muss vor Ausfuehrung serverseitig gegen Budget, Credits, Modellfreigabe und Schutzlimits geprueft werden.
      - Jeder kostenpflichtige KI-Aufruf muss als Usage Event protokolliert werden, auch wenn er abgelehnt oder fehlerhaft beendet wird.
      - Administratoren muessen KI-Nutzung, Kosten, Budgets und auffaellige Nutzungsmuster einsehen und steuern koennen.
  - id: BR-COURSE-ACCESS-001
    type: business_rule
    title: Kurskauf gewaehrt zeitlich begrenzten Plattformzugriff
    businessStatus: Idea
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Ein Kurskauf begruendet kein unbegrenztes Besitzrecht an allen Kursinhalten, sondern ein zeitlich begrenztes Nutzungsrecht an der Lernplattform und den freigeschalteten Kursinhalten.
    rule:
      - Der Standard-Kurskauf gewaehrt ein Jahr Zugriff auf die Lernplattform fuer die gekauften Kursinhalte.
      - Die Plattform entscheidet anhand von Kurskauf, Plan, Grants und Account-Overrides, welche Inhalte ein Nutzer aufrufen darf.
      - Downloadbare Materialien wie PDF-Dateien koennen zusaetzlich bereitgestellt werden, sind aber nicht das alleinige Arbeitsergebnis des Angebots.
      - Das Arbeitsergebnis ist primaer die gefuehrte Plattformleistung mit Kursinhalten, Projektfuehrung, Zugriffskontrolle, Aktualisierungen und optionalen Services.
      - Eine laengere oder dauerhafte Zugriffsdauer muss explizit als Angebot, Plan oder Sondergrant modelliert werden.
    rationale:
      - Die Learning Platform ist ein Servicebereich, keine reine Dokumentenlieferung.
      - Zeitlich begrenzter Zugriff reduziert unklare Langzeitverpflichtungen.
      - Grants und Plan-/Account-Overrides bleiben die technische Grundlage fuer effektiven Zugriff.
  - id: BR-COURSE-ACCESS-002
    type: business_rule
    title: Neue Projekte im Zugriffzeitraum ohne Liefergarantie
    businessStatus: Idea
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Neue Projekte, Inspirationen, Erweiterungen oder Kursverbesserungen koennen waehrend eines aktiven Zugriffzeitraums bereitgestellt werden, duerfen aber nicht als garantierte Liefermenge, Taktung oder konkreter Anspruch kommuniziert werden.
    appliesToMeasures:
      - measure.course_access_retention_window
      - measure.continuous_learning_paths
      - measure.premium_courses
    constrainsBusinessCapabilities:
      - BC-001
      - BC-025
      - BC-028
    rule:
      - Aktiver Kurszugriff kann neue passende Projekte, Inspirationen, Erweiterungen und Verbesserungen sichtbar machen.
      - Es wird kein Anspruch auf eine bestimmte Anzahl neuer Projekte im Zugriffzeitraum begruendet.
      - Es wird kein fester Veroeffentlichungsrhythmus zugesagt, sofern dieser nicht explizit in einem separaten Angebot vereinbart ist.
      - Marketing darf neue Inhalte als moeglichen Mehrwert und Kundenbindungsnutzen darstellen, aber nicht als garantiertes Lieferprogramm.
      - Bestehende Kursinhalte bleiben die gekaufte Hauptleistung; neue Inhalte sind kuratierte Erweiterungen, Bonus, Aktualisierung oder Folgeimpuls nach Plattformentscheidung.
    rationale:
      - Kundenbindung soll durch lebendige Plattform und neue Inspiration entstehen.
      - Gleichzeitig muessen unklare Dauerpflichten und falsche Erwartungshaltungen vermieden werden.
      - Die Plattform entscheidet anhand Kurs, Grants, Produktangebot und redaktioneller Roadmap, welche neuen Inhalte ein Nutzer sieht.


  - id: BR-CUSTOMER-DATA-CONSENT
    type: business_rule
    title: Kundenrelevante Daten nur zweckgebunden mit Consent einsehen
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Authorization
    summary: Kundenrelevante Daten duerfen durch Admin oder Support nur eingesehen werden, wenn ein gueltiger Consent, eine dokumentierte rechtliche Grundlage oder ein zwingender Sicherheits-/Missbrauchsfall vorliegt. Jede Einsicht muss zweckgebunden, zeitlich begrenzt und auditierbar sein.
    derivedFromRequirements:
      - requirement.customer_data_consent_for_admin_access
