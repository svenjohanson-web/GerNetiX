  - id: BC-001
    type: business_capability
    title: Value-based Bundling und Upselling
    businessStatus: In Analysis
    implementationStatus: Not Started
    status: draft
    ownerDomain: Business
    summary: Kunden koennen wertvollere Kombinationsangebote erhalten, bei denen sie mehr ausgeben, aber durch gebuendelte Courses, Preisvorteile und besseren Lernzusammenhang mehr Nutzen bekommen.
    businessTerms:
      - Bundling
      - Upselling
      - Value-based Offer
      - Warenkorbwert erhoehen
    supports:
      - BG-001
      - BG-002
      - BG-004
    realizedBy:
      - product_offering.embedded_basics_bundle
    providedByMeasures:
      - measure.premium_courses
    valueLogic:
      - Einzelne Courses bleiben gezielt kaufbar.
      - Bundles bieten eine groessere, fachlich zusammenhaengende Lernreise.
      - Der Kunde gibt mehr aus, erhaelt aber mehr Inhalte, bessere Orientierung und einen Preisvorteil gegenueber Einzelkaeufen.
      - Die Plattform kann passende Bundles aus Lernziel, Hardwarebestand und bisherigen Fortschritten ableiten.
    constraints:
      - Das Angebot muss fuer den Kunden nachvollziehbar mehr Nutzen liefern.
      - Bundles duerfen keine fachliche Lernlogik duplizieren.
      - Die enthaltenen Courses bleiben die fuehrenden Learning-Verkaufseinheiten.

