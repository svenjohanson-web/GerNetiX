  - id: BC-041
    type: business_capability
    title: Kostenkontrolle
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: Das Unternehmen kann variable Kosten, nutzungsabhaengige Anbieter-Kosten, Budgets, Margen und wirtschaftliche Risiken transparent erfassen, begrenzen und steuern.
    supports:
      - BG-008
    enablesBusinessStrategies:
      - business_strategy.optimize_costs
    businessTerms:
      - Kostenkontrolle
      - Cost Control
      - Cost Protection
      - Budget Control
      - Margensteuerung
    rationale:
      - Gewinn erwirtschaften setzt voraus, dass variable Kosten sichtbar, begrenzt und steuerbar bleiben.
      - Kostenpflichtige KI-, Cloud- oder Plattformdienste duerfen nicht unkontrolliert zu Verlusten fuehren.
      - Betreiber brauchen Transparenz ueber Kosten, Verbrauch, Budgets, Limits und Marge.
    providedByMeasures:
      - measure.ai_credit_management
      - measure.ai_prepaid_credit_check
      - measure.ai_budget_limits
      - measure.ai_usage_audit_trail
      - measure.ai_usage_monitoring
      - measure.ai_admin_cost_controls
      - measure.ai_suspicious_usage_detection
    realizedBySystemCapabilities:
      - system_capability.ai_credit_management
      - system_capability.ai_prepaid_credit_check
      - system_capability.ai_budget_limits
      - system_capability.ai_usage_audit_trail
      - system_capability.admin_ai_usage_monitoring
      - system_capability.admin_ai_cost_controls
      - system_capability.ai_suspicious_usage_detection
    referencesBusinessRules:
      - BR-006
    affectedArchitectureArtifacts:
      - architecture_artifact.ai_cost_protection
      - architecture_artifact.ai_usage_observability
    derivesRequirements:
      - requirement.ai_credit_balance
      - requirement.ai_prepaid_credit_check
      - requirement.ai_credit_consumption_calculation
      - requirement.ai_usage_limits
      - requirement.ai_model_access_control
      - requirement.ai_global_kill_switch
      - requirement.ai_usage_event_audit_trail
      - requirement.ai_admin_usage_dashboard
      - requirement.ai_admin_cost_control_actions
      - requirement.ai_cost_margin_reporting
      - requirement.ai_suspicious_usage_detection


