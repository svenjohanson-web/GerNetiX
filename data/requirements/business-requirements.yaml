  - id: requirement.codex_context_uses_graph_as_source_of_truth
    type: requirement
    title: Codex-Kontext aus dem fachlichen Graphen ableiten
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: CrossDomain
    summary: Codex muss wichtige Projektentscheidungen, Requirements, Architekturartefakte, Datenmodelle, APIs und erkannte Umsetzungsschnitte regelmaessig aus dem validierten Graphen als fachlichem Single Source of Truth laden koennen. Der Context Manager darf diese Wahrheit nicht ersetzen, sondern erstellt daraus redigierte, arbeitspaketbezogene Context Packs.
    derivedFromBusinessCapabilities:
      - BG-007
    affectsArchitectureArtifacts:
      - architecture_artifact.context_manager
      - architecture_artifact.business_traceability_model
    affectsDataModels:
      - data_model.context_scope
      - data_model.context_requirement_slice
      - data_model.context_pack
    affectsApiArtifacts:
      - api_artifact.context_manager
    acceptanceCriteria:
      - Aktive Architekturentscheidungen werden zentral im Graphen abgelegt.
      - Context Packs enthalten relevante aktive Entscheidungen fuer das aktuelle Arbeitspaket.
      - Context Packs markieren Widersprueche zwischen Graph-Status und Implementierung als Review-Befund.
      - Sensitive Werte werden vor Weitergabe an Codex oder KI-Kontexte redigiert.

  - id: requirement.identity_registration_login
    type: requirement
    title: Identity-Modul fuer Registrierung und Login bereitstellen
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: Account
    summary: Die Plattform muss klassische Registrierung, E-Mail-Verifizierung, lokalen Login, Passwort-Reset, Logout sowie externe Registrierung und Social Login ueber gekapselte OAuth2-/OpenID-Connect-Provider bereitstellen. Unabhaengig vom Registrierungsweg entsteht immer genau ein interner UserAccount mit eindeutiger `user_id`; andere Module duerfen ausschliesslich diese interne `user_id` verwenden.
    derivedFromBusinessCapabilities:
      - BC-044
      - BG-001
      - BG-002
      - BG-003
      - BG-007
    affectsArchitectureArtifacts:
      - architecture_artifact.identity_server
      - app.user_ide
    affectsDataModels:
      - data_model.user_account
      - data_model.local_credential
      - data_model.external_identity
      - data_model.verification_token
      - data_model.password_reset_token
      - data_model.auth_session
    affectsApiArtifacts:
      - api_artifact.identity
    requiredSystemCapabilities:
      - system_capability.account_identification
    acceptanceCriteria:
      - Klassische Registrierung erfasst Benutzername, E-Mail, Passwort, Passwortwiederholung und Zustimmung zu Datenschutz/AGB.
      - Benutzername und E-Mail muessen eindeutig sein.
      - Passwoerter werden sicher gehasht; Klartextpasswoerter werden nicht gespeichert.
      - Neue lokale Accounts starten mit Status `pending_verification`.
      - Ein VerificationToken wird erzeugt und ueber MockEmailService als Verifizierungslink ausgegeben.
      - Nach erfolgreicher E-Mail-Verifizierung wird der UserAccount auf `verified` gesetzt.
      - Social Login unterstuetzt Google, Apple, Microsoft und GitHub ueber gekapselte AuthProvider.
      - Provider duerfen in der ersten Implementierung gemockt sein.
      - Wenn eine ExternalIdentity bereits existiert, wird der zugehoerige UserAccount geladen und eingeloggt.
      - Wenn eine ExternalIdentity noch nicht existiert, wird ein neuer UserAccount angelegt und die ExternalIdentity verknuepft.
      - Provider-bestaetigte E-Mail-Adressen duerfen den Account direkt auf `verified` setzen; andernfalls bleibt der Account `pending_verification`.
      - Wenn ein Benutzername fehlt, wird ein eindeutiger Benutzername vorgeschlagen oder abgefragt.
      - Klassischer Login funktioniert mit Benutzername oder E-Mail plus Passwort.
      - Nur `verified` Accounts duerfen produktiv genutzt werden.
      - Erfolgreicher Login erzeugt Session/AuthToken.
      - Logout widerruft die Session oder das AuthToken.
      - Passwort-Reset ist nur fuer Accounts mit LocalCredential relevant.
      - Passwort-Reset-Antworten bleiben neutral, damit keine E-Mail-Existenz verraten wird.
      - E-Mail ist intern und darf nicht oeffentlich sichtbar sein.
      - Provider-IDs duerfen niemals ausserhalb des Identity-Moduls verwendet werden.

  - id: requirement.account_self_transparency_view
    type: requirement
    title: Kunden-IDE zeigt eigene Account- und Datentransparenz
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Account
    summary: Die User IDE muss dem angemeldeten Nutzer eine Sicht bereitstellen, die zeigt, wer er ist und welche personenbezogenen, kundenrelevanten und berechtigungsrelevanten Informationen GerNetiX ueber ihn fuehrt. Die Sicht muss erklaeren, welche Daten aus Identity, Payment, Abos, Angeboten, Grants, Devices, Lernfortschritt, Feedback, KI-Nutzung und Consents stammen und wann sie zuletzt aktualisiert wurden.
    derivedFromBusinessCapabilities:
      - BC-025
      - BC-042
      - BC-043
      - BC-044
      - BG-001
      - BG-003
      - BG-006
      - BG-007
    derivedFromRequirements:
      - requirement.identity_registration_login
      - requirement.account_competency_profile
      - requirement.customer_data_consent_for_admin_access
      - requirement.device_customer_registration_and_pairing
      - requirement.ai_credit_balance
    affectsArchitectureArtifacts:
      - app.user_ide
      - architecture_artifact.identity_server
      - architecture_artifact.project_server
      - architecture_artifact.device_management_server
    affectsDataModels:
      - data_model.account_transparency_snapshot
      - data_model.user_account
      - data_model.external_identity
      - data_model.auth_session
      - data_model.account_competency_profile
      - data_model.learning_recommendation
      - data_model.account_device
      - data_model.device_support_entitlement
      - data_model.ai_credit_account
      - data_model.ai_credit_ledger_entry
      - data_model.ai_usage_event
      - data_model.customer_data_access_consent
      - data_model.customer_data_access_audit_event
    affectsApiArtifacts:
      - api_artifact.account_self_transparency
      - api_artifact.identity
      - api_artifact.account_competency_profile
      - api_artifact.account_device_inventory
      - api_artifact.ai_credit_balance
      - api_artifact.customer_data_access_consent
    affectedUiModels:
      - ui_model.user_ide_account_transparency
    requiredSystemCapabilities:
      - system_capability.account_identification
      - system_capability.account_self_transparency
    acceptanceCriteria:
      - Die User IDE bietet eine eigene Sicht `Mein Profil` oder `Was weiss GerNetiX ueber mich?`.
      - Die Sicht zeigt Identitaet und oeffentliche Identitaet getrennt, insbesondere interne `user_id`, Benutzername, Accountstatus und verknuepfte Login-Wege.
      - E-Mail wird als interne Kontaktdaten angezeigt, aber nicht als oeffentliche Identitaet dargestellt.
      - Provider-IDs werden nicht angezeigt; externe Login-Wege werden nur als Anbieter und Verknuepfungsstatus dargestellt.
      - Die Sicht zeigt aktive Plaene, Abos, Kaeufe, relevante Angebote, Grants, Overrides, Entzuege und daraus entstehende SystemCapabilities.
      - Die Sicht zeigt nachvollziehbar, warum eine Funktion freigeschaltet oder gesperrt ist, zum Beispiel durch Plan, Kurskauf, Einzelgrant, Override, Ablaufdatum oder Widerruf.
      - Die Sicht zeigt accountbezogene Lerninformationen wie Kompetenzprofil, Fortschritt, Empfehlungen und Feedbackkontexte.
      - Die Sicht zeigt registrierte Devices, Pairing-Status, GerNetiX-verified-vs-Community-Status, OTA-Status und Support-/Garantiegrundlage, soweit diese dem Nutzer selbst gehoeren.
      - Die Sicht zeigt KI-Credits, relevante KI-Nutzung und Limits nur in nutzerverstaendlicher Form und ohne interne Kosten- oder Abuse-Details offenzulegen.
      - Die Sicht zeigt Consents, Zwecke, Gueltigkeiten, Widerrufsstatus und relevante Audit-Hinweise fuer Zugriffe auf kundenrelevante Daten.
      - Die Sicht nennt je Datenbereich Quelle, Zweck, letzte Aktualisierung und fachlichen Verantwortungsbereich.
      - Aenderungen an Payment, Abos, Produktangeboten, Grants, Overrides, Entzuegen, Devices, Kompetenzprofil oder Consents muessen die Sicht invalidieren.
      - Beim naechsten Abruf oder expliziten Aktualisieren der Sicht wird automatisch ein aktueller AccountTransparencySnapshot erzeugt oder geladen.
      - Die Sicht darf keine Admin-/Support-Sicht auf fremde Kundendaten ersetzen.
      - Der Nutzer darf ausschliesslich die eigenen Daten sehen.

