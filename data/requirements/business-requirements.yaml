  - id: requirement.project_bound_guided_ide_views
    type: requirement
    title: Gefuehrte IDE-Ansichten muessen Projektinhalt sein
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: IDE
    summary: Gefuehrte IDE-Ansichten wie Quellcodeanalyse, erklaerende Karten, Bilder, PlantUML-Diagramme, Runtime-Preview-Hinweise und naechste Umsetzungsschritte muessen als Teil des Projekts im Project Server gespeichert werden. Das Projekt liefert Texte, Payload, Validierungsregeln und Steuerwissen wie benoetigte View-Faehigkeiten und Control-Actions; der Viewer stellt generische UI-Faehigkeiten bereit und darf keine projektspezifische Didaktik hart kodieren.
    derivedFromRequirements:
      - requirement.identity_registration_login
    supportsCustomerJourneys:
      - CJ-003
      - CJ-011
    affectsArchitectureArtifacts:
      - app.user_ide
      - architecture_artifact.project_server
    affectsDataModels:
      - data_model.project_view_manifest
    affectsApiArtifacts:
      - api_artifact.firmware_build_deploy
    acceptanceCriteria:
      - Ein Projekt kann ein `ProjectViewManifest` speichern.
      - Die IDE kann Manifest-Views wie `source_analysis`, `explanation`, `plantuml` und `implementation_plan` generisch anzeigen.
      - Ein Manifest-Step kann `required_functions` und `controls.actions` beschreiben, ohne dass fuer jeden Projektschritt eine neue View implementiert werden muss.
      - Das Manifest wird mit dem Project-Server-Projekt persistiert.
      - BuildPackages enthalten das Manifest als Projektsnapshot.
      - Bestehende Lernprojekte koennen weiterhin in der IDE geoeffnet werden.
      - Projektspezifische Tamagotchi-, RFID- oder andere Beispielinformationen duerfen nicht im Viewer hart kodiert werden.

  - id: requirement.architecture_discovery_guided_by_llm
    type: requirement
    title: Projektbeginn durch gefuehrte Architektur-Erkennung unterstuetzen
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Learning
    summary: Zu Beginn eines Projekts muss ein KI-gestuetzter Dialog den Nutzer durch fachliche Architekturfragen fuehren, damit zuerst die Zielarchitektur erkannt wird, bevor konkrete Technologien ausgewaehlt werden. Ziel ist Kundenbindung: Der Nutzer soll sich verstanden fuehlen, schneller zu passenden Anschlussprojekten finden und GerNetiX als langfristigen Begleiter fuer immer anspruchsvollere Projekte erleben. Der Dialog klaert unter anderem, ob IoT-Geraete, Backends, mobile Apps, PC-Apps oder Browser-Apps benoetigt werden, welche Daten fliessen, welche Nutzer interagieren und welche Betriebsumgebung erwartet wird.
    derivedFromBusinessCapabilities:
      - BC-025
      - BG-002
      - BG-003
      - BG-005
      - BG-007
    supportsCustomerJourneys:
      - CJ-003
      - CJ-004
      - CJ-005
      - CJ-011
    affectsArchitectureArtifacts:
      - architecture_artifact.project_architecture_discovery_assistant
      - app.user_ide
      - architecture_artifact.project_server
    affectsDataModels:
      - data_model.project_target_architecture
      - data_model.project_technology_decision
      - data_model.project_architecture_dialog
    acceptanceCriteria:
      - Der Nutzer wird zuerst zu Zielsystemen, Benutzern, Geraeten, Daten, Kommunikation, Bedienoberflaechen, Offline-/Online-Verhalten und Betriebsumgebung befragt.
      - Der Dialog erzeugt eine nachvollziehbare Zielarchitektur mit Bausteinen wie IoT Device, Backend, Mobile App, Desktop App, Browser App, lokales Netzwerk, Cloud oder HomeServer.
      - Technologiefragen wie MQTT, ESP32, WLAN, Bluetooth, REST, WebSocket, Datenbank, Framework oder Hosting werden erst nach der Zielarchitektur gestellt.
      - Jede Technologieempfehlung muss auf eine erkannte Architekturentscheidung oder ein fachliches Projektziel zurueckfuehrbar sein.
      - Unklare Antworten werden als offene Architekturfragen gespeichert, statt vorschnell Technologien festzulegen.
      - Die erkannte Zielarchitektur kann als Projektkontext wieder aufgenommen und spaeter ueberarbeitet werden.
      - Der Dialog erklaert Alternativen in nutzerverstaendlicher Sprache, ohne den Nutzer mit Implementierungsdetails zu ueberfordern.
      - Aus der erkannten Architektur koennen passende Anschlussprojekte, Vertiefungen, Hardware-Angebote oder naechste Lernpfade empfohlen werden.
      - Der Assistant darf keine endgueltige Architekturentscheidung ohne ausdrueckliche Nutzerbestaetigung als beschlossen markieren.
    implementationNotes:
      - Erster PoC in der Kunden-IDE unter `/app/development-platform/`.
      - Der Identity Server stellt `/api/platform/development-assistant/chat` als Proxy fuer das im Admin Tool konfigurierte LLM-Routing bereit.
      - Konfiguration erfolgt ueber das Admin Tool unter `http://127.0.0.1:4600/admin/` und wird in `.runtime/identity-llm-config.json` gespeichert.
      - Wechsel zwischen lokalem Ollama und OpenAI-kompatibler API sollen ohne Identity-Server-Neustart greifen.
      - Im PoC sind nur aktueller Chat und fester Architektur-Prompt als Datenquellen freigegeben.

  - id: requirement.learning_firmware_base_scaffold_preserves_ota
    type: requirement
    title: Lern-Builds erhalten OTA-Faehigkeit durch Basissoftware
    businessStatus: In Analysis
    implementationStatus: In Implementation
    ownerDomain: Learning
    summary: Wenn Nutzer ESP32-Software ueber das Lerntool oder die IDE bauen und per USB oder OTA flashen, muss der Nutzer-Code mit der GerNetiX-Basissoftware gebaut werden, die OTA, Connectivity-Status, Versionierung und Recovery-Anknuepfung erhaelt. Ein Lernprojekt darf OTA-Faehigkeit nicht versehentlich durch einen vollstaendig nackten Sketch oder eine isolierte Firmware ersetzen.
    derivedFromBusinessCapabilities:
      - BC-025
      - BC-042
      - BG-007
    derivedFromRequirements:
      - requirement.board_execution_adapter_for_learning_steps
      - requirement.ide_ota_device_selection_from_profile
    supportsCustomerJourneys:
      - CJ-003
      - CJ-006
      - CJ-011
    affectsArchitectureArtifacts:
      - app.user_ide
      - component.ota
      - architecture_artifact.device_management_server
    affectsDataModels:
      - data_model.device_ota_endpoint
      - data_model.learning_step_execution_result
    requiredSystemCapabilities:
      - system_capability.ide_flash_usb
      - system_capability.ide_flash_ota
    acceptanceCriteria:
      - Jeder vom Lerntool erzeugte ESP32-Build enthaelt standardmaessig die GerNetiX-Basissoftware.
      - Auch ein USB-Flash aus einem Lernprojekt erhaelt OTA-Faehigkeit, sofern das Zielboard die TechnicalCapabilities WiFi und OTA besitzt.
      - Nutzer-Code wird als Projektlogik oder Modul in einer eigenen Datei eingebunden, zum Beispiel `user_app.cpp`, und darf zentrale Plattformfunktionen wie OTA-Handler, Connectivity-Status und Versionsmeldung nicht ueberschreiben.
      - Die Runtime ruft definierte User-Hooks wie `setupUserApp()` und `loopUserApp()` auf, bleibt aber Einstiegspunkt und Besitzerin der Plattformfunktionen.
      - User-veraenderliche Dateien liegen in einem eigenen Ordner.
      - Jede Hardware-Konfiguration liegt in einer separaten Konfigurationsdatei, zum Beispiel WiFi und PWM getrennt.
      - Die Basissoftware enthaelt konfigurierbare Service-Endpunkte fuer Device Management und Build-&-Deploy, aber keine fest verdrahtete lokale IP, Homeserver-Adresse oder Cloud-Adresse.
      - Die Basissoftware kann beim konfigurierten Device Management pruefen, ob das Device bekannt, gepairt und fuer OTA nutzbar ist.
      - Die Basissoftware kann einen autorisierten Deploy-Auftrag vom Build-&-Deploy-Server empfangen, Firmware per HTTPS laden, Hash und Groesse pruefen, flashen und Status zurueckmelden.
      - Ein Umzug des Backends von Linux-Homeserver zu Cloud darf keinen USB-Reflash erzwingen, solange die Service-Endpunkte ueber DNS, Konfiguration oder kontrolliertes Konfigurationsupdate erreichbar bleiben.
      - Das Lerntool warnt oder blockiert, wenn ein Projekt die OTA-Basis bewusst entfernt.
      - Im Setup-AP bietet die Basissoftware ein Captive Portal, damit Nutzer nach dem Verbinden mit dem Device-WLAN automatisch zur lokalen Setup-Seite gelangen und keine IP-Adresse raten muessen.
    implementationNotes:
      - `basissoftware/esp32` enthaelt aktuell Runtime-Start, User-Hooks, Setup-AP, Captive-DNS, lokales Webinterface und lokalen Feedback-Ringpuffer.
      - OTA selbst, autorisierte Deploy-Auftraege, Firmware-Download, Hash-/Groessenpruefung und Statusrueckmeldung sind noch offen.
      - Die offenen Punkte sind ueber `decision.esp32_ota_bootstrap_firmware.flash_layout`, `decision.esp32_ota_bootstrap_firmware.ota_authentication` und `decision.esp32_ota_bootstrap_firmware.service_endpoints` dokumentiert.

  - id: requirement.firmware_build_deploy_server
    type: requirement
    title: Firmware Build & Deploy ueber getrennten Ausfuehrungsserver bereitstellen
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: IDE
    summary: Die Plattform muss Firmware-Builds und Deployments so ausfuehren, dass der Projektserver Quelle der Wahrheit fuer Benutzer, Projekte, Geraete, Quellcode und Build-Historie bleibt, waehrend ein Build-&-Deploy-Server nur temporaere Build- und Deploy-Jobs aus vollstaendigen Build-Packages ausfuehrt.
    derivedFromBusinessCapabilities:
      - BC-020
      - BC-021
      - BC-025
      - BC-042
      - BG-002
      - BG-003
      - BG-007
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.ide_ota_device_selection_from_profile
      - requirement.board_execution_adapter_for_learning_steps
    supportsCustomerJourneys:
      - CJ-003
      - CJ-006
      - CJ-011
    affectsArchitectureArtifacts:
      - app.user_ide
      - architecture_artifact.project_server
      - architecture_artifact.build_deploy_server
      - architecture_artifact.device_management_server
      - component.ota
    affectsDataModels:
      - data_model.learning_step_execution_result
      - data_model.device_ota_endpoint
      - data_model.account_device
      - data_model.firmware_build_job
      - data_model.firmware_build_package
      - data_model.firmware_build_result
    affectsApiArtifacts:
      - api_artifact.learning_step_completion
      - api_artifact.ide_ota_device_selection
      - api_artifact.account_device_inventory
      - api_artifact.firmware_build_deploy
    requiredSystemCapabilities:
      - system_capability.ide_flash_usb
      - system_capability.ide_flash_ota
      - system_capability.cloud_flash
    constrainedBy:
      - nfr.firmware_flash_must_not_brick_board
    acceptanceCriteria:
      - Der Projektserver erstellt fuer jeden BuildJob einen vollstaendigen Snapshot des Projekts als BuildPackage.
      - Das BuildPackage enthaelt mindestens Build-Job-Metadaten, PlatformIO-Konfiguration, Quellcode, Header, Libraries, Assets und optional vorberechnete Dateien.
      - Der Projektserver uebertraegt das BuildPackage per HTTP an den Build-&-Deploy-Server.
      - Der Build-&-Deploy-Server darf niemals direkt auf dauerhafte Projektdaten zugreifen.
      - Der Build-&-Deploy-Server kompiliert ausschliesslich aus dem uebergebenen BuildPackage und benoetigt keine dauerhaften Projektdaten.
      - Der Build-&-Deploy-Server speichert Firmware und Build-Artefakte nur temporaer.
      - Nach Abschluss werden BuildResult, Firmware-Artefakte, Build-Log, Deploy-Log und Status an den Projektserver zurueckgegeben.
      - Das BuildResult enthaelt mindestens ein primaeres Firmware-Artefakt (`firmware.bin` oder `firmware.hex`), `firmware.elf`, `build.log`, Build-Status, SHA-256 und Dateigroesse. `firmware.map` wird uebernommen, wenn die Zielplattform es erzeugt.
      - Temporaere Projektdaten werden nach Abschluss des Jobs vom Build-&-Deploy-Server geloescht.
      - Der Build-&-Deploy-Server darf technische Caches fuer PlatformIO, Toolchains, Libraries, Objektdateien und vergleichbare Build-Artefakte behalten.
      - Der Cache dient ausschliesslich der Beschleunigung und ist niemals Quelle der Wahrheit.
      - Wenn der Cache verloren geht, bleibt der Build aus dem Build-Paket moeglich und dauert nur laenger.
      - Beim Erstellen oder Oeffnen eines Lernprojekts darf automatisch ein Prebuild der Projekthuelle gestartet werden, um Caches aufzuwarmen.
      - Ein Prebuild loest niemals ein OTA-Deployment aus.
      - Fuer lokale MVP- und Lernpfade darf der Nutzer einen USB-Flash-Job starten; der Build-&-Deploy-Server fuehrt dann nach erfolgreichem Build einen PlatformIO-Upload auf den ausgewaehlten Port aus.
      - OTA wird nur durch einen vom Nutzer ausgeloesten Build-&-Flash-Auftrag gestartet.
      - Nach erfolgreichem Build uebernimmt der Build-&-Deploy-Server den Deploy.
      - Der Build-&-Deploy-Server veroeffentlicht Deploy-Auftraege per MQTT, stellt Firmware per HTTPS bereit, empfaengt Statusmeldungen per MQTT und meldet den Abschluss an den Projektserver.
      - Deploy-Auftraege werden nur fuer konkrete, bekannte und berechtigte `device_id`s erzeugt.
      - Der Firmware-Download startet erst nach einem autorisierten Deploy-Auftrag.
      - Die Firmware-Basissoftware verwendet die konfigurierten Device-Management- und Build-&-Deploy-Endpunkte und darf nicht an eine lokale IP, einen bestimmten Homeserver oder einen bestimmten Cloud-Anbieter gekoppelt sein.
      - MQTT dient ausschliesslich fuer Deploy-Auftraege, Statusmeldungen, Heartbeats und Telemetrie.
      - HTTPS dient fuer Firmware-Download und Artefaktuebertragung.
      - Pro Device ist maximal ein aktiver Build-/Deploy-Job erlaubt.
      - Optional kann genau ein weiterer Build-/Deploy-Job pro Device warten.
      - Neue wartende Jobs ersetzen aeltere wartende Jobs fuer dasselbe Device.

  - id: requirement.firmware_local_feedback_weblog
    type: requirement
    title: Basissoftware stellt lokale Feedback- und Weblog-Funktion bereit
    businessStatus: In Analysis
    implementationStatus: Implemented
    ownerDomain: Learning
    summary: Die GerNetiX-Basissoftware muss fuer Lernprojekte eine lokale Feedback-Funktion bereitstellen, damit Nutzer ohne Backend und ohne Account sehen koennen, was auf dem Board passiert. Neben UART/Serial soll ein lokaler Weblog oder eine Logansicht im Device-Webinterface bereitstehen; spaetere Server-Telemetrie bleibt davon getrennt und darf nur gezielt, gepairt und mit passender Berechtigung oder Consent erfolgen.
    derivedFromBusinessCapabilities:
      - BC-025
      - BC-042
      - BG-007
    derivedFromRequirements:
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.board_execution_adapter_for_learning_steps
    supportsCustomerJourneys:
      - CJ-003
      - CJ-006
    affectsArchitectureArtifacts:
      - app.user_ide
      - component.ota
      - component.device_connectivity_setup
      - component.firmware_feedback
    affectsDataModels:
      - data_model.learning_step_execution_result
      - data_model.device_ota_endpoint
    requiredSystemCapabilities:
      - system_capability.ide_flash_usb
      - system_capability.ide_flash_ota
    acceptanceCriteria:
      - Die Basissoftware bietet eine einheitliche Logging-/Feedback-API fuer Runtime und User-Code, zum Beispiel fuer Info-, Warn- und Fehlerereignisse.
      - Feedback wird mindestens ueber UART/Serial ausgegeben.
      - Feedback ist im lokalen Device-Webinterface abrufbar, zum Beispiel als `/logs` oder Weblog-Ansicht mit Ringpuffer.
      - Die lokale Feedback-Funktion funktioniert im Access-Point-Modus ohne Backend und ohne Account.
      - Automatisches Pushen von Detail-Logs an den Server ist fuer den Lernmodus nicht erforderlich und darf spaeter nur mit Pairing, Zweckbindung und Consent/Berechtigung erfolgen.
    implementationNotes:
      - `basissoftware/esp32/include/basissoftware/feedback.h` stellt die Feedback-API bereit.
      - `basissoftware/esp32/src/functions/feedback.cpp` schreibt Feedback auf Serial/UART und in einen RAM-Ringpuffer.
      - `basissoftware/esp32/src/functions/startDeviceWebServer.cpp` stellt `/logs` im lokalen Device-Webinterface bereit.
      - Der Nachweis erfolgte per erfolgreichem Build mit `platformio run -j 1`.

