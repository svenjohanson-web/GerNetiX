  - id: requirement.community_board_discovery_via_recovery_tool
    type: requirement
    title: Unbekannte Community-Boards ueber Recovery Tool identifizieren
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: DeviceManagement
    summary: Das Recovery Tool muss Nutzern mit unbekannten, selbst gekauften ESP32-Boards einen gefuehrten Einstieg ermoeglichen, indem es per USB eine GerNetiX Discovery Firmware flasht, Basisfaehigkeiten prueft, offene Hardwarefragen stellt und daraus ein Community Hardware Profile erzeugt. Ziel ist Neukundengewinnung durch erleichterten Einstieg, ohne fuer unbekannte Hardware einen GerNetiX-Support- oder Garantieanspruch zu erzeugen.
    derivedFromBusinessCapabilities:
      - BC-042
      - BG-002
      - BG-003
      - BG-004
    derivedFromRequirements:
      - requirement.community_hardware_supported_without_entitlement
      - requirement.learning_firmware_base_scaffold_preserves_ota
      - requirement.firmware_local_feedback_weblog
    supportsCustomerJourneys:
      - CJ-002
      - CJ-006
    affectsArchitectureArtifacts:
      - app.recovery_tool
      - app.user_ide
      - component.firmware_feedback
      - architecture_artifact.device_management_server
    affectsDataModels:
      - data_model.account_device
      - data_model.device_ota_endpoint
    affectsApiArtifacts:
      - api_artifact.account_device_inventory
    acceptanceCriteria:
      - Das Recovery Tool kann ein unbekanntes ESP32-Board per USB erkennen und eine Discovery Firmware flashen.
      - Die Discovery Firmware stellt Minimalfunktionen wie AP-Modus, lokales Webinterface, Weblog und OTA-Basis bereit.
      - Automatisch ermittelbare Eigenschaften wie Chip-ID, Flash-Groesse, Runtime-Version und Basis-Connectivity werden protokolliert.
      - Nicht automatisch erkennbare Eigenschaften werden durch gefuehrte Nutzerfragen geklaert, zum Beispiel Onboard-LED, Display, I2C-Pins, ADC-Pins oder externe Verdrahtung.
      - Wenn der Nutzer eine Eigenschaft nicht kennt, bleibt die Capability `unknown` und darf fuer pflichtige Lernprojekte nicht automatisch verwendet werden.
      - Das Ergebnis wird als Community Hardware Profile oder AccountDevice-Inventareintrag gespeichert und bleibt als `community_unverified` ohne GerNetiX-Hardware-Supportanspruch gekennzeichnet.

