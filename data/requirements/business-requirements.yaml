  - id: requirement.learning_project_step_feedback
    type: requirement
    title: Feedback pro Lernschritt und Projektabschluss erfassen
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Learning
    summary: Das Step Tool muss Nutzern ermoeglichen, Feedback zu jedem einzelnen ProjectStep sowie nach Abschluss eines LearningProject abzugeben. Beim Absenden kann der Nutzer anonym bleiben oder zweckgebunden erlauben, dass GerNetiX ihn fuer Rueckfragen zu genau diesem Feedback kontaktiert.
    derivedFromBusinessCapabilities:
      - BC-025
      - BC-043
      - BG-001
      - BG-007
    derivedFromRequirements:
      - requirement.competency_evidence_feedback
      - requirement.customer_data_consent_for_admin_access
    affectsArchitectureArtifacts:
      - app.user_ide
      - app.admin_tool
      - architecture_artifact.project_server
    affectsDataModels:
      - data_model.learning_feedback
      - data_model.feedback_contact_consent
      - data_model.customer_data_access_audit_event
    affectsApiArtifacts:
      - api_artifact.learning_feedback
      - api_artifact.admin_learning_feedback
    requiredSystemCapabilities:
      - system_capability.admin_learning
    acceptanceCriteria:
      - Nutzer koennen Feedback fuer einen einzelnen ProjectStep absenden.
      - Nutzer koennen Feedback nach Abschluss eines LearningProject absenden.
      - Jedes Feedback ist fachlich mit LearningProject und optional ProjectStep oder Projektabschluss verknuepft.
      - Beim Absenden kann der Nutzer anonymes Feedback waehlen.
      - Beim Absenden kann der Nutzer zweckgebunden erlauben, fuer Rueckfragen zu genau diesem Feedback kontaktiert zu werden.
      - Kontakt-Consent gilt maximal zwei Monate ab Abgabe und kann vorher widerrufen werden.
      - Nach Ablauf oder Widerruf wird das Feedback anonymisiert; fachlicher Inhalt, Projekt- und Step-Kontext duerfen erhalten bleiben.
      - Personenbezogene Absender- und Kontaktdaten duerfen nach Anonymisierung im Admin Tool nicht mehr sichtbar sein.
      - Das Admin Tool kann Feedback nach Absender, Projekt, Step, Status und Kontaktmodus sortieren und filtern.
      - Admin-/Support-Einsicht in identifizierbares Feedback und Kontaktdaten muss zweckgebunden berechtigt und auditiert sein.

