schemaVersion: 1
kind: non_functional_requirement_catalog
sourceStatus: legacy_import_source
items:
  - id: nfr.firmware_flash_must_not_brick_board
    type: non_functional_requirement
    category: robustness
    title: Firmware-Flash darf Boards nicht unbrauchbar machen
    status: draft
    ownerDomain: DeviceManagement
    summary: Firmware-Flashen darf unabhaengig vom Transportweg USB, OTA oder Cloud/OTA nicht dazu fuehren, dass ein ProcessorBoard dauerhaft defekt oder fuer den Nutzer nicht wiederherstellbar wird.
    rationale:
      - Flash-Vorgaenge sind ein kritischer Teil der Nutzererfahrung.
      - Ein fehlgeschlagener Flash darf nicht zu einem dauerhaft unbrauchbaren Board fuehren.
      - Robustheit reduziert Supportaufwand und erhoeht Kundenakzeptanz.
      - Nutzer muessen Boards ohne Spezialwissen wieder in einen nutzbaren Zustand bringen koennen.
    appliesTo:
      - app.user_ide
      - app.provisioning_tool
      - app.recovery_tool
      - component.ota
      - system_capability.ide_flash_usb
      - system_capability.ide_flash_ota
      - system_capability.cloud_flash
      - architecture.registered_processor_board
    supports:
      - BG-003
      - BG-006
      - BG-007
      - CJ-006
      - CJ-010
      - CJ-011
    constraints:
      - Flash-Vorgaenge muessen fehlertolerant gestaltet werden.
      - Ein fehlgeschlagener Flash muss erkennbar und nachvollziehbar sein.
      - Wenn ein Flash fehlschlaegt, muss ein definierter Recovery-Pfad existieren.
      - OTA- oder Cloud-Flash darf nur gestartet werden, wenn Board, Firmware, Credential, Pairing, Stromversorgung und Berechtigung ausreichend geprueft wurden.
      - USB-Flash muss den Nutzer vor riskanten Zustaenden warnen und einen Wiederherstellungspfad bieten.
      - Vorbespielte Firmware muss so ausgelegt sein, dass spaetere Updates robust und wiederherstellbar bleiben.
      - Lern-Builds fuer OTA-faehige Boards muessen die GerNetiX-Basissoftware erhalten, damit USB-Flash die spaetere OTA-Updatefaehigkeit nicht versehentlich entfernt.
    acceptanceCriteria:
      - Ein abgebrochener oder fehlgeschlagener Flash erzeugt einen klaren Fehlerstatus.
      - Das Board bleibt entweder im vorherigen nutzbaren Zustand oder kann ueber Recovery wiederhergestellt werden.
      - Der Nutzer erhaelt eine nachvollziehbare Handlungsanweisung.
      - Support kann anhand von RegisteredProcessorBoard, FirmwareState, OTAState und BoardCredential nachvollziehen, was passiert ist.
      - Verlorene, widerrufene oder nicht berechtigte Boards erhalten keine Flash-Auftraege.
      - Ein ueber das Lerntool per USB geflashtes OTA-faehiges Board bleibt danach weiterhin OTA-erreichbar oder meldet einen klaren Grund, warum OTA fuer dieses Board nicht verfuegbar ist.
    affectedStates:
      - FirmwareState
      - OTAState
      - RegisteredProcessorBoard
      - BoardCredential
    verification:
      - Flash-Abbruch simulieren
      - falsche oder inkompatible Firmware ablehnen
      - OTA-Verbindungsabbruch behandeln
      - USB-Flash eines Lernprojekts mit anschliessendem OTA-Update pruefen
      - Wiederherstellung ueber Recovery Tool pruefen
      - Supportnachweis aus Device-Management-Zustand pruefen

  - id: nfr.ai_cost_protection_auditability
    type: non_functional_requirement
    category: auditability
    title: KI-Kostenkontrolle muss auditierbar sein
    status: draft
    businessStatus: In Analysis
    implementationStatus: Not Started
    ownerDomain: Business
    summary: KI-Kostenkontrolle, Credit-Pruefungen, abgelehnte Aufrufe und administrative Eingriffe muessen nachvollziehbar, manipulationsresistent und serverseitig pruefbar sein.
    appliesTo:
      - architecture_artifact.ai_cost_protection
      - architecture_artifact.ai_usage_observability
      - data_model.ai_usage_event
      - data_model.ai_admin_action_audit_event
      - api_artifact.ai_usage_preflight
      - api_artifact.ai_admin_cost_controls
      - app.admin_tool
    supports:
      - BG-008
      - business_strategy.optimize_costs
      - BR-006
    constraints:
      - Credit-Pruefungen duerfen nicht ausschliesslich im Client stattfinden.
      - Usage Events muessen auch bei Fehlern und Ablehnungen entstehen.
      - Administrative Aenderungen an Credits, Limits, Modellfreigaben und Kill-Switch muessen auditierbar sein.
      - Kostenschaetzungen muessen nachvollziehbar auf Modell, Tokenverbrauch und Preisregel beruhen.
    verification:
      - Ungedeckten KI-Aufruf serverseitig ablehnen
      - Usage Event fuer erfolgreiche, fehlgeschlagene und abgelehnte Aufrufe pruefen
      - Admin-Aktion im Audit Trail nachvollziehen
      - Manipulierte Client-Angaben ignorieren oder ablehnen

  - id: nfr.service_deployment_portability
    type: non_functional_requirement
    category: portability
    title: Services muessen vom Linux-Homeserver in Cloud-Umgebungen migrierbar sein
    status: draft
    businessStatus: In Analysis
    implementationStatus: In Design
    ownerDomain: CrossDomain
    summary: Plattformservices muessen so geschnitten und betrieben werden, dass sie zunaechst auf einem bezahlbaren Linux-Homeserver oder kleinen Server laufen koennen und spaeter ohne fachlichen Schnittstellenbruch in Cloud-Umgebungen wie AWS migrierbar sind.
    rationale:
      - Der MVP soll kostenguenstig auf eigener Infrastruktur betreibbar sein.
      - Services sollen spaeter bei wachsender Nutzung einzeln skaliert oder in Cloud-Dienste verschoben werden koennen.
      - Fachliche Domaenen duerfen nicht durch lokale Dateipfade, Prozessannahmen oder implizite In-Process-Kopplung an einen konkreten Betriebsort gebunden werden.
    appliesTo:
      - architecture_artifact.identity_server
      - architecture_artifact.project_server
      - architecture_artifact.build_deploy_server
      - architecture_artifact.device_management_server
    supports:
      - BG-002
      - BG-003
      - BG-007
      - BG-008
      - BC-031
      - BC-041
    constraints:
      - Jeder Service muss als eigenstaendiger Prozess startbar sein.
      - Services duerfen andere Services nur ueber explizite APIs, Events oder klar definierte Adapter ansprechen.
      - Fachlicher Zustand muss in expliziten Repositories oder Datenbanken liegen, nicht in Prozessspeicher, lokalen Temp-Dateien oder Build-Caches.
      - Konfiguration muss ueber Umgebungsvariablen oder Konfigurationsdateien erfolgen, nicht ueber hart codierte lokale Pfade.
      - Ports, Hostnames, Datenbank-URLs, MQTT-Broker, OAuth-Provider und externe Basis-URLs muessen konfigurierbar sein.
      - Temporäre Dateien und Caches duerfen nur Performanceoptimierung sein und muessen verlustfrei neu aufgebaut werden koennen.
      - Service-Start, Healthcheck und Tests muessen ohne Desktop-IDE moeglich sein.
      - Ein spaeteres Container- oder Cloud-Deployment darf keine fachlichen API-Vertraege aendern.
    acceptanceCriteria:
      - Identity, Projektserver, Device Management und Build-&-Deploy koennen als getrennte Prozesse beschrieben und gestartet werden.
      - Ein lokales Linux-Homeserver-Deployment kann alle benoetigten Services mit konfigurierbaren Ports betreiben.
      - Ein Cloud-Deployment kann dieselben Service-APIs verwenden.
      - Build-Caches, Upload-Verzeichnisse und temporäre Artefakte koennen geloescht werden, ohne fachliche Daten zu verlieren.
      - Keine fachliche Domaene greift direkt auf interne Datenstrukturen eines anderen Services zu.
    verification:
      - Service lokal mit PORT-Umgebungsvariable starten
      - Healthcheck pro Service pruefen
      - Konfiguration ohne Codeaenderung zwischen lokalem Host und Cloud-Host wechseln
      - Cache-Verlust simulieren und Wiederherstellung pruefen
