schemaVersion: 1
kind: technical_capability_catalog
sourceStatus: legacy_import_source
note: TechnicalCapabilities beschreiben Hardware-Faehigkeiten. Sie sind nicht identisch mit SystemCapabilities.
items:
  - id: capability.processor_esp32
    type: technical_capability
    title: ESP32 ProcessorBoard
    status: draft
    ownerDomain: Hardware
    summary: ESP32-kompatibles Board fuer Projektvarianten.

  - id: capability.display_output
    type: technical_capability
    title: Display-Ausgabe
    status: draft
    ownerDomain: Hardware
    summary: Faehigkeit zur Darstellung von Text, Status oder Grafik auf einem Display.

  - id: capability.digital_input
    type: technical_capability
    title: Digitaler Eingang
    status: draft
    ownerDomain: Hardware
    summary: Eingabe ueber Button, Schalter oder aehnliche digitale Signale.

  - id: capability.digital_output
    type: technical_capability
    title: Digitaler Ausgang
    status: draft
    ownerDomain: Hardware
    summary: Schaltbarer Ausgang fuer Aktoren oder Signale.

  - id: capability.actuator_driver
    type: technical_capability
    title: Aktor-Treiber
    status: draft
    ownerDomain: Hardware
    summary: Treiberstufe fuer Pumpe, Ventil, Relais, MOSFET oder aehnliche Aktoren.

  - id: capability.soil_moisture_measurement
    type: technical_capability
    title: Bodenfeuchtigkeit messen
    status: draft
    ownerDomain: Hardware
    summary: Bodenfeuchtigkeit erfassen fuer sensorgestuetzte Regelung.

  - id: capability.wifi
    type: technical_capability
    title: WiFi
    status: draft
    ownerDomain: Hardware
    summary: Netzwerkfaehigkeit fuer Webserver, OTA, Cloud oder KI-Integration.

  - id: capability.ota
    type: technical_capability
    title: OTA
    status: draft
    ownerDomain: Hardware
