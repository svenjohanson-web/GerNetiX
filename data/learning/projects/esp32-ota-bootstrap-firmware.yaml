  - id: stage.esp32_ota_bootstrap_firmware.3
    title: OTA-Erfolg pruefen
    goal: Zweite Firmware-Version per OTA einspielen und sichtbares Feedback pruefen.
    learningFocus:
      - competency.ota_updates
    completionConditions:
      - condition.ota_flash_success
      - condition.learner_feedback_received

