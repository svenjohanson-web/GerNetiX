schemaVersion: 1
id: project.esp32_ota_bootstrap_firmware
slug: esp32-ota-bootstrap-firmware
type: learning_project
status: draft
projectStatus: idea
title: ESP32 OTA-Basissoftware
ownerDomain: Learning
summary: Erstes Embedded-Erfolgsprojekt mit der ESP32-Basissoftware: Ein ESP32 wird einmal per USB geflasht und danach OTA-faehig gemacht.

learningPath: learning_path.embedded_basics
developsCompetencies:
  - competency.esp32_project_setup
  - competency.flashing
  - competency.wifi_basics
  - competency.ota_updates

variants:
  - id: project.esp32_ota_bootstrap_firmware.variant.local_usb_then_ota
    title: USB-Erstflash mit anschliessendem OTA-Update
    mode: local_then_ota
    summary: Einstieg ohne Account. Der ESP32 wird lokal per USB vorbereitet und danach per OTA aktualisiert.
    technicalConstraints:
      - capability.processor_esp32
      - capability.wifi
      - capability.ota
      - capability.flash_firmware
      - capability.network_configuration
    systemCapabilities:
      - system_capability.ide_flash_usb
      - system_capability.ide_flash_ota
    advantages:
      - Schnelles sichtbares Erfolgserlebnis.
      - Spaetere Lernsoftware kann ohne USB-Kabel aktualisiert werden.
      - Gute technische Grundlage fuer Kunden-IDE und Provisionierung.
      - Nutzt `basissoftware/esp32` als normale Quellcode- und Build-Projektstruktur.
    disadvantages:
      - WLAN-Konfiguration ist teilweise geloest: Setup-AP, lokales Device-Webinterface, Status und Logs sind vorhanden; WLAN-Scan, NVS-Speicherung und Node-Modus sind noch offen.
      - OTA-Abbruch und falsche Firmware muessen sicher behandelt werden.
      - Authentifizierung ist fuer spaetere Produktivnutzung notwendig.
    currentImplementation:
      - `basissoftware/esp32` startet den offenen Setup-AP `GerNetiX-Setup`.
      - Das lokale Device-Webinterface ist im AP-Modus unter `http://192.168.4.1/` erreichbar.
      - `/status` liefert Runtime-, WLAN- und Uptime-Status.
      - `/logs` liefert lokale Feedback-Ereignisse aus einem RAM-Ringpuffer.
      - Der Build wurde mit `platformio run -j 1` erfolgreich verifiziert.
    openImplementationGaps:
      - Ziel-WLANs scannen und im Device-Webinterface anzeigen.
      - SSID und Passwort lokal in NVS/Flash speichern.
      - AP-/STA-/Node-Modus-Policy festlegen und implementieren.
      - OTA-Partitionierung, Authentifizierung, Firmware-Pruefung und Recovery-Pfad festlegen.
      - Service-Endpunkte fuer Device Management und Build-&-Deploy konfigurierbar machen.

stages:
  - id: stage.esp32_ota_bootstrap_firmware.1
    title: USB-Erstflash
    goal: Board erkennen, minimale Firmware bauen und per USB flashen.
    learningFocus:
