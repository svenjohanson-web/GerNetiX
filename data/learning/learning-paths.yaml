  - id: learning_path.cross_platform_development
    type: learning_path
    title: Cross-Platform Development
    status: draft
    ownerDomain: Learning
    summary: Learning Path zum stabilen Lernziel Cross-Platform Development anhand einer austauschbaren Beispieldomaene.
    primaryLearningGoal: learning_goal.cross_platform_development
    exampleDomain:
      id: example_domain.digital_tamagotchi
      title: Digitales Tamagotchi
      role: Durchgaengige fachliche Beispieldomaene, nicht Zweck des Learning Goals.
      replaceable: true
      replacementRule: Das Beispielprojekt darf durch eine andere fachliche Domaene ersetzt werden, ohne Learning Goal, Lernpfadstruktur oder Plattformvergleich zu veraendern.
      stableDomainConcepts:
        - Haustierzustand
        - Hunger
        - Energie
        - Stimmung
        - Alter
        - Ereignisse
        - Benutzerinteraktion
        - Persistenter Zustand
    prerequisites:
      - learning_goal.architecture_first_project_planning
      - learning_goal.embedded_basics
      - learning_goal.iot_basics
    optionalPrerequisites:
      - learning_goal.embedded_advanced
    cardinalityRules:
      - LearningGoal 1 -> 0..* LearningPaths
      - LearningPath 1 -> 1..* LearningPathSteps
      - LearningPathStep 1 -> 1 LearningProject
      - LearningPath 1 -> 0..1 ExampleDomain
      - ExampleDomain 1 -> 1..* LearningProjects innerhalb dieses Pfads
      - ExampleDomain ist austauschbar; LearningGoal und LearningPath bleiben stabil.
    pathPrinciples:
      - Das Beispielprojekt bleibt fachlich moeglichst gleich, damit technische Unterschiede sichtbar werden.
      - Fachlogik wird von Benutzeroberflaechen, Hardwarezugriffen und Plattformadaptern getrennt.
      - Jede Plattformvariante erzeugt zunaechst eine eigenstaendige Anwendung.
      - Erst im Synchronisationsprojekt entsteht ein gemeinsamer plattformuebergreifender Zustand.
      - KI ist eine optionale Erweiterung und darf den Kernpfad nicht blockieren.
    learningOutcomes:
      - Zielsysteme und Laufzeitumgebungen begruendet unterscheiden.
      - Frameworks nach Zielsystem, Team, Wartbarkeit und Nutzererlebnis bewerten.
      - Gemeinsame Fachlogik identifizieren und von UI- und Infrastrukturcode abgrenzen.
      - Plattformadapter fuer Hardware, Dateisystem, Benachrichtigungen, Browser und APIs einordnen.
      - Datenmodelle fuer mehrere Clients und Synchronisation entwerfen.
      - Offline-/Online-Verhalten und Konflikte fachlich beschreiben.
      - KI-Funktionen mit Kosten-, Kontext- und Tokenmanagement als Erweiterung bewerten.
    projects:
      - project.gernetix_runtime_basissoftware
      - project.cross_platform_tamagotchi.embedded
      - project.cross_platform_tamagotchi.desktop
      - project.cross_platform_tamagotchi.mobile
      - project.cross_platform_tamagotchi.web
      - project.cross_platform_tamagotchi.cloud
      - project.cross_platform_tamagotchi.synchronization
      - project.cross_platform_tamagotchi.ai_extension
    steps:
      - id: learning_path_step.cross_platform.01_embedded
        orderIndex: 1
        title: Embedded
        mandatory: true
        learningFocus:
          - ESP32
          - Display
          - Buttons
          - Zustandsmaschine
          - Timer
          - Persistenz
          - Hardwarezugriffe
        outcome: Teilnehmer verstehen die fachliche Tamagotchi-Logik in einer ressourcenbegrenzten Embedded-Umgebung.

      - id: learning_path_step.cross_platform.02_desktop
        orderIndex: 2
        title: Desktop
        mandatory: true
        learningFocus:
          - Windows
          - macOS
          - Linux
          - Desktop-GUI
          - Fenster
          - Menues
          - Maus und Tastatur
          - Dateisystem
          - lokale Speicherung
          - Technologievergleich
        outcome: Teilnehmer koennen Desktop-Technologien wie native Entwicklung, .NET, Qt, Flutter, Electron und Python fachlich vergleichen.

      - id: learning_path_step.cross_platform.03_mobile
        orderIndex: 3
        title: Mobile
        mandatory: true
        learningFocus:
          - Android
          - iOS
          - Touch
          - Navigation
          - App-Lifecycle
          - lokale Daten
          - Benachrichtigungen
        outcome: Teilnehmer verstehen mobile Plattformanforderungen und deren Einfluss auf App-Struktur und Benutzererlebnis.

      - id: learning_path_step.cross_platform.04_web
        orderIndex: 4
        title: Web
        mandatory: true
        learningFocus:
          - Browser
          - HTML
          - CSS
          - JavaScript
          - Responsive Design
          - Browser-APIs
          - Web-Frameworks
        outcome: Teilnehmer koennen Browser-Anwendungen als eigenstaendige Zielplattform einordnen.

      - id: learning_path_step.cross_platform.05_cloud
        orderIndex: 5
        title: Cloud
        mandatory: true
        learningFocus:
          - REST-API
          - Datenbank
          - Benutzerverwaltung
          - Authentifizierung
          - Deployment
        outcome: Teilnehmer verstehen Backend- und Cloud-Bausteine als gemeinsame Basis fuer mehrere Clients.

      - id: learning_path_step.cross_platform.06_synchronization
        orderIndex: 6
        title: Synchronisation
        mandatory: true
        unlockCondition: Die Embedded-, Desktop-, Mobile-, Web- und Cloud-Anwendungen existieren als getrennte Varianten.
        learningFocus:
          - gemeinsames Datenmodell
          - Synchronisation
          - APIs
          - Offline-/Online-Verhalten
          - Konfliktbehandlung
          - Echtzeitkommunikation
        outcome: Teilnehmer verbinden mehrere Anwendungen zu einem gemeinsamen Tamagotchi-Zustand ueber alle Zielsysteme hinweg.

      - id: learning_path_step.cross_platform.07_ai_extension
        orderIndex: 7
        title: KI-Erweiterung
        mandatory: false
        learningFocus:
          - KI-Integration
          - Prompt Engineering
          - Tool Calling
          - Kontextverwaltung
          - Kosten- und Tokenmanagement
        outcome: Teilnehmer bewerten KI-Funktionen als optionale plattformuebergreifende Erweiterung.

  - id: learning_path.architecture_first_project_planning
    type: learning_path
    title: Architektur zuerst, Technologie danach
    status: draft
    ownerDomain: Learning
    summary: Entwicklungspfad fuer den Projektbeginn in GerNetiX. Nutzer werden durch einen LLM-gestuetzten Dialog zuerst zur Zielarchitektur gefuehrt und entscheiden erst danach ueber Technologien wie MQTT, ESP32 mit WLAN, Backend, Mobile App, PC-App oder Browser-App. Der Pfad dient explizit der Kundenbindung, weil erkannte Projektziele als Grundlage fuer passende Anschlussprojekte, Vertiefungen und Angebote genutzt werden koennen.
    primaryLearningGoal: learning_goal.architecture_first_project_planning
    secondaryLearningGoals:
      - learning_goal.software_engineering_basics
      - learning_goal.iot_basics
      - learning_goal.cross_platform_development
    derivedFromRequirements:
      - requirement.architecture_discovery_guided_by_llm
    pathPrinciples:
      - Architekturfragen kommen vor Technologiefragen.
      - Der Nutzer muss nicht alle Fachbegriffe kennen; der Assistent uebersetzt Antworten in Architekturbausteine.
      - Jede Technologieentscheidung braucht eine nachvollziehbare Architekturbegruendung.
      - Offene Fragen bleiben sichtbar und blockieren nur Entscheidungen, die wirklich davon abhaengen.
      - Der Pfad erzeugt Projektwissen, das spaeter von IDE, Projektserver, Context Manager und Lernansichten wiederverwendet wird.
      - Der Pfad soll Nutzer nicht nach einem Einzelprojekt verlieren, sondern aus ihrem Zielbild nachvollziehbare naechste Schritte ableiten.
    architectureQuestionAreas:
      - Projektziel und Nutzerrollen
      - Physische Geraete, Sensoren, Aktoren und vorhandene Hardware
      - Bedienoberflaechen wie lokal am Geraet, Mobile App, Desktop App oder Browser App
      - Daten, Zustaende, Historie, Synchronisation und Persistenz
      - Kommunikation zwischen Geraeten, Apps und Servern
      - Offline-/Online-Verhalten, lokales Netzwerk, HomeServer, Cloud und Datenschutz
      - Update-, Recovery-, Support- und Betriebsanforderungen
    technologyDecisionAreas:
      - Mikrocontroller oder ProcessorBoard, zum Beispiel ESP32
      - Connectivity wie WLAN, Bluetooth, USB, MQTT, REST, WebSocket oder lokale HTTP-Schnittstelle
      - Backend-Zuschnitt wie kein Backend, lokaler HomeServer, Cloud-Backend oder hybrides Modell
      - App-Zuschnitt wie Mobile App, Desktop App, Browser App oder IDE-integrierte HMI
      - Persistenz wie Device-Speicher, lokale App-Datenbank, Serverdatenbank oder Ereignisprotokoll
      - Deployment und Betrieb wie USB-Flash, OTA, lokaler Server, VPS oder Cloud
    projects:
      - project.architecture_first.discovery_capstone
    learningOutcomes:
      - Eine Projektidee in eine bestaetigte Zielarchitektur ueberfuehren.
      - Erkennen, welche Software- und Hardwarebausteine fuer ein Projekt wirklich benoetigt werden.
      - Technologieauswahl aus Architekturbedarf ableiten und dokumentieren.
      - Alternativen und offene Fragen bewusst sichtbar halten.
      - Einen Projektstart so strukturieren, dass spaetere Umsetzung, Dokumentation und Tests anschlussfaehig bleiben.
      - Passende Folgeprojekte und Vertiefungen aus der Architekturperspektive erkennen.
    steps:
      - id: learning_path_step.architecture_first.01_project_intent
        orderIndex: 1
        title: Projektziel verstehen
        mandatory: true
        outcome: Nutzer beschreiben Zweck, Nutzerrollen, physische Umgebung und erwarteten Nutzen des Projekts.

      - id: learning_path_step.architecture_first.02_target_systems
        orderIndex: 2
        title: Zielsysteme erkennen
        mandatory: true
        outcome: IoT-Geraete, Backend, Mobile App, Desktop App, Browser App, lokales Device-Interface oder reine Embedded-Loesung werden als moegliche Bausteine eingeordnet.

      - id: learning_path_step.architecture_first.03_data_and_communication
        orderIndex: 3
        title: Daten und Kommunikation klaeren
        mandatory: true
        outcome: Datenfluesse, Zustandsquellen, Steuerbefehle, Telemetrie, Synchronisation und Offline-/Online-Anforderungen sind fachlich beschrieben.

      - id: learning_path_step.architecture_first.04_target_architecture
        orderIndex: 4
        title: Zielarchitektur bestaetigen
        mandatory: true
        outcome: Der Nutzer bestaetigt eine erste Zielarchitektur oder markiert offene Architekturfragen.

      - id: learning_path_step.architecture_first.05_technology_mapping
        orderIndex: 5
        title: Technologien ableiten
        mandatory: true
        outcome: Technologien wie MQTT, ESP32/WLAN, REST, WebSocket, Datenbank, App-Framework oder Hosting werden aus der Zielarchitektur abgeleitet.

      - id: learning_path_step.architecture_first.06_project_context
        orderIndex: 6
        title: Projektkontext speichern
        mandatory: true
        outcome: Zielarchitektur, Technologieentscheidungen, Alternativen und offene Fragen werden als Projektkontext fuer IDE, Projektserver und Context Manager gespeichert.

      - id: learning_path_step.architecture_first.07_capstone_project
        orderIndex: 7
        title: Abschlussprojekt
        mandatory: true
        unlockCondition: Zielarchitektur, Technologieentscheidungen und offene Fragen wurden fuer mindestens eine Projektidee dokumentiert.
        outcome: Nutzer zeigen an einem eigenen oder vorgegebenen Projekt, dass sie Architektur herleiten, KI-Fragen kritisch bestaetigen und die GerNetiX-Entwicklungsplattform als Projektbegleiter nutzen koennen.
