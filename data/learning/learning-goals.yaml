    summary: Grundlagen, um Hausautomatisierung zu verstehen, zu strukturieren und eigene Erweiterungen fachlich einzuordnen.

  - id: learning_goal.home_automation_topologies
    type: learning_goal
    title: Hausautomatisierung Topologien
    status: draft
    ownerDomain: Learning
    summary: Unterschiedliche Topologien fuer Hausautomatisierung verstehen, z. B. embedded-only, PC-/Mobile-App, kleiner HomeServer, verteilte IoT-Systeme und intelligentere Edge-Devices.

  - id: learning_goal.home_automation_app_integration
    type: learning_goal
