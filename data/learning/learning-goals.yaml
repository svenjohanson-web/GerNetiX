    ownerDomain: Learning
    summary: Statuswerte von Embedded Devices auf PC- oder Mobile-Apps darstellen und deren Vor- und Nachteile verstehen.

  - id: learning_goal.cross_platform_development
    type: learning_goal
    title: Cross-Platform Development
    status: draft
    ownerDomain: Learning
    summary: Anwendungen fuer unterschiedliche Zielsysteme entwickeln, Zielsysteme vergleichen, geeignete Technologien auswaehlen und Fachlogik von Benutzeroberflaechen trennen.
    learningOutcomes:
      - Unterschiede von Embedded, Desktop, Mobile, Web und Cloud verstehen.
      - Geeignete Technologien und Frameworks fuer Zielsysteme auswaehlen.
      - Native und plattformuebergreifende Entwicklung fachlich vergleichen.
      - Fachlogik wiederverwendbar und getrennt von Benutzeroberflaechen strukturieren.
      - Moderne Software ueber mehrere Zielsysteme hinweg planen.
      - Synchronisation, Offline-/Online-Verhalten und Konfliktbehandlung einordnen.

  - id: learning_goal.tooling_and_workflows
    type: learning_goal
