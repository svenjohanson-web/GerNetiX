persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
connection_messages true

# Bound broker resource use even when unauthenticated scanners repeatedly
# complete the TLS handshake. OTA commands and device telemetry are small.
max_inflight_messages 20
max_queued_messages 1000
max_packet_size 131072
max_keepalive 300

per_listener_settings true

listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

listener 8883 0.0.0.0
protocol mqtt
max_connections 2048
allow_anonymous false
password_file /mosquitto/data/passwords
acl_file /mosquitto/config/device.acl
certfile /etc/letsencrypt/live/gernetix-services.com/fullchain.pem
keyfile /etc/letsencrypt/live/gernetix-services.com/privkey.pem
tls_version tlsv1.2
