<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GerNetiX – bald verfügbar</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #eaf3ff; background: radial-gradient(circle at 20% 20%, #174267 0, transparent 34%), linear-gradient(145deg, #06101b, #0b1e2d 56%, #102c3a); }
      main { width: min(680px, calc(100% - 40px)); padding: 54px; border: 1px solid rgba(137, 201, 255, .2); border-radius: 24px; background: rgba(7, 20, 32, .76); box-shadow: 0 30px 80px rgba(0, 0, 0, .38); backdrop-filter: blur(14px); }
      .mark { display: inline-flex; align-items: center; gap: 10px; color: #7dd3fc; font-weight: 750; letter-spacing: .08em; text-transform: uppercase; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #34d399; box-shadow: 0 0 18px #34d399; }
      h1 { margin: 24px 0 16px; font-size: clamp(2.5rem, 8vw, 5rem); line-height: .95; letter-spacing: -.055em; }
      p { max-width: 50ch; margin: 0; color: #b9cad9; font-size: 1.1rem; line-height: 1.7; }
      footer { margin-top: 40px; color: #6f879a; font-size: .9rem; }
      @media (max-width: 560px) { main { padding: 34px 28px; } }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"><span class="dot"></span> GerNetiX</div>
      <h1>Hier entsteht etwas Neues.</h1>
      <p>Die GerNetiX-Plattform wird gerade eingerichtet. Diese Seite bestätigt, dass Domain und Server erfolgreich miteinander verbunden sind.</p>
      <footer>gernetix.nl · Staging</footer>
    </main>
  </body>
</html>
