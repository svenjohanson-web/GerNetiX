server {
  listen 8443 ssl;
  server_name _;

  ssl_certificate /etc/letsencrypt/live/gernetix.nl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gernetix.nl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;

  client_max_body_size 10m;

  location / {
    proxy_pass http://identity-server:4300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 8443 ssl;
  server_name gernetix.nl www.gernetix.nl;
  ssl_certificate /etc/letsencrypt/live/gernetix.nl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gernetix.nl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;
  root /usr/share/nginx/html;
  location = / { try_files /welcome.nl.html =404; }
  location = /gernetix-logo.png { try_files /gernetix-logo.png =404; }
  location / { return 404; }
}

