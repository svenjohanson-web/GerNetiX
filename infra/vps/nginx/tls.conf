limit_req_zone $binary_remote_addr zone=gernetix_web_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=gernetix_auth_per_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=gernetix_build_per_ip:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=gernetix_connections_per_ip:10m;
limit_req_status 429;
limit_conn_status 429;

server {
  listen 8443 ssl;
  server_name gernetix.nl www.gernetix.nl;
  ssl_certificate /etc/letsencrypt/live/gernetix.nl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gernetix.nl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;
  limit_conn gernetix_connections_per_ip 20;
  limit_req zone=gernetix_web_per_ip burst=20 nodelay;
  root /usr/share/nginx/html;
  location ^~ /vendor/esptool-js/ { proxy_pass http://public-demo-server:4920/vendor/esptool-js/; }
  location = /demos { return 301 /demos/; }
  location ^~ /demos/api/ { proxy_pass http://public-demo-server:4920/api/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location ^~ /demos/ { proxy_pass http://public-demo-server:4920/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location = / { try_files /index.nl.html =404; }
  location = /gernetix-logo.png { try_files /gernetix-logo.png =404; }
  location / { return 404; }
}

