server {
  listen 8443 ssl;
  server_name build.gernetix.com;
  ssl_certificate /etc/letsencrypt/live/gernetix-services.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gernetix-services.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;
  client_max_body_size 10m;
  limit_conn gernetix_connections_per_ip 50;
  allow 10.77.0.0/24;
  deny all;

  location / {
    limit_req zone=gernetix_build_per_ip burst=100 nodelay;
    proxy_pass http://build-deploy-server:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 8443 ssl;
  server_name pwa.gernetix.com;
  ssl_certificate /etc/letsencrypt/live/gernetix-services.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gernetix-services.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;
  client_max_body_size 10m;
  limit_conn gernetix_connections_per_ip 20;
  allow 10.77.0.0/24;
  deny all;

  location ^~ /admin/ {
    limit_req zone=gernetix_auth_per_ip burst=5 nodelay;
    proxy_pass http://admin-access-server:4610;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ^~ /api/admin-access/ {
    limit_req zone=gernetix_auth_per_ip burst=5 nodelay;
    proxy_pass http://admin-access-server:4610;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ^~ /api/admin/ {
    proxy_pass http://admin-access-server:4610;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    limit_req zone=gernetix_web_per_ip burst=20 nodelay;
    proxy_pass http://identity-server:4300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
