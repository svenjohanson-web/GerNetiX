limit_req_zone $binary_remote_addr zone=gernetix_web_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=gernetix_auth_per_ip:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=gernetix_connections_per_ip:10m;
limit_req_status 429;
limit_conn_status 429;

server {
  listen 8080;
  server_name _;

  client_max_body_size 10m;
  limit_conn gernetix_connections_per_ip 30;

  location ~ ^/api/(login(?:/external)?|register)$ {
    limit_req zone=gernetix_auth_per_ip burst=5 nodelay;
    proxy_pass http://identity-server:4300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    limit_req zone=gernetix_web_per_ip burst=40 nodelay;
    proxy_pass http://identity-server:4300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 8080;
  server_name gernetix.nl www.gernetix.nl;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    limit_req zone=gernetix_web_per_ip burst=20 nodelay;
    return 301 https://$host$request_uri;
  }
}

