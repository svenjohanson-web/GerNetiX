name: gernetix

x-node-service: &node-service
  build:
    context: .
    dockerfile: docker/node-service.Dockerfile
  image: gernetix/node-services:${GERNETIX_IMAGE_TAG:-local}
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  networks:
    - backend
  healthcheck:
    test: ["CMD", "node", "/app/docker/healthcheck.js"]
    interval: 15s
    timeout: 4s
    retries: 5
    start_period: 10s

services:
  ai-context-postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: gernetix_ai_context
      POSTGRES_USER: gernetix_ai_context
      POSTGRES_PASSWORD: ${AI_CONTEXT_POSTGRES_PASSWORD:?AI_CONTEXT_POSTGRES_PASSWORD muss gesetzt sein}
    expose: ["5432"]
    networks:
      - backend
    volumes:
      - ai_context_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gernetix_ai_context -d gernetix_ai_context"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  project-server:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: project-server
      HOST: 0.0.0.0
      PORT: 4800
      PERSISTENCE_BACKEND: sqlite
      PROJECT_SERVER_SQLITE_PATH: /var/lib/gernetix/projects/gernetix-projects.sqlite
      PROJECT_SERVER_RUNTIME_DIR: /var/lib/gernetix/projects
    expose: ["4800"]
    volumes:
      - service_state:/var/lib/gernetix/services

  build-deploy-server:
    <<: *node-service
    networks:
      - edge
      - backend
    environment:
      GERNETIX_SERVICE: build-deploy-server
      HOST: 0.0.0.0
      PORT: 4400
      PERSISTENCE_BACKEND: sqlite
      PERSISTENCE_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
      BUILD_DEPLOY_RUNTIME_DIR: /var/lib/gernetix/build
      BUILD_RUNNER: platformio
      PLATFORMIO_COMMAND: /opt/platformio/bin/platformio
      PUBLIC_BASE_URL: https://build.gernetix.com
      MQTT_BROKER_URL: mqtt://mqtt-broker:1883
      OTA_SIGNING_PRIVATE_KEY_PATH: /run/gernetix-pki/ota-signing-key.pem
      OTA_SIGNING_KEY_ID: ${OTA_SIGNING_KEY_ID:-ota-p256-2026-01}
    expose: ["4400"]
    volumes:
      - project_state:/var/lib/gernetix/projects
      - build_state:/var/lib/gernetix/build
      - ${OTA_SIGNING_PRIVATE_KEY_PATH:-/etc/gernetix/pki/ota-signing-key.pem}:/run/gernetix-pki/ota-signing-key.pem:ro
    depends_on:
      mqtt-broker:
        condition: service_healthy

  public-demo-server:
    <<: *node-service
    networks:
      - edge
      - backend
    environment:
      GERNETIX_SERVICE: public-demo-server
      HOST: 0.0.0.0
      PORT: 4920
      PUBLIC_DEMO_SQLITE_PATH: /var/lib/gernetix/public-demos/gernetix-public-demos.sqlite
      PUBLIC_DEMO_RUNTIME_DIR: /var/lib/gernetix/public-demos
      PUBLIC_DEMO_PUBLISHER_TOKEN: ${PUBLIC_DEMO_PUBLISHER_TOKEN:?PUBLIC_DEMO_PUBLISHER_TOKEN muss gesetzt sein}
    expose: ["4920"]
    volumes:
      - public_demo_state:/var/lib/gernetix/public-demos

  device-management-server:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: device-management-server
      HOST: 0.0.0.0
      PORT: 4700
      PERSISTENCE_BACKEND: sqlite
      PERSISTENCE_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
      DEVICE_MANAGEMENT_RUNTIME_DIR: /var/lib/gernetix/services
    expose: ["4700"]
    volumes:
      - service_state:/var/lib/gernetix/services

  telemetry-server:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: telemetry-server
      HOST: 0.0.0.0
      PORT: 5600
      TELEMETRY_SQLITE_PATH: /var/lib/gernetix/telemetry/gernetix-telemetry.sqlite
      TELEMETRY_RUNTIME_DIR: /var/lib/gernetix/telemetry
      TELEMETRY_INTERNAL_TOKEN: ${TELEMETRY_INTERNAL_TOKEN:?TELEMETRY_INTERNAL_TOKEN muss gesetzt sein}
      PROJECT_SERVER_BASE_URL: http://project-server:4800
      DEVICE_MANAGEMENT_BASE_URL: http://device-management-server:4700
      IDENTITY_BASE_URL: http://identity-server:4300
      IDENTITY_ADMIN_TOKEN: ${IDENTITY_ADMIN_TOKEN:-}
      MQTT_BROKER_URL: mqtt://mqtt-broker:1883
    expose: ["5600"]
    volumes:
      - telemetry_state:/var/lib/gernetix/telemetry
    depends_on:
      project-server: { condition: service_healthy }
      device-management-server: { condition: service_healthy }
      mqtt-broker: { condition: service_healthy }

  hardware-catalog:
    <<: *node-service
    networks:
      - edge
      - backend
    environment:
      GERNETIX_SERVICE: hardware-catalog
      HOST: 0.0.0.0
      PORT: 4910
      PERSISTENCE_BACKEND: sqlite
      PERSISTENCE_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
    expose: ["4910"]
    ports:
      - "10.77.0.1:${HARDWARE_CATALOG_PORT:-4910}:4910"
    volumes:
      - service_state:/var/lib/gernetix/services

  hardware-shop:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: hardware-shop
      HOST: 0.0.0.0
      PORT: 4900
      PERSISTENCE_BACKEND: sqlite
      PERSISTENCE_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
      HARDWARE_CATALOG_BASE_URL: http://hardware-catalog:4910
    expose: ["4900"]
    volumes:
      - service_state:/var/lib/gernetix/services
    depends_on:
      hardware-catalog:
        condition: service_healthy

  ai-usage-server:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: ai-usage-server
      HOST: 0.0.0.0
      PORT: 5000
      PERSISTENCE_BACKEND: sqlite
      PERSISTENCE_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
    expose: ["5000"]
    volumes:
      - service_state:/var/lib/gernetix/services

  ai-context-server:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: ai-context-server
      HOST: 0.0.0.0
      PORT: 5500
      AI_CONTEXT_PERSISTENCE_BACKEND: postgres
      AI_CONTEXT_POSTGRES_HOST: ai-context-postgres
      AI_CONTEXT_POSTGRES_PORT: 5432
      AI_CONTEXT_POSTGRES_DATABASE: gernetix_ai_context
      AI_CONTEXT_POSTGRES_USER: gernetix_ai_context
      AI_CONTEXT_POSTGRES_PASSWORD: ${AI_CONTEXT_POSTGRES_PASSWORD:?AI_CONTEXT_POSTGRES_PASSWORD muss gesetzt sein}
      AI_CONTEXT_EMBEDDING_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AI_CONTEXT_EMBEDDING_MODEL: ${AI_CONTEXT_EMBEDDING_MODEL:-embeddinggemma}
      AI_CONTEXT_EMBEDDING_DIMENSIONS: ${AI_CONTEXT_EMBEDDING_DIMENSIONS:-768}
      AI_CONTEXT_SQLITE_PATH: /var/lib/gernetix/ai-context/gernetix-ai-context.sqlite
    expose: ["5500"]
    volumes:
      - ai_context_state:/var/lib/gernetix/ai-context
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      ai-context-postgres:
        condition: service_healthy

  admin-tool:
    <<: *node-service
    networks:
      - edge
      - backend
    environment:
      GERNETIX_SERVICE: admin-tool
      HOST: 0.0.0.0
      PORT: 4600
      PERSISTENCE_BACKEND: sqlite
      PERSISTENCE_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
      IDENTITY_BASE_URL: http://identity-server:4300
      IDENTITY_ADMIN_TOKEN: ${IDENTITY_ADMIN_TOKEN:-}
      ADMIN_TOOL_ACCESS_TOKEN: ${ADMIN_TOOL_ACCESS_TOKEN:?ADMIN_TOOL_ACCESS_TOKEN muss gesetzt sein}
      SYSTEM_EVENT_INGEST_TOKEN: ${SYSTEM_EVENT_INGEST_TOKEN:?SYSTEM_EVENT_INGEST_TOKEN muss gesetzt sein}
      SECURITY_MONITOR_TOKEN: ${SECURITY_MONITOR_TOKEN:-}
      PROJECT_SERVER_BASE_URL: http://project-server:4800
      BUILD_DEPLOY_BASE_URL: http://build-deploy-server:4400
      DEVICE_MANAGEMENT_BASE_URL: http://device-management-server:4700
      HARDWARE_CATALOG_BASE_URL: http://hardware-catalog:4910
      HARDWARE_SHOP_BASE_URL: http://hardware-shop:4900
      AI_USAGE_BASE_URL: http://ai-usage-server:5000
      AI_CONTEXT_BASE_URL: http://ai-context-server:5500
    ports:
      - "127.0.0.1:${ADMIN_PORT:-4600}:4600"
    volumes:
      - service_state:/var/lib/gernetix/services
    depends_on:
      project-server: { condition: service_healthy }
      build-deploy-server: { condition: service_healthy }
      device-management-server: { condition: service_healthy }
      hardware-catalog: { condition: service_healthy }
      hardware-shop: { condition: service_healthy }
      ai-usage-server: { condition: service_healthy }
      ai-context-server: { condition: service_healthy }

  admin-access-server:
    <<: *node-service
    networks:
      - edge
      - backend
    environment:
      GERNETIX_SERVICE: admin-access-server
      HOST: 0.0.0.0
      PORT: 4610
      ADMIN_ACCESS_SQLITE_PATH: /var/lib/gernetix/admin-access/gernetix-admin-access.sqlite
      ADMIN_TOOL_BASE_URL: http://admin-tool:4600
      ADMIN_TOOL_ACCESS_TOKEN: ${ADMIN_TOOL_ACCESS_TOKEN:?ADMIN_TOOL_ACCESS_TOKEN muss gesetzt sein}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:?ADMIN_BOOTSTRAP_USERNAME muss gesetzt sein}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:?ADMIN_BOOTSTRAP_PASSWORD muss gesetzt sein}
      ADMIN_SESSION_HOURS: ${ADMIN_SESSION_HOURS:-8}
      ADMIN_SESSION_COOKIE_SECURE: "true"
    expose: ["4610"]
    ports:
      - "127.0.0.1:${ADMIN_ACCESS_PORT:-4610}:4610"
    volumes:
      - admin_access_state:/var/lib/gernetix/admin-access
    depends_on:
      admin-tool: { condition: service_healthy }

  identity-server:
    <<: *node-service
    environment:
      GERNETIX_SERVICE: identity-server
      HOST: 0.0.0.0
      PORT: 4300
      IDENTITY_PERSISTENCE_BACKEND: sqlite
      IDENTITY_SQLITE_PATH: /var/lib/gernetix/identity/gernetix-identity.sqlite
      PLATFORM_DOWNLOAD_SQLITE_PATH: /var/lib/gernetix/identity/gernetix-platform-downloads.sqlite
      IDENTITY_APP_BASE_URL: ${IDENTITY_APP_BASE_URL:-}
      IDENTITY_ADMIN_TOKEN: ${IDENTITY_ADMIN_TOKEN:-}
      EMAIL_CONFIG_ENCRYPTION_KEY: ${EMAIL_CONFIG_ENCRYPTION_KEY:-}
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
      WEB_PUSH_VAPID_SUBJECT: ${WEB_PUSH_VAPID_SUBJECT:-}
      INTERFACE_TELEMETRY_SQLITE_PATH: /var/lib/gernetix/services/gernetix-services.sqlite
      PROJECT_SERVER_BASE_URL: http://project-server:4800
      TELEMETRY_SERVER_BASE_URL: http://telemetry-server:5600
      TELEMETRY_INTERNAL_TOKEN: ${TELEMETRY_INTERNAL_TOKEN:?TELEMETRY_INTERNAL_TOKEN muss gesetzt sein}
      BUILD_DEPLOY_BASE_URL: http://build-deploy-server:4400
      OTA_BUILD_DEPLOY_BASE_URL: http://build-deploy-server:4400
      DEVICE_MANAGEMENT_BASE_URL: http://device-management-server:4700
      HARDWARE_CATALOG_BASE_URL: http://hardware-catalog:4910
      HARDWARE_SHOP_BASE_URL: http://hardware-shop:4900
      AI_USAGE_BASE_URL: http://ai-usage-server:5000
      AI_CONTEXT_BASE_URL: http://ai-context-server:5500
      ADMIN_TOOL_BASE_URL: http://admin-tool:4600
      SYSTEM_EVENT_INGEST_TOKEN: ${SYSTEM_EVENT_INGEST_TOKEN:?SYSTEM_EVENT_INGEST_TOKEN muss gesetzt sein}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    expose: ["4300"]
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - identity_state:/var/lib/gernetix/identity
      - service_state:/var/lib/gernetix/services
    depends_on:
      project-server: { condition: service_healthy }
      telemetry-server: { condition: service_healthy }
      build-deploy-server: { condition: service_healthy }
      device-management-server: { condition: service_healthy }
      hardware-catalog: { condition: service_healthy }
      hardware-shop: { condition: service_healthy }
      ai-usage-server: { condition: service_healthy }
      ai-context-server: { condition: service_healthy }

  runtime-storage-migration:
    <<: *node-service
    profiles: ["storage-migration"]
    restart: "no"
    command:
      - node
      - /app/tools/migrate-runtime-storage.js
      - --source
      - /var/lib/gernetix/shared/gernetix-services.sqlite
      - --projects
      - /var/lib/gernetix/projects/gernetix-projects.sqlite
      - --telemetry
      - /var/lib/gernetix/telemetry/gernetix-telemetry.sqlite
    volumes:
      - service_state:/var/lib/gernetix/shared:ro
      - project_state:/var/lib/gernetix/projects
      - telemetry_state:/var/lib/gernetix/telemetry

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - backend
    ports:
      - "${MQTT_TLS_BIND_ADDRESS:-0.0.0.0}:${MQTT_TLS_PORT:-8883}:8883"
    expose: ["1883", "8883", "9001"]
    entrypoint: ["/mosquitto/config/docker-entrypoint.sh"]
    volumes:
      - ./infra/vps/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/vps/mosquitto/device.acl:/mosquitto/config/device.acl:ro
      - ./infra/vps/mosquitto/docker-entrypoint.sh:/mosquitto/config/docker-entrypoint.sh:ro
      - ${MQTT_LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${DEVICE_CA_CERTIFICATE_PATH:-/etc/gernetix/pki/device-ca.pem}:/mosquitto/config/device-ca.pem:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/version' -C 1 -W 5 >/dev/null 2>&1"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HTTP_BIND_ADDRESS:-127.0.0.1}:${HTTP_PORT:-8080}:8080"
    networks:
      - edge
      - backend
    volumes:
      - ./infra/vps/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/vps/nginx/welcome.html:/usr/share/nginx/html/welcome.html:ro
      - ./infra/vps/nginx/welcome.nl.html:/usr/share/nginx/html/welcome.nl.html:ro
      - ./infra/vps/nginx/welcome.en.html:/usr/share/nginx/html/welcome.en.html:ro
      - ./infra/vps/nginx/gernetix-logo.png:/usr/share/nginx/html/gernetix-logo.png:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
    depends_on:
      identity-server:
        condition: service_healthy

  nginx-tls:
    image: nginx:1.28-alpine
    profiles: ["tls"]
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/opt/gernetix/tls-entrypoint.sh"]
    ports:
      - "${HTTPS_BIND_ADDRESS:-0.0.0.0}:${HTTPS_PORT:-443}:8443"
    networks:
      - edge
      - backend
    volumes:
      - ./infra/vps/nginx/tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/vps/nginx/tls-entrypoint.sh:/opt/gernetix/tls-entrypoint.sh:ro
      - ./infra/vps/nginx/welcome.html:/usr/share/nginx/html/welcome.html:ro
      - ./infra/vps/nginx/welcome.nl.html:/usr/share/nginx/html/welcome.nl.html:ro
      - ./infra/vps/nginx/welcome.en.html:/usr/share/nginx/html/welcome.en.html:ro
      - ./infra/vps/nginx/gernetix-logo.png:/usr/share/nginx/html/gernetix-logo.png:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - nginx_tls_cache:/var/cache/nginx
      - nginx_tls_run:/var/run
    depends_on:
      identity-server:
        condition: service_healthy

  certbot:
    image: certbot/certbot:v5.1.0
    profiles: ["tls"]
    restart: unless-stopped
    entrypoint: ["/opt/gernetix/certbot-renew.sh"]
    volumes:
      - ./infra/vps/certbot-renew.sh:/opt/gernetix/certbot-renew.sh:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt
      - certbot_www:/var/www/certbot

networks:
  edge:
  backend:
    internal: true

volumes:
  identity_state:
  service_state:
  project_state:
  telemetry_state:
  ai_context_state:
  ai_context_postgres_data:
  admin_access_state:
  build_state:
  public_demo_state:
  mqtt_data:
  mqtt_log:
  nginx_cache:
  nginx_run:
  nginx_tls_cache:
  nginx_tls_run:
  certbot_www:
