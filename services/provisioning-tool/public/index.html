<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GerNetiX Provisioning Tool</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GerNetiX Factory Tool</p>
          <h1>Provisioning</h1>
        </div>
        <span id="runnerBadge" class="badge">USB</span>
      </header>

      <section class="workflow">
        <form id="sessionForm" class="panel form-grid">
          <div class="section-title">
            <p class="eyebrow">1</p>
            <h2>Boarddaten</h2>
          </div>
          <label>Seriennummer<input id="serialNumber" type="text" value="GNX-ESP32-0002" /></label>
          <label>ProcessorBoard<select id="processorBoard"></select></label>
          <label>Hardwareprofil<input id="hardwareProfile" type="text" value="hardware.processor_board.generic_esp_wroom32" readonly /></label>
          <label>Charge<input id="batchId" type="text" value="batch-2026-07" /></label>
          <label>Firmwareversion<input id="firmwareVersion" type="text" value="0.1.0" /></label>
          <label>Provisioniert von<input id="actor" type="text" value="factory-user" /></label>
          <fieldset class="mode-field">
            <legend>Service-Endpunkte</legend>
            <label>Device Management<input id="deviceManagementUrl" type="url" value="https://gernetix.nl/api/device-management" /></label>
            <label>Build &amp; Deploy<input id="buildDeployUrl" type="url" value="https://build.gernetix.com" /></label>
            <label>MQTT-Ziel
              <select id="mqttMode">
                <option value="vps">GerNetiX VPS</option>
                <option value="local">Lokaler Broker im Netzwerk</option>
              </select>
            </label>
            <label id="mqttVpsField">MQTT-Adresse des VPS<input id="mqttVpsUrl" type="url" value="mqtts://mqtt.gernetix.com:8883" /></label>
            <label id="mqttLocalHostField" class="hidden">Lokale Broker-IP<input id="mqttLocalHost" type="text" inputmode="decimal" placeholder="192.168.1.20" /></label>
            <label id="mqttLocalPortField" class="hidden">Lokaler MQTT-Port<input id="mqttLocalPort" type="number" min="1" max="65535" value="1883" /></label>
          </fieldset>
          <button id="selectUsbDeviceButton" type="button">USB-Geraet auswaehlen</button>
          <div id="usbBrowserStatus" class="status hidden"></div>
          <div class="button-row">
            <button class="primary" type="submit">Session vorbereiten</button>
            <button id="credentialResetButton" type="button">Aktives Credential zuruecksetzen</button>
          </div>
        </form>

        <section class="panel">
          <div class="section-title">
            <p class="eyebrow">2</p>
            <h2>USB-Flash</h2>
          </div>
          <dl id="sessionMeta" class="meta-list"></dl>
          <fieldset class="mode-field">
            <legend>Firmware-Artefakt</legend>
            <dl id="firmwareArtifactMeta" class="meta-list"></dl>
            <div id="firmwareArtifactStatus" class="status hidden"></div>
          </fieldset>
          <div id="secretStatus" class="status hidden"></div>
          <div id="flashStatus" class="status hidden"></div>
          <div id="flashProgress" class="progress hidden" aria-live="polite">
            <div class="progress-header">
              <span id="flashProgressLabel">USB-Flash</span>
              <strong id="flashProgressPercent">0%</strong>
            </div>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <span id="flashProgressBar" class="progress-fill"></span>
            </div>
            <div id="flashProgressText" class="progress-text"></div>
          </div>
          <fieldset class="mode-field">
            <legend>Kennung speichern</legend>
            <label>Board-Adresse<input id="deviceProvisioningUrl" type="url" value="http://192.168.4.1/provisioning" /></label>
            <div id="deviceProvisioningStatus" class="status hidden"></div>
          </fieldset>
          <div class="button-row">
            <button id="usbFlashButton" class="primary" type="button" disabled>Firmware per USB flashen</button>
            <button id="persistDeviceProvisioningButton" type="button" disabled>Kennung speichern</button>
            <button id="cancelFlashButton" type="button" disabled>USB-Flash abbrechen</button>
            <button id="completeButton" type="button" disabled>Provisionierung abschliessen</button>
          </div>
          <pre id="detailsBox" class="details"></pre>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
