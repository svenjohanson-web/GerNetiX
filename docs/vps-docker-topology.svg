<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GerNetiX VPS Docker Topologie</title>
  <desc id="desc">Oeffentliche Web-, MQTT-TLS- und WireGuard-Endpunkte, SSH nur ueber VPN, Admin Tool am VPS-Loopback sowie interne Domaenenservices und persistente SQL-Volumes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker>
    <style>
      .bg{fill:#f8fafc}.zone{fill:#fff;stroke:#cbd5e1;stroke-width:2}.edge{fill:#ecfdf5;stroke:#0f766e;stroke-width:2}.service{fill:#eff6ff;stroke:#2563eb;stroke-width:1.6}.infra{fill:#fff7ed;stroke:#ea580c;stroke-width:1.6}.store{fill:#f5f3ff;stroke:#7c3aed;stroke-width:1.6}.title{font:700 25px Arial;fill:#0f172a}.label{font:700 15px Arial;fill:#0f172a}.small{font:12px Arial;fill:#475569}.zoneTitle{font:700 16px Arial;fill:#0f766e}.line{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dash{stroke-dasharray:6 5}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="44" y="48">GerNetiX VPS Docker Topologie</text>
  <text class="small" x="44" y="72">Oeffentlich: HTTP/HTTPS, MQTT-TLS und WireGuard; SSH nur ueber VPN; Admin und Domaenenservices bleiben privat.</text>

  <rect class="zone" x="34" y="100" width="1132" height="430" rx="16"/>
  <text class="zoneTitle" x="58" y="130">Docker Compose Projekt: gernetix</text>

  <rect class="edge" x="70" y="180" width="190" height="76" rx="10"/>
  <text class="label" x="165" y="210" text-anchor="middle">Nginx</text>
  <text class="small" x="165" y="232" text-anchor="middle">Web Edge :80/:443</text>

  <rect class="service" x="340" y="180" width="210" height="76" rx="10"/>
  <text class="label" x="445" y="210" text-anchor="middle">Identity Server</text>
  <text class="small" x="445" y="232" text-anchor="middle">Plattform UI :4300</text>

  <rect class="service" x="640" y="150" width="210" height="60" rx="10"/><text class="label" x="745" y="178" text-anchor="middle">Project Server</text><text class="small" x="745" y="196" text-anchor="middle">:4800</text>
  <rect class="service" x="890" y="150" width="210" height="60" rx="10"/><text class="label" x="995" y="178" text-anchor="middle">Device Management</text><text class="small" x="995" y="196" text-anchor="middle">:4700</text>
  <rect class="service" x="640" y="230" width="210" height="60" rx="10"/><text class="label" x="745" y="258" text-anchor="middle">Hardware Shop/Catalog</text><text class="small" x="745" y="276" text-anchor="middle">:4900 / :4910</text>
  <rect class="service" x="890" y="230" width="210" height="60" rx="10"/><text class="label" x="995" y="258" text-anchor="middle">AI Usage / Context</text><text class="small" x="995" y="276" text-anchor="middle">:5000 / :5500</text>
  <rect class="service" x="640" y="310" width="210" height="60" rx="10"/><text class="label" x="745" y="338" text-anchor="middle">Build &amp; Deploy</text><text class="small" x="745" y="356" text-anchor="middle">:4400</text>
  <rect class="infra" x="890" y="310" width="210" height="60" rx="10"/><text class="label" x="995" y="338" text-anchor="middle">Mosquitto</text><text class="small" x="995" y="356" text-anchor="middle">intern :1883/:9001 · TLS :8883</text>
  <rect class="edge" x="340" y="340" width="210" height="70" rx="10"/><text class="label" x="445" y="368" text-anchor="middle">Admin Tool</text><text class="small" x="445" y="389" text-anchor="middle">VPN + SSH-Tunnel; Loopback :4600</text>

  <path class="line" d="M260 218H340"/><path class="line" d="M550 218C590 218 600 180 640 180"/><path class="line" d="M550 218C620 218 820 180 890 180"/><path class="line" d="M550 218C610 218 610 260 640 260"/><path class="line" d="M550 218C650 218 820 260 890 260"/><path class="line" d="M550 218C610 218 610 340 640 340"/><path class="line" d="M850 340H890"/><path class="line dash" d="M445 340V256"/>

  <text class="label" x="62" y="580">Persistente Docker-Volumes</text>
  <rect class="store" x="62" y="605" width="230" height="66" rx="10"/><text class="label" x="177" y="633" text-anchor="middle">Identity SQLite</text><text class="small" x="177" y="653" text-anchor="middle">identity_state</text>
  <rect class="store" x="326" y="605" width="230" height="66" rx="10"/><text class="label" x="441" y="633" text-anchor="middle">Service SQLite</text><text class="small" x="441" y="653" text-anchor="middle">service_state</text>
  <rect class="store" x="590" y="605" width="230" height="66" rx="10"/><text class="label" x="705" y="633" text-anchor="middle">AI Context PostgreSQL</text><text class="small" x="705" y="653" text-anchor="middle">pgvector · ai_context_postgres_data</text>
  <rect class="store" x="854" y="605" width="230" height="66" rx="10"/><text class="label" x="969" y="633" text-anchor="middle">Build / MQTT State</text><text class="small" x="969" y="653" text-anchor="middle">build_state, mqtt_data</text>

  <text class="small" x="45" y="705">Administration nur per WireGuard; oeffentliche SSH- oder Admin-Fallbacks sind nicht vorgesehen.</text>
</svg>
