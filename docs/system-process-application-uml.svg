    <text class="smallText" x="115" y="241" text-anchor="middle">Support</text>

    <rect class="node actor" x="40" y="280" width="150" height="62" rx="10"/>
    <text class="titleText" x="115" y="316" text-anchor="middle">Codex</text>
  </g>

