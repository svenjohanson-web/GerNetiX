  <g id="legend">
    <rect class="cluster" x="40" y="735" width="500" height="170" rx="14"/>
    <text class="clusterTitle" x="60" y="764">Onboarding-Regel</text>
    <text class="smallText" x="60" y="795">Device-Onboarding laeuft in der IDE/Plattform UI, nicht als eigener Backend-Service.</text>
    <text class="smallText" x="60" y="820">Das IDE-Onboarding-Model leitet den Flow aus Hardware-Catalog-Capabilities ab.</text>
    <text class="smallText" x="60" y="845">Kurzer Board-Name erzeugt den gernetix-* Node-/SSID-/Hostnamen.</text>
    <text class="smallText" x="60" y="870">Seriennummer und Instanz-Konfiguration werden im Device Inventory gespeichert.</text>
