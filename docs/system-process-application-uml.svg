    <text class="titleText" x="395" y="273" text-anchor="middle">Recovery Tool HMI</text>
    <text class="smallText" x="395" y="293" text-anchor="middle">Board retten / USB Recovery :5100</text>

    <rect class="node app" x="265" y="330" width="260" height="64" rx="10"/>
