<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">GerNetiX Serverprozesse und Applikationen</title>
  <desc id="desc">Aktuelle lokale MVP-Architektur mit Plattform UI, Identity Server, AI Context Prompt-Grundlagen und Architektur-Bausteinen, SQL-only Persistenz, Hardware Catalog, Hardware Shop, Device Management, Provisioning, Recovery, Build, MQTT Broker und weiteren Services.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .cluster { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .clusterTitle { fill: #0f766e; font: 700 16px Segoe UI, Arial, sans-serif; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 10; }
      .app { fill: #ecfdf5; stroke: #0f766e; }
      .edge { fill: #eff6ff; stroke: #2563eb; }
      .domain { fill: #fff7ed; stroke: #ea580c; }
      .tool { fill: #f5f3ff; stroke: #7c3aed; }
      .store { fill: #f1f5f9; stroke: #475569; }
      .actor { fill: #e0f2fe; stroke: #0284c7; }
      .titleText { fill: #0f172a; font: 700 15px Segoe UI, Arial, sans-serif; }
      .smallText { fill: #475569; font: 12px Segoe UI, Arial, sans-serif; }
      .label { fill: #334155; font: 11px Segoe UI, Arial, sans-serif; }
      .line { fill: none; stroke: #334155; stroke-width: 1.4; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect class="bg" width="1680" height="980"/>
  <text x="40" y="42" class="titleText" style="font-size:24px">GerNetiX Serverprozesse und Applikationen</text>
  <text x="40" y="67" class="smallText">Lokaler MVP-Zuschnitt: UIs, Adapter-Server, Domaenenservices, Tools und SQL-only Persistenz</text>

