    <text class="titleText" x="115" y="136" text-anchor="middle">Nutzer</text>
    <text class="smallText" x="115" y="156" text-anchor="middle">Entwickler</text>

    <rect class="node actor" x="40" y="195" width="150" height="62" rx="10"/>
