[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
board_build.flash_size = 4MB
board_build.partitions = partitions_ota_4mb.csv
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1
board_upload.flash_size = 4MB

[env:esp32dev-medium]
extends = env:esp32dev
board_build.partitions = partitions_medium_4mb.csv
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_MEDIUM=1

[env:esp32dev-low]
extends = env:esp32dev
board_build.partitions = partitions_low_4mb.csv
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_LOW=1

[env:esp32-s3-16mb-full]
extends = env:esp32dev
; N16R8: 16 MB QIO flash plus 8 MB octal PSRAM.  The generic S3 DevKitC
; definition is an N8 board without PSRAM and produces an incompatible image.
board = 4d_systems_esp32s3_gen4_r8n16
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32-s3-n16r8"
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_full_16mb.csv
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1

[env:esp32-s3-16mb-project-dashboard-demo]
extends = env:esp32-s3-16mb-full
; A real project component, separate from the protected basis software.
; It publishes a local 0..10 measurement every five seconds for the first
; project dashboard integration test.
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32-s3-n16r8" -DGERNETIX_PROJECT_SOURCE_DIR="${PROJECT_DIR}/../../projects/demo-web-dashboard"

[env:esp32-s3-16mb-diagnostic-no-http]
extends = env:esp32-s3-16mb-full
; Isolates the embedded HTTP server. Web Serial and WiFi station operation
; remain enabled, so a reset here proves whether the HTTP task is involved.
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1 -D GERNETIX_DIAGNOSTIC_DISABLE_DEVICE_WEB_SERVER=1

[env:esp32-s3-16mb-diagnostic-no-http-no-usb-provisioning]
extends = env:esp32-s3-16mb-diagnostic-no-http
; Keeps WiFi and the runtime task, but removes the USB Serial/JTAG driver and
; provisioning task to isolate the remaining S3 reset source.
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1 -D GERNETIX_DIAGNOSTIC_DISABLE_DEVICE_WEB_SERVER=1 -D GERNETIX_DIAGNOSTIC_DISABLE_USB_PROVISIONING=1

[env:esp32-s3-16mb-diagnostic-no-http-no-usb-task]
extends = env:esp32-s3-16mb-diagnostic-no-http
; The USB driver remains active for the normal console, but its continuous
; provisioning read task is not created. This distinguishes driver setup from
; the WebSerial command loop without changing WiFi or runtime behavior.
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1 -D GERNETIX_DIAGNOSTIC_DISABLE_DEVICE_WEB_SERVER=1 -D GERNETIX_DIAGNOSTIC_DISABLE_SERIAL_PROVISIONING_TASK=1

[env:esp32-s3-16mb-diagnostic-minimal-http]
extends = env:esp32-s3-16mb-full
; Starts only the stock ESP-IDF HTTP server plus GET /health. Existing WiFi
; credentials remain intact and USB provisioning is skipped outside setup AP.
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1 -D GERNETIX_DIAGNOSTIC_MINIMAL_HTTP_SERVER=1

[env:esp32-s3-16mb-diagnostic-no-http-no-provisioning-nvs]
extends = env:esp32-s3-16mb-diagnostic-no-http
; Keeps saved WiFi credentials and USB diagnostics, but does not read the
; `prov` namespace and cannot start factory provisioning or MQTT OTA. This
; isolates today's private/public-key and certificate additions without
; erasing the board or changing its WLAN configuration.
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1 -D GERNETIX_DIAGNOSTIC_DISABLE_DEVICE_WEB_SERVER=1 -D GERNETIX_DIAGNOSTIC_DISABLE_PROVISIONING_NVS=1

[env:esp32-c6-4mb-full]
extends = env:esp32dev
board = esp32-c6-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = partitions_ota_4mb.csv
build_flags = -D GERNETIX_BASISSOFTWARE_PROFILE_FULL=1
